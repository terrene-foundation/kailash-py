[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kailash"
version = "0.12.5"
description = "Python SDK for the Kailash container-node architecture"
authors = [
    {name = "Terrene Foundation", email = "info@terrene.foundation"}
]
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "aiofiles>=24.1.0",
    "aiohttp>=3.12.4",
    "aiohttp-cors>=0.7.0",
    "aiomysql>=0.2.0",
    "aiosqlite>=0.19.0",
    "asyncpg>=0.30.0",
    "bcrypt>=4.3.0",
    "click>=8.0",
    "fastapi>=0.115.12",
    "httpx>=0.25.0",
    "jsonschema>=4.24.0",
    "matplotlib>=3.5",
    "mcp[cli]>=1.23.0,<2.0",
    "msal>=1.32.3",
    "networkx>=2.7",
    "numpy>=2.2.5",
    "pandas>=2.2.3",
    "plotly>=6.2.0",
    "prometheus-client>=0.22.1",
    "psutil>=7.0.0",
    "pydantic>=1.9",
    "PyJWT>=2.8.0",
    "pyotp>=2.9.0",
    "pyyaml>=6.0",
    "qrcode>=8.2",
    "redis>=6.2.0",
    "requests>=2.32.3",
    "scipy>=1.15.3",
    "scikit-learn>=1.6.1",
    "sqlalchemy>=2.0.0",
    "twilio>=9.6.3",
    "uvicorn[standard]>=0.31.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "black>=25.1.0",
    "build>=1.2.2.post1",
    "detect-secrets>=1.5.0",
    "faker>=37.4.0",
    "isort>=6.0.1",
    "mypy>=0.9",
    "pre-commit>=4.2.0",
    "pytest>=8.3.5",
    "pytest-asyncio>=1.0.0",
    "pytest-cov>=6.1.1",
    "pytest-split>=0.9.0",
    "pytest-timeout>=2.3.0",
    "pytest-xdist>=3.6.0",
    "ruff>=0.11.12",
    "twine>=6.1.0",
]
docs = [
    "autodoc>=0.5.0",
    "doc8>=1.1.2",
    "myst-parser>=4.0.1",
    "sphinx>=8.2.3",
    "sphinx-autobuild>=2024.10.3",
    "sphinx-copybutton>=0.5.2",
    "sphinx-rtd-theme>=3.0.2",
    "sphinxcontrib-mermaid>=1.0.0",
]
dataflow = [
    "kailash-dataflow>=0.12.3",
]
nexus = [
    "kailash-nexus>=1.4.2",
]
kaizen = [
    "kailash-kaizen>=1.2.4",
]
all = [
    "kailash-dataflow>=0.12.3",
    "kailash-nexus>=1.4.2",
    "kailash-kaizen>=1.2.4",
]

[project.urls]
"Homepage" = "https://github.com/terrene-foundation/kailash-py"
"Repository" = "https://github.com/terrene-foundation/kailash-py"
"Bug Tracker" = "https://github.com/terrene-foundation/kailash-py/issues"
"License" = "https://github.com/terrene-foundation/kailash-py/blob/main/LICENSE"
"Changelog" = "https://github.com/terrene-foundation/kailash-py/blob/main/CHANGELOG.md"

[tool.setuptools]
package-dir = {"" = "src"}

[project.scripts]
kailash = "kailash.cli:main"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E203", "E501", "E722", "F401", "F841"]

[tool.ruff.lint.per-file-ignores]
"scripts/refactor-pythoncode-to-functions.py" = ["E722"]
"src/kailash/nodes/api/security.py" = ["E722"]
"tests/conftest_sdk_dev.py" = ["E722"]
# Ignore import ordering and undefined names in packages directory (separate packages)
"packages/**/*.py" = ["E402", "F821", "F811", "E721"]
# Ignore undefined names in test files that may use mocks
"tests/**/*.py" = ["F821", "F811", "E721"]
# Allow late imports in performance test files
"tests/unit/performance_benchmarks/*.py" = ["E402"]
# Scripts may need to modify sys.path before imports
"scripts/**/*.py" = ["E402", "F821", "E721"]
# Specific test files with import order issues after skip markers
"tests/integration/api/test_gateway.py" = ["E402"]
"tests/integration/api/test_workflow_api.py" = ["E402"]
# RAG nodes with embedded Python code strings
"src/kailash/nodes/rag/privacy.py" = ["F821"]
