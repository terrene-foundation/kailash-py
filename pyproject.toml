[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kailash"
version = "2.0.0"
description = "Python SDK for the Kailash container-node architecture"
authors = [
    {name = "Terrene Foundation", email = "info@terrene.foundation"}
]
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    # Core workflow execution — the minimum for WorkflowBuilder + LocalRuntime
    "jsonschema>=4.24.0",
    "networkx>=2.7",
    "pydantic>=1.9",
    "pyyaml>=6.0",
    "filelock>=3.0",
]

[project.optional-dependencies]
# Trust subsystem (EATP protocol + trust-plane platform)
trust = [
    "pynacl>=1.5",
]
# Trust encryption at rest
trust-encryption = [
    "cryptography>=41.0",
]
# Trust SSO (OIDC JWT verification)
trust-sso = [
    "PyJWT>=2.8",
    "cryptography>=41.0",
]
# Server stack (API gateway, Nexus endpoints, webhooks)
server = [
    "aiohttp>=3.12.4",
    "aiohttp-cors>=0.7.0",
    "fastapi>=0.115.12",
    "httpx>=0.25.0",
    "uvicorn[standard]>=0.31.0",
    "websockets>=12.0",
]
# CLI interface
cli = [
    "click>=8.0",
]
# HTTP nodes (sync + async API calls)
http = [
    "aiohttp>=3.12.4",
    "requests>=2.32.3",
]
# Database (SQLAlchemy + SQLite async)
database = [
    "aiosqlite>=0.19.0",
    "sqlalchemy>=2.0.0",
]
# PostgreSQL async driver
postgres = [
    "asyncpg>=0.30.0",
]
# MySQL async driver
mysql = [
    "aiomysql>=0.2.0",
]
# Async file I/O
files = [
    "aiofiles>=24.1.0",
]
# Authentication & security
auth = [
    "bcrypt>=4.3.0",
    "PyJWT>=2.8.0",
]
# Multi-Factor Authentication
mfa = [
    "pyotp>=2.9.0",
    "qrcode>=8.2",
]
# Microsoft authentication (Azure AD, SharePoint)
microsoft = [
    "msal>=1.32.3",
]
# Monitoring (Prometheus metrics, resource tracking)
monitoring = [
    "prometheus-client>=0.22.1",
    "psutil>=7.0.0",
]
# Redis (distributed features, caching, circuit breaker)
distributed = [
    "redis>=6.2.0",
]
# MCP (Model Context Protocol)
mcp = [
    "mcp[cli]>=1.23.0,<2.0",
]
# Scheduler
scheduler = [
    "apscheduler>=3.10",
]
# OpenTelemetry tracing
otel = [
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    "opentelemetry-exporter-otlp>=1.20",
]
# Sub-packages
dataflow = [
    "kailash-dataflow>=1.0.0,<2.0.0",
]
nexus = [
    "kailash-nexus>=1.4.2",
]
kaizen = [
    "kailash-kaizen>=2.0.0,<3.0.0",
]
pact = [
    "kailash-pact>=0.2.0",
]
# Secret backends
vault = [
    "hvac>=2.1.0",
]
aws-secrets = [
    "boto3>=1.34.0",
]
azure-secrets = [
    "azure-keyvault-secrets>=4.7.0",
    "azure-identity>=1.15.0",
]
ldap = [
    "ldap3>=2.9",
]
# Development
dev = [
    "black>=25.1.0",
    "build>=1.2.2.post1",
    "detect-secrets>=1.5.0",
    "faker>=37.4.0",
    "isort>=6.0.1",
    "mypy>=0.9",
    "pre-commit>=4.2.0",
    "pytest>=8.3.5",
    "pytest-asyncio>=1.0.0",
    "pytest-cov>=6.1.1",
    "pytest-split>=0.9.0",
    "pytest-timeout>=2.3.0",
    "pytest-xdist>=3.6.0",
    "ruff>=0.11.12",
    "twine>=6.1.0",
]
# Documentation
docs = [
    "autodoc>=0.5.0",
    "doc8>=1.1.2",
    "myst-parser>=4.0.1",
    "sphinx>=8.2.3",
    "sphinx-autobuild>=2024.10.3",
    "sphinx-copybutton>=0.5.2",
    "sphinx-rtd-theme>=3.0.2",
    "sphinxcontrib-mermaid>=1.0.0",
]
# Everything (restores pre-1.0 behavior)
all = [
    "kailash[server,cli,http,database,postgres,mysql,files,auth,mfa,microsoft,monitoring,distributed,mcp,scheduler,otel,trust,trust-encryption,trust-sso]",
    "kailash-dataflow>=1.0.0,<2.0.0",
    "kailash-nexus>=1.4.2",
    "kailash-kaizen>=2.0.0,<3.0.0",
    "kailash-pact>=0.2.0",
]

[project.urls]
"Homepage" = "https://github.com/terrene-foundation/kailash-py"
"Repository" = "https://github.com/terrene-foundation/kailash-py"
"Bug Tracker" = "https://github.com/terrene-foundation/kailash-py/issues"
"License" = "https://github.com/terrene-foundation/kailash-py/blob/main/LICENSE"
"Changelog" = "https://github.com/terrene-foundation/kailash-py/blob/main/CHANGELOG.md"

[tool.setuptools]
package-dir = {"" = "src"}

[project.scripts]
kailash = "kailash.cli:main"
eatp = "kailash.trust.cli:main"
attest = "kailash.trust.plane.cli.commands:main"
trustplane-mcp = "kailash.trust.plane.mcp_server:main"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E203", "E501", "E722", "F401", "F841"]

[tool.ruff.lint.per-file-ignores]
"scripts/refactor-pythoncode-to-functions.py" = ["E722"]
"src/kailash/nodes/api/security.py" = ["E722"]
"tests/conftest_sdk_dev.py" = ["E722"]
# Ignore import ordering and undefined names in packages directory (separate packages)
"packages/**/*.py" = ["E402", "F821", "F811", "E721"]
# Ignore undefined names in test files that may use mocks
"tests/**/*.py" = ["F821", "F811", "E721"]
# Allow late imports in performance test files
"tests/unit/performance_benchmarks/*.py" = ["E402"]
# Scripts may need to modify sys.path before imports
"scripts/**/*.py" = ["E402", "F821", "E721"]
# Specific test files with import order issues after skip markers
"tests/integration/api/test_gateway.py" = ["E402"]
"tests/integration/api/test_workflow_api.py" = ["E402"]
# RAG nodes with embedded Python code strings
"src/kailash/nodes/rag/privacy.py" = ["F821"]
