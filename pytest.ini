[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (component interactions)
    e2e: End-to-end tests (complete scenarios)
    slow: Slow running tests
    smoke: Smoke tests (critical path only)
    requires_postgres: Tests requiring PostgreSQL
    requires_ollama: Tests requiring Ollama
    requires_docker: Tests requiring Docker
    performance: Performance benchmark tests
    flaky: Tests that are known to be flaky
    io: marks tests that perform file I/O
    asyncio: marks async tests that require asyncio

# Environment-aware test options
addopts =
    --strict-markers
    --tb=short

# CI detection and optimization
[pytest:ci]
# CI-specific settings (activated when CI=true environment variable is set)
addopts =
    -x
    -q
    --capture=no
    --durations=10
    --strict-markers
    --disable-warnings
    --timeout=30
    -m "not slow"

[pytest:local]
# Local development settings (default)
addopts =
    -v
    --tb=short
    --maxfail=10

# Async test support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Timeout for tests (seconds)
timeout = 300
timeout_method = thread

# Log settings (local only)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# Coverage settings (when needed)
[coverage:run]
parallel = true
concurrency = multiprocessing
omit =
    */tests/*
    */conftest.py
    */__init__.py
    */setup.py

[coverage:report]
skip_covered = true
show_missing = false
precision = 0
