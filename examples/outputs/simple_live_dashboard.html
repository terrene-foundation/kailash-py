
<!DOCTYPE html>
<html>
<head>
    <title>Real-time Workflow Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #333333;
            line-height: 1.6;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .dashboard-header h1 {
            color: #007bff;
            font-size: 2em;
        }

        .status-indicator {
            font-weight: bold;
        }

        .status-active {
            color: #28a745;
        }

        .status-inactive {
            color: #dc3545;
        }

        section {
            margin-bottom: 30px;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        section h2 {
            margin-bottom: 20px;
            color: #007bff;
            font-size: 1.5em;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .status-card {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }

        .status-value {
            display: block;
            font-size: 2em;
            font-weight: bold;
            color: #007bff;
        }

        .status-label {
            display: block;
            font-size: 0.9em;
            color: #333333;
            opacity: 0.8;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .chart-container, .chart-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }

        .chart-container h3, .chart-item h3 {
            margin-bottom: 10px;
            color: #333333;
        }

        .chart-image {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .tasks-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tasks-table th,
        .tasks-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .tasks-table th {
            background: #f8f9fa;
            font-weight: bold;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-running {
            background: #007bff;
            color: white;
        }

        .status-completed {
            background: #28a745;
            color: white;
        }

        .status-failed {
            background: #dc3545;
            color: white;
        }

        .status-pending {
            background: #ffc107;
            color: black;
        }

        canvas {
            max-width: 100%;
            height: 200px;
        }

    </style>
    <script>

        function drawLiveCharts(timestamps, cpuData, memoryData, throughputData) {
            // Simple canvas-based charts (replace with Chart.js or similar for production)
            drawSimpleChart('cpuChart', timestamps, cpuData, 'CPU %', '#007bff');
            drawSimpleChart('memoryChart', timestamps, memoryData, 'Memory MB', '#28a745');
            drawSimpleChart('throughputChart', timestamps, throughputData, 'Tasks/Min', '#ffc107');
        }

        function drawSimpleChart(canvasId, labels, data, label, color) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const width = canvas.width = canvas.offsetWidth;
            const height = canvas.height = 200;

            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            if (data.length === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('No data available', width/2, height/2);
                return;
            }

            // Calculate scales
            const maxValue = Math.max(...data, 1);
            const padding = 40;
            const chartWidth = width - 2 * padding;
            const chartHeight = height - 2 * padding;

            // Draw axes
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();

            // Draw data line
            if (data.length > 1) {
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.beginPath();

                for (let i = 0; i < data.length; i++) {
                    const x = padding + (i / (data.length - 1)) * chartWidth;
                    const y = height - padding - (data[i] / maxValue) * chartHeight;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();

                // Draw data points
                ctx.fillStyle = color;
                for (let i = 0; i < data.length; i++) {
                    const x = padding + (i / (data.length - 1)) * chartWidth;
                    const y = height - padding - (data[i] / maxValue) * chartHeight;

                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }

            // Draw labels
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`Max: ${maxValue.toFixed(1)}`, width - 60, padding + 15);
            ctx.fillText('0', padding - 20, height - padding + 5);
        }

        // Auto-refresh functionality
        setInterval(function() {
            if (window.location.hash !== '#no-refresh') {
                window.location.reload();
            }
        }, 30000); // Refresh every 30 seconds

    </script>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>🚀 Workflow Dashboard</h1>
            <div class="status-indicator">
                <span class="status-inactive">
                    🔴 Monitoring Stopped
                </span>
            </div>
        </header>


        <section class="status-section">
            <h2>📊 Current Status</h2>
            <div class="status-grid">
                <div class="status-card">
                    <span class="status-value">0</span>
                    <span class="status-label">Active Tasks</span>
                </div>
                <div class="status-card">
                    <span class="status-value">3</span>
                    <span class="status-label">Completed</span>
                </div>
                <div class="status-card">
                    <span class="status-value">0</span>
                    <span class="status-label">Failed</span>
                </div>
                <div class="status-card">
                    <span class="status-value">0.0</span>
                    <span class="status-label">Tasks/Min</span>
                </div>
                <div class="status-card">
                    <span class="status-value">0.0%</span>
                    <span class="status-label">Avg CPU</span>
                </div>
                <div class="status-card">
                    <span class="status-value">398MB</span>
                    <span class="status-label">Total Memory</span>
                </div>
            </div>
        </section>


        <section class="metrics-section">
            <h2>📈 Live Metrics (Last 30 minutes)</h2>
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>CPU Usage</h3>
                    <canvas id="cpuChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Memory Usage</h3>
                    <canvas id="memoryChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Throughput</h3>
                    <canvas id="throughputChart"></canvas>
                </div>
            </div>
            <script>
                drawLiveCharts(["12:58:32", "12:58:33", "12:58:34"], [0.0, 0.0, 0.0],
                              [400.25, 397.96875, 397.96875], [0.0, 0.0, 0.0]);
            </script>
        </section>



            <section class="tasks-section">
                <h2>📋 Recent Tasks</h2>
                <p>No active workflow</p>
            </section>

    </div>
</body>
</html>
