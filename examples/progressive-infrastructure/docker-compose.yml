# Kailash Progressive Infrastructure: Local Development Stack
#
# Provides PostgreSQL (Level 1 stores) and Redis (Level 2 task queue)
# for the progressive infrastructure examples.
#
# Usage:
#   docker compose up -d
#   export KAILASH_DATABASE_URL=postgresql://kailash:kailash@localhost:5432/kailash
#   export KAILASH_QUEUE_URL=redis://localhost:6379/0
#
# Teardown:
#   docker compose down -v

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kailash
      POSTGRES_PASSWORD: kailash
      POSTGRES_DB: kailash
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kailash"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
