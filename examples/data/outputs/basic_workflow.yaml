version: '1.0'
metadata:
  name: basic_customer_processing
  description: Simple ETL workflow for customer data
  version: 1.0.0
  author: ''
  created_at: '2025-05-19T00:50:07.574879'
  tags: []
nodes:
  reader:
    type: CSVReader
    config: {}
    container:
      image: kailash/csv-reader:latest
      command:
      - python
      - -m
      - kailash.nodes.data.csv_reader
      args: []
      env: {}
    resources:
      cpu: 100m
      memory: 512Mi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 0.0
      y: 100.0
  transformer:
    type: PythonCodeNode
    config: {}
    container:
      image: kailash/pythoncodenode:latest
      command:
      - python
      - -m
      - kailash.nodes.pythoncodenode
      args: []
      env: {}
    resources:
      cpu: 100m
      memory: 128Mi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 150.0
      y: 100.0
  writer:
    type: CSVWriter
    config: {}
    container:
      image: kailash/csvwriter:latest
      command:
      - python
      - -m
      - kailash.nodes.csvwriter
      args: []
      env: {}
    resources:
      cpu: 100m
      memory: 128Mi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 300.0
      y: 100.0
connections:
- from: reader.data
  to: transformer.data
- from: transformer.data
  to: writer.data
