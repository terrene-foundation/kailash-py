version: '1.0'
metadata:
  name: Data Processing Pipeline
  description: Reusable workflow for CSV data processing
  version: 1.0.0
  author: ''
  created_at: '2025-06-03T07:16:20.867772+00:00'
nodes:
  reader:
    type: CSVReader
    config: {}
    container:
      image: kailash/csv-reader:latest
      command:
      - python
      - -m
      - kailash.nodes.data.csv_reader
      args: []
      env: {}
    resources:
      cpu: 100m
      memory: 512Mi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 0.0
      y: 100.0
  filter:
    type: Filter
    config: {}
    container:
      image: kailash/filter:latest
      command:
      - python
      - -m
      - kailash.nodes.filter
      args: []
      env: {}
    resources:
      cpu: 100m
      memory: 128Mi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 150.0
      y: 100.0
  writer:
    type: CSVWriter
    config: {}
    container:
      image: kailash/csvwriter:latest
      command:
      - python
      - -m
      - kailash.nodes.csvwriter
      args: []
      env: {}
    resources:
      cpu: 100m
      memory: 128Mi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 300.0
      y: 100.0
connections:
- from: reader
  to: filter
  from_output: data
  to_input: data
- from: filter
  to: writer
  from_output: filtered_data
  to_input: data
