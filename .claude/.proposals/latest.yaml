changes:
  - id: parallel-opus-burst-size-limit-waves-of-three
    type: rule
    severity: MEDIUM
    target: rules/worktree-isolation.md
    section: "new § 'Parallel-Launch Burst Size Limit (Waves of ≤3)' as Rule 4"
    summary: |
      Anthropic's server-side throttle kills 4-6 simultaneous Opus
      worktree agents launched in one burst. All 6 in the M10 launch
      died at 34-45s with `API Error: Server is temporarily limiting
      requests for this user` BEFORE any of them committed. Fallback
      to waves of 3 succeeded.

      Rule mandates parent orchestrators launch worktree agents in
      waves of ≤3 for Opus-tier models. BLOCKED rationalizations
      enumerated (API docs don't say hard limit / rate limits only on
      sustained load / we can retry / waves halve throughput /
      earlier 4-agent tests worked).

      Evidence: session 2026-04-23 M10 launch — 6 agents
      (ab9c2f7213c4a82ab, ae2f048829aa941a2, af15e0f9c3f2d16a3,
      a823d7ed912137852, a0e76f0996d1d9a4e, ad10591aa614deeae) all
      rate-limited in first burst; waves of 3 (a506217c8640af1c0,
      a0831fc0ca6b9f6ae, a1027b84cb7c4f9d2 + aa7fb6a6, a69473b3,
      aaecc695) all completed.
    classification_suggestion: global
    rationale: |
      Cross-SDK applicable. Rust worktree orchestration would hit the
      same throttle — Anthropic's limit is session-level, not
      language-level. No variant overlay needed; the orchestrator
      launch pattern is identical.

  - id: pre-flight-merge-base-check-before-worktree-launch
    type: rule
    severity: MEDIUM
    target: rules/worktree-isolation.md
    section: "new § 'Pre-Flight Merge-Base Check Before Worktree Launch' as Rule 5"
    summary: |
      `git worktree add` without an explicit base defaults to whatever
      branch HEAD was last set. For long-running sessions where new
      shards merge during the session, stale bases drift silently.
      5 of 6 M10 shards branched from 899ce3e5 (pre-W30 merge); only
      1 branched from feat tip 41a217dc. Worked this time because
      packages didn't overlap; permanent failure mode until
      structurally prevented.

      Rule mandates orchestrator pins base SHA at worktree creation
      AND verifies `git merge-base <new-branch> <target-branch>`
      equals the current tip of `<target-branch>` at launch time.
      BLOCKED: "worktree defaults handle the base" / "git rebases at
      merge time" / "packages don't overlap" / "worked this time".
    classification_suggestion: global
    rationale: |
      Cross-SDK applicable. `git worktree` semantics are language-
      agnostic. Rust and Ruby BUILD repos exhibit the same failure
      mode.

  - id: worktree-branch-name-matches-prompt-declaration
    type: rule
    severity: LOW
    target: rules/worktree-isolation.md
    section: "new § 'Worktree Branch Name MUST Match Prompt Declaration' as Rule 6"
    summary: |
      3 of 6 shards in the M10 launch ended up on branches like
      `worktree-agent-aa7fb6a6` instead of `feat/w31-core-ml-nodes-
      observability` because the harness default assigned hash-based
      names when the orchestrator prompt didn't force creation with
      `-b <branch>`. Post-merge grep for `feat/w31-*` missed those
      three.

      Rule mandates orchestrator passes `-b <branch>` explicitly AND
      the agent prompt verifies `git rev-parse --abbrev-ref HEAD`
      matches the declared name before first commit. BLOCKED: "names
      are bookkeeping" / "harness defaults are fine" / "prompt
      mentions name, agent sets it" / "hash names are more unique".

      Evidence: honored — feat/w31-core-ml-nodes-observability,
      feat/w31b-dataflow-ml-bridge, feat/w31c-nexus-ml-bridge,
      feat/w33b-migration-readme-regression. Defaulted —
      worktree-agent-aa7fb6a6, worktree-agent-a69473b3,
      worktree-agent-aaecc695, worktree-agent-aa8e8995,
      worktree-agent-af0e8132.
    classification_suggestion: global
    rationale: |
      Cross-SDK applicable. Branch-name discipline is `git log --grep`
      hygiene; language-agnostic.

  - id: orchestrator-amends-stale-todo-at-launch
    type: rule
    severity: LOW
    target: rules/specs-authority.md
    section: "new § 'Orchestrator MUST Amend Todo Text At Launch When Spec Has Moved' as Rule 5c"
    summary: |
      Todos are written at /todos time against state-of-repo-then; by
      /implement time the state has moved. Orchestrator MUST cross-
      check todo claims (version bumps, __all__ counts, spec refs)
      against current canonical spec + package state before launch,
      amend IN THE TODO TEXT, and prompt the agent with the amended
      version. Launching a stale todo burns the agent's budget and
      risks outright shard failure (tag collision, symbol mismatch).

      Evidence: W32-32b todo said "bump align 0.5.0" but W30.3
      already shipped 0.5.0; amended to 0.6.0 at launch saved a
      failed shard. W33 todo said __all__ = 34 symbols; spec §15.9
      says 41; amended at launch per §5b specs-over-todo preference;
      agent landed 41 correctly.

      BLOCKED: "agent is smart enough to re-derive" / "todo was
      approved, amending is scope creep" / "let the agent hit the
      conflict" / "spec will be re-read at implement time".
    classification_suggestion: global
    rationale: |
      Cross-SDK applicable. The orchestrator-side launch-time cross-
      check pattern is language-agnostic.

  - id: end-to-end-pipeline-regression-test-above-unit-integration
    type: rule
    severity: MEDIUM
    target: rules/testing.md
    section: "new § 'End-to-End Pipeline Regression Tests Above Unit + Integration'"
    summary: |
      Every canonical pipeline the docs teach (README Quick Start,
      tutorial flow, advertised 3-line example) MUST have a Tier-2-
      or-above regression test that executes the DOCS-EXACT code
      against real infrastructure and asserts the final user-visible
      outcome. Unit tests per primitive cannot catch handoff-field
      gaps because each primitive's unit test constructs fixtures
      with the fields THAT primitive needs.

      Evidence: kailash-ml 1.0.0 W33b —
      test_readme_quickstart_executes_end_to_end at
      packages/kailash-ml/tests/regression/test_readme_quickstart_executes.py
      caught km.train → km.register pipeline broken (TrainingResult
      had no `trainable` field → km.register couldn't resolve .model
      for ONNX export). Every unit test of fit() passed; every unit
      test of register() passed; end-to-end chain raised ValueError
      on every fresh install.

      Rule mandates regression test per documented pipeline in
      tests/regression/ with @pytest.mark.regression and grep-able
      name (includes "quickstart" / "readme" / tutorial name).
    classification_suggestion: global
    rationale: |
      Cross-SDK applicable. The "every primitive tests its own
      fixture" failure mode is language-agnostic. Rust and Python
      both need end-to-end regression tests per canonical pipeline.

  - id: fake-integration-via-missing-handoff-field
    type: rule
    severity: HIGH
    target: rules/zero-tolerance.md
    section: "extend § 'Rule 2: No Stubs' with 'Fake integration via missing handoff field' example"
    summary: |
      Extends the existing zero-tolerance §2 BLOCKED examples list
      (fake encryption, fake transaction, fake health, fake
      classification, fake tenant isolation, fake metrics) with a
      new pattern: a frozen dataclass on a pipeline's critical path
      that omits the field the NEXT primitive needs to consume it.

      TrainingResult(frozen=True) without `trainable` or `.model`
      ships to main passing every unit test (each constructs its own
      TrainingResult with the fields IT needs) while the advertised
      3-line README pipeline breaks on every fresh install. The
      dataclass IS structurally a stub.

      Evidence: kailash-ml 1.0.0 W33b — TrainingResult shipped in
      W31+W33; km.register landed in W33c with no way to resolve
      .model; canonical Quick Start raised ValueError until W33b
      added trainable=self at every Trainable.fit() return site and
      landed packages/kailash-ml/tests/regression/test_readme_quickstart_executes.py.
    classification_suggestion: global
    rationale: |
      Cross-SDK applicable. The frozen-dataclass handoff-field gap
      is language-agnostic (Rust struct equivalent). No variant
      overlay needed; the existing zero-tolerance §2 example list
      is global.

  - id: paired-public-surface-consistent-async-ness
    type: rule
    severity: MEDIUM
    target: rules/patterns.md
    section: "new § 'Paired Public Surface — Consistent Async-ness' after § 'Async vs Sync Runtime'"
    summary: |
      When two top-level functions form a canonical user pipeline
      (train/register, fit/predict, encrypt/decrypt, publish/subscribe,
      login/logout), BOTH MUST be either async OR sync. Mixing
      async with sync-wrapping-asyncio.run() is BLOCKED — the sync
      wrapper raises `RuntimeError: This event loop is already
      running` in every pytest-asyncio / Nexus / Jupyter caller.

      Evidence: kailash-ml 1.0.0 W33/W33c — km.train async (W33),
      km.register landed sync (W33c) with internal asyncio.run().
      Canonical 3-line Quick Start crashed in every async context.
      Fix commit fdd3040e converted km.register to async def.

      BLOCKED rationalizations: "both shapes for flexibility" /
      "asyncio.run handles wrapping" / "sync is a convenience" /
      "async caller is rare" / "we'll document the requirement".
    classification_suggestion: global
    rationale: |
      Cross-SDK applicable at the pattern level. Rust equivalent:
      canonical pipelines should be consistent about async-ness —
      don't mix `async fn` with `fn` that calls `block_on()`, as
      `block_on()` panics inside an active runtime. Variant
      overlay could refine examples but the structural rule is
      language-agnostic.

  - id: merge-time-all-reconciliation-across-shard-base-shas
    type: rule
    severity: MEDIUM
    target: rules/orphan-detection.md
    section: "new § 'Merge-Time __all__ Reconciliation Across Shard Base-SHAs' as Rule 6a"
    summary: |
      When two parallel-worktree shards each edit the same
      __init__.py::__all__ AND the shards branched from different
      base SHAs, git's 3-way merge picks one side arbitrarily — the
      other shard's additions silently orphan.

      Rule mandates merge-time reconciliation protocol: (1) prefer
      HEAD (newest canonical structure), (2) preserve invariants
      from older base (enumerate symbols / counts / semantic groups
      the older shard depended on), (3) update count-dependent
      tests in the same commit, (4) re-run module-scope import
      check from §6.

      Evidence: kailash-ml-audit 2026-04-23 — W33 (base 41a217dc)
      landed 6-group canonical __all__; W31 (base 899ce3e5) added
      7 Trainable adapters. Fix commit fa300831 merged structure +
      invariants, reconciled test_km_all_ordering.py count.
    classification_suggestion: global
    rationale: |
      Cross-SDK applicable. Rust `pub use` re-export reconciliation
      across parallel worktrees exhibits the identical failure mode
      when two shards edit the same crate's prelude / mod.rs re-
      export list.

