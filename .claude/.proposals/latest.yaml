changes:
  - file: skills/26-eatp-reference/eatp-trust-posture-canonical.md
    action: created
    suggested_tier: global
    reason: |
      Authoritative reference for the five canonical TrustPosture names
      (AUTONOMOUS/DELEGATING/SUPERVISED/TOOL/PSEUDO) vs the four
      backward-compat aliases (DELEGATED/CONTINUOUS_INSIGHT/
      SHARED_PLANNING/PSEUDO_AGENT). Contents:
        - autonomy_level table for each canonical posture
        - legacy-name → canonical equivalent mapping (FULL_AUTONOMY →
          AUTONOMOUS, HUMAN_DECIDES → TOOL, BLOCKED → PSEUDO, ASSISTED
          → SUPERVISED) — HUMAN_DECIDES → TOOL is the mapping that keeps
          getting wrong (mapper's approval_required branch returns TOOL,
          autonomy_level 2, not PSEUDO)
        - mapper branch → posture table (from TrustPostureMapper.
          map_verification_result source)
        - serialization contract (.value is lowercase string)
      Evidence: two consecutive session wrapups inverted canonical vs
      alias; third session propagated the inversion into a kaizen agent
      brief before source verification caught it. Pure EATP content —
      should load globally for all Python targets.
    diff_lines: "+86"
  - file: skills/26-eatp-reference/SKILL.md
    action: modified
    suggested_tier: global
    reason: |
      Linked eatp-trust-posture-canonical.md with "Load first when
      touching trust posture tests." Progressive-disclosure entry so
      SKILL.md surfaces the trust posture reference ahead of quickstart
      / api-reference when trust tests are the subject.
    diff_lines: "+1"
  - file: rules/patterns.md
    action: modified
    suggested_tier: global
    reason: |
      Strengthened § Async Resource Cleanup to address the DataFlow
      __del__ deadlock pattern fixed in commit 4f5dbe7f. Additions:
        - MUST NOT call close()/cleanup()/any-logger-touching method
          from __del__
        - DO/DO NOT code examples
        - BLOCKED rationalizations ("we just need to close the
          connection", "async_safe_run handles the event loop", etc.)
        - Origin: commit 4f5dbe7f with the deadlock chain — finalizer
          holds logging root lock → close() → async_safe_run →
          asyncio.new_event_loop → selector init → logger.debug →
          blocks on same lock.
      The deadlock has reappeared in multiple prior sessions ("DataFlow
      unit suite hangs"). The strengthened rule closes the rationalization
      gap that allowed the pattern to be reintroduced.
    diff_lines: "+35"
  - file: rules/orphan-detection.md
    action: modified
    suggested_tier: global
    reason: |
      Added two MUST rules and extended the Detection Protocol:
        - Rule 4: API removal MUST sweep tests in the same PR. One
          orphan test import takes down collection of every test after
          it. BLOCKED rationalizations include "tests cleaned up in
          follow-up PR", "integration tier is separate scope."
        - Rule 5: pytest --collect-only returning 0 is a merge gate.
          Collection failures are invisible under unit-only CI but
          become merge-blocking when anyone runs the full suite.
        - Detection Protocol step 4: run --collect-only across tests/
          and packages/*/tests/ to catch orphans mechanically.
      Origin: 9 orphan test files deleted across commits d3e7e0ef +
      5edc941f, orphaned since the DataFlow 2.0 refactor (53dab715
      "delete 14,500 LOC" in 2026-03).
    diff_lines: "+45"

