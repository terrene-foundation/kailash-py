    classification_suggestion: global
    context:
      'ADDS one subsection: "## Floors On Transitive Deps Are Legitimate When A Lock-Ignoring Install
      Backtracks Them".


      Lesson: dependencies.md "No Caps on Transitive Dependencies" + MUST-NOT "Cap a dependency you do not
      directly import" forbid UPPER bounds (<N) on un-imported packages. They do NOT forbid a minimum FLOOR
      (>=X) on a transitive when a lock-IGNORING install path — CI running `uv pip install -e .` / `pip
      install -e .` WITHOUT `uv sync --locked` / `--frozen` — fresh-resolves that transitive to a version
      with no wheel for a supported interpreter. The floor is a concrete install-failure fix, not speculation;
      it MUST carry an inline comment naming the lock-ignoring path + the no-wheel version it prevents,
      so a future reader does not mistake it for the speculative cap the rule forbids and revert it. Distinct
      from the existing section "Phantom Transitive Deps — Resolve Via uv lock" (which DROPS an un-imported
      transitive); here the transitive is load-bearing via a direct dep and must stay, floored. Two install
      paths must BOTH succeed (locked via uv.lock + lock-ignoring fresh-resolve); only the manifest floor
      covers the second.


      Evidence (ground-truth re-verified this session): #1430 kailash-ml `numba>=0.61` floor (packages/kailash-ml/pyproject.toml:68
      on main, whose inline comment already references "rules/dependencies.md (NOT a cap)" — the floor author
      had to reason AROUND the rule, which is the gap this codify closes). The align CI (.github/workflows/test-kailash-align.yml:103/109/110
      and the dev/rlhf jobs) installs via lock-ignoring `uv pip install -e`; a fresh resolve on Python 3.12+
      backtracked `numba` (transitive via umap-learn -> pynndescent; no direct import — grep confirmed)
      to 0.53.1, whose llvmlite failed to build from source. Locked installs were green (the lock pinned
      numba); only the lock-ignoring CI path broke.


      Classification rationale: GLOBAL — the floor-vs-cap-vs-phantom distinction for transitive deps under
      a lock-ignoring install is CLI-neutral and cross-SDK (the Cargo analogue: a lock-ignoring `cargo build`
      can backtrack a transitive crate to a version without a prebuilt artifact / MSRV-incompatible release;
      the principle holds, the manifestation differs). The DO/DO-NOT example is Python-specific (numba/llvmlite/wheels);
      Gate-1 MAY classify a kailash-rs variant note carrying the Cargo manifestation. Refines the global
      dependencies.md, no py-only semantics in the rule body.


      rule-authoring Rule 10 (proximity-band): dependencies.md is priority:10/scope:path-scoped (NOT baseline)
      -> proximity-band gate does NOT fire; no paired-extraction/named-rationale required. Self-referential
      /codify gate: dependencies.md is NOT on self-referential-codify.md Rule 2''s allowlist -> the mandatory
      multi-agent redteam-with-tests round does NOT fire; a recommended single reviewer pass ran instead.


      Gate-1 FOLLOW-UPs (out of scope for this BUILD codify): (a) the new subsection pushes dependencies.md
      slightly over rule-authoring.md''s 200-line guidance (~213 lines); path-scoped so no proximity-band
      gate, but Gate-1 MAY add a named length-rationale or extract to the dependencies rule-extract guide.
      (b) dependencies.md carries NO Trust Posture Wiring section (none of its sections do); this subsection
