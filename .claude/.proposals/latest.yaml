      \ the gate\nwas bypassed, not verified. Recorded as Trap-1 in the prior session's\n`.session-notes`.\
      \ The CI-watch-races-the-duplicate-run pattern is the recurrence\nthis clause prevents.\n\nCLASSIFICATION\
      \ rationale: GLOBAL. The duplicate-`pull_request`-run race + the\ncheck-then-merge-separately discipline\
      \ are CLI-neutral (gh CLI, language-neutral)\nand apply to every repo using GitHub PR CI with concurrency\
