source_repo: kailash-py
codify_date: "2026-04-23"
codify_session: |
  Session 2026-04-23 — kailash-ml 1.0.0 M1 foundations release wave (W30 +
  W31/W32 M10 + W33 wrappers + W33b/c regression). Branch
  `feat/kailash-ml-1.0.0-m1-foundations`. Merged 6 M10 shards across 7
  packages (kailash 2.9.0, kailash-dataflow 2.1.0, kailash-nexus 2.2.0,
  kailash-kaizen 2.12.0, kailash-align 0.6.0, kailash-pact 0.10.0,
  kailash-ml 1.0.0). W33 shipped `km.*` top-level wrappers; W33c shipped
  `km.register`; W33b landed the canonical README end-to-end regression
  test that caught a `km.train → km.register` pipeline break.

  Eight institutional lessons emerged and are codified this cycle. (1)
  Anthropic throttles simultaneous Opus worktree-agent launches — 6 Opus
  agents launched in one burst ALL died at 34–45s with rate-limit errors;
  waves of ≤3 succeeded. (2) Parallel worktrees branched from different
  base SHAs merged cleanly ONLY because packages didn't overlap; no
  structural defense existed. (3) 3 of 6 shards used harness-default
  `worktree-agent-<hash>` branch names instead of the prompt-specified
  `feat/<shard>` names. (4) Orchestrator-side amending of todo text at
  launch time (version bumps to reflect shipped state, symbol counts to
  reflect spec changes) saved two failed shards. (5) End-to-end README
  regression test caught a pipeline break invisible to per-primitive
  unit + integration tests. (6) `TrainingResult(frozen=True)` without a
  `trainable` field shipped to main despite passing every unit test —
  the dataclass was structurally a stub because it couldn't support the
  next primitive's contract. (7) `km.train` async but `km.register` sync
  (with internal `asyncio.run()`) crashed in every pytest-asyncio /
  Nexus / Jupyter caller. (8) Parallel shards on different base SHAs
  each edited the same `__init__.py::__all__`; merge silently picked
  one side, dropping the other's additions.

  Each pattern is codified against an existing rule file (no new rule
  files needed — all 8 slot into existing institutional-knowledge
  locations). Prior proposal (2026-04-20, status=distributed) was
  archived by the parent orchestrator before this codify cycle started.

status: pending_review
