  - id: worktree-branch-rename-leak-to-main-candidate-rule
    type: rule
    severity: MEDIUM
    target: rules/worktree-isolation.md (candidate new §7)
    section: "candidate new MUST Rule — ref-manipulation commands by worktree agents MUST NOT propagate to MAIN after worktree cleanup"
    summary: |
      Novel failure mode surfaced during deferred-codify cycle
      (2026-04-23): a worktree agent (deferred-a2) was sent a
      SendMessage'd `git branch -m <new-name>` instruction to
      rename its branch. Between the SendMessage and the agent's
      execution turn, the worktree was auto-cleaned (zero-commit
      safeguard). The agent's bash commands ran in the MAIN
      checkout (fallback to parent dir when worktree path
      disappeared). The `git branch -m` renamed MAIN's current
      branch (feat/kailash-ml-1.0.0-m1-foundations →
      feat/deferred-a2-rules-extraction-batch1). A2 self-checked,
      detected the drift, and refused to edit.

      Current Rule 5 (incremental commit discipline) prevents
      zero-commit auto-clean data loss but does NOT prevent the
      adjacent failure where a pre-commit ref-manipulation
      command (branch rename, reset, checkout) leaks into MAIN
      after the worktree dissolves.

      Candidate extension: "Rule 7 — Worktree Agents MUST NOT
      Run Ref-Manipulation Commands Before First Commit. `git
      branch -m`, `git reset --hard`, `git checkout -b`, `git
      update-ref` issued by a worktree agent BEFORE the agent
      has landed ≥1 commit MUST be considered suspect — if the
      worktree is subsequently cleaned (intentionally or via
      truncation), those ref changes propagate to whichever
      checkout holds the branch, which is typically MAIN. The
      orchestrator's resume-protocol MUST be issued as an
      atomic 'commit the no-op first, then rename' sequence
      rather than 'rename, then proceed.'"

      Not drafting the rule in this commit — needs one more
      occurrence to confirm it's a pattern not a one-off, and
      the rule requires DO/DO NOT examples + BLOCKED
      rationalizations per rule-authoring.md meta-rule.
      Flagging for next codify cycle.
    classification_suggestion: global
    rationale: |
      Worktree-isolation failure modes are language-neutral;
      the failure mode affects any orchestrator using git
      worktrees to parallelize agents. Candidate rule applies
      cross-SDK unchanged.

