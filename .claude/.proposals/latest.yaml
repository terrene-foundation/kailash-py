      packages/kailash-trust/ is a 104-LOC re-export shim listing 39 symbols
      from kailash.trust.*. Zero test files, zero production consumer
      imports through the shim (only docs references). The underlying
      kailash.trust.* code IS properly tested. Disposition: either (a)
      add Tier 2 smoke test that round-trips through one manager via
      the kailash_trust.* namespace, or (b) delete packages/kailash-trust/
      and direct users to kailash directly. Packaging decision needed.

  - id: dialect-quote-identifier-core-drift
    severity: MEDIUM
    target: future session
    summary: |
      rules/dataflow-identifier-safety.md MUST Rule 1 mandates
      dialect.quote_identifier() on every dynamic DDL path. grep
      "quote_identifier" src/ returns zero matches — helper lives only
      in packages/kailash-dataflow/src/dataflow/adapters/. Core
      src/kailash/db/dialect.py has only _validate_identifier
      (validate-only, no quoting), which the rule explicitly deems
      insufficient. ConnectionManager.create_index() interpolates
      identifiers via f-string after validation. Either mirror the
      DataFlow dialect contract into core OR amend specs/infra-sql.md
      to document the intentional split.

