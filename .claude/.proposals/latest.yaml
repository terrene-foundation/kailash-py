source_repo: kailash-py
codify_date: "2026-04-25"
codify_session: |
  Session 2026-04-25 — 11-issue resolution wave (PR #619 bundled — 5 issues
  implemented + closed: #598 plan-suspension, #600 mcp-transports, #602
  orchestration-runtime, #603 budget-callback, #618 nexus-ws-unicast; 6
  dispositioned: #596/#599 spec-gated on mint, #604/#606 cross-SDK gated,
  #605/#607 multi-shard with scoping briefs). Hotfix kaizen 2.13.0→2.13.1
  via PR #620 caught by post-release clean-venv check. PyPI live: kailash
  2.10.0, kailash-nexus 2.3.0, kailash-kaizen 2.13.1.

  Two institutional lessons emerged from the kaizen 2.13.0→2.13.1 hotfix
  cycle, both codified locally and proposed upstream this cycle:

  (1) `__init__.py` module-scope imports of co-installed-but-NOT-declared
  sibling packages MUST be wrapped in `try/except ImportError` with side-
  effects in the `else` branch. Editable installs in dev environments hide
  the failure mode (every dev has the sibling installed); a clean PyPI
  install raises `ModuleNotFoundError` at the FIRST `import <package>`,
  blocking every downstream consumer. Codified as a new MUST sub-rule in
  `dependencies.md` § "Declared = Imported".

  (2) When the post-release clean-venv check fails, the broken pattern is
  the scope of the hotfix — NOT just the most-recent PR's diff. The same
  failure may have been latent in main for many sessions, hidden behind
  editable installs. Codified as an extension to `build-repo-release-
  discipline.md` Rule 2 ("Latent failures count").

  Both lessons reinforce existing rules — the first prevents the failure
  class structurally, the second tightens the diagnostic discipline when
  the structural defense was missing. Together they close the loop the
  kaizen 2.13.1 hotfix exposed.

