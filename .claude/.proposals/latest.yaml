      (host / python_version / git_sha / device_family / device_fallback_reason
      / tenant_id / ...), COMPLETED/FAILED/KILLED run-status auto-set.
      These represent specs/ml-tracking.md §2.2 + §2.4 being authoritative
      against code that still stubs. Either the spec needs a deviation
