        - "pyproject.toml version bump 0.3.2 → 0.4.0"
        - "CHANGELOG.md 0.4.0 entry"
        - "16 Tier 1 unit tests"
        - "6 Tier 2 integration tests"
        - "specs/alignment-diagnostics.md"
