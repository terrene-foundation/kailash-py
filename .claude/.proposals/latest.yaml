      cited field/branch/lockfile/helper name, or a guard''s create→teardown lifecycle) MUST update the
      command↔skill mirror in the SAME shard (security.md Multi-Site-Plumbing one abstraction up); (2) /redteam
      MUST run a command↔skill parity sweep over the 5 shared-step axes (a same-step contradiction = MED,
      HIGH if it drops a security guard or sends an operator to a wrong command); (3) a cited security/enforcement
      guard''s lifecycle MUST be verified to span the ENTIRE protected window (retry loops, re-entry, abandon)
      — "registered" ≠ "covers the whole window".

