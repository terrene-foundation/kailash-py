# Codification proposal from fix/nexus-connection-stampede
# Created: 2026-04-01
# Source: PR #213 (fixes #211, #212)

artifacts:
  - type: rule
    action: update
    target: rules/dataflow-pool.md
    classification: global  # applies to both py and rs
    change: |
      Add Rule 7: Batch DDL Operations
      When creating tables for multiple models, MUST batch all DDL into a single
      database connection. Per-model open/execute/close cycles create connection
      churn that overwhelms Docker Desktop's vpnkit proxy.
      Pattern: Use execute_ddl_batch() not execute_ddl() in loops.

  - type: rule
    action: update
    target: rules/connection-pool.md
    classification: variant/py  # py-specific (rs uses Preset enum)
    change: |
      Add Rule 7: Nexus Gateway Auto-Detect Workers
      MUST NOT hardcode max_workers in gateway creation. Use auto-detect
      (min(4, cpu_count)) or explicit env var (NEXUS_MAX_WORKERS).
      MUST share Nexus runtime with gateway — no orphan runtimes.

  - type: skill
    action: create
    target: skills/project/nexus-connection-safety.md
    classification: variant/py
    change: |
      New skill documenting Nexus connection safety patterns:
      - server_type/max_workers configuration
      - NEXUS_SERVER_TYPE/NEXUS_MAX_WORKERS env vars
      - Runtime sharing between Nexus and gateway
      - Batch DDL for auto_migrate

red_team_findings:
  deferred:
    - C1: SQL injection in _generate_indexes_sql — pre-existing, needs _validate_identifier() calls
    - H4: Unbounded _performance_metrics lists in Nexus core — needs deque(maxlen=10000)
