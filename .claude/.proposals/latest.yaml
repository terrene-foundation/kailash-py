      "APPEND 2026-06-25 (session-continuation codify). ADDS one bullet to git.md\n§ Discipline:\
      \ \"CI-check and merge are separate steps under duplicate-run races\".\n\nLESSON (the gap): git.md\
      \ § Discipline + § \"Pre-FIRST-Push CI Parity Discipline\"\ngovern push-time CI parity, but NO clause\
      \ governs the WATCH-then-MERGE window.\nWhen a PR has been pushed and CI is running, `gh pr checks\
      \ --watch` can resolve\nGREEN on the PRIOR head commit while a NEW duplicate `pull_request` run (the\n\
      `concurrency: cancel-in-progress` / re-trigger pattern) flakes RED on the SAME\nPR. An agent that\
      \ bundles the check and the merge into one command\n(`gh pr checks <N> && gh pr merge <N>`, or `--watch`\
      \ immediately followed by\n`gh pr merge`) can land the merge over a stale-green or red duplicate run\
      \ —\nbypassing the gate it believed it had cleared.\n\nPROPOSED git.md § Discipline bullet (Gate-1\
      \ may refine wording/placement):\n---8<--- BEGIN PROPOSED TEXT\n- **CI-check and merge are SEPARATE\
      \ steps under duplicate-run races**:\n  `gh pr checks --watch` can resolve green on the PRIOR head\
      \ commit while a NEW\n  duplicate `pull_request` run flakes red on the SAME PR (the\n  `concurrency:\
      \ cancel-in-progress` re-trigger pattern). Checking CI and merging\n  MUST be separate commands: (1)\
      \ READ — pin the exact head SHA\n  (`gh pr view <N> --json headRefOid`) and confirm every REQUIRED\
      \ check is\n  `conclusion=SUCCESS` on THAT SHA; (2) MERGE — only then `gh pr merge <N>`.\n  Bundling\
      \ them in one command (`gh pr checks <N> && gh pr merge <N>`, or\n  `--watch` immediately followed\
      \ by the merge) is BLOCKED — the watch can return\n  green on a stale commit and the merge then lands\
      \ over an unverified or red\n  duplicate run.\n\n  ```bash\n  # DO — check as a READ step on the exact\
      \ head, THEN merge\n  head=$(gh pr view <N> --json headRefOid -q .headRefOid)\n  gh pr checks <N>\
      \                       # confirm required checks SUCCESS on $head\n  gh pr merge <N> --admin --merge\
      \        # separate command, after the read\n\n  # DO NOT — bundle watch + merge (watch may be green\
      \ on the prior commit)\n  gh pr checks <N> --watch && gh pr merge <N> --admin --merge\n  ```\n\n**Why:**\
      \ With duplicate `pull_request` runs, a `--watch` that returns green may\nhave resolved against the\
      \ prior commit's run while a newer duplicate run on the\ncurrent head is still pending or flaked red;\
      \ bundling the merge to that exit\ncode lands over an ungated state. Separating the read (pinned to\
      \ the head SHA)\nfrom the merge makes the gate verifiable.\n---8<--- END PROPOSED TEXT\n\nEVIDENCE\
      \ (this repo, prior session): kailash-py PR #1465 (engine pyright + CI\nregression wiring) was admin-merged\
      \ while a flaky-red duplicate `pull_request`\nrun showed on `gh pr checks`; main was independently\
