changes:
  - id: pre-commit-comment-matcher-quirk
    type: rule_addition
    location: rules/git.md § Discipline
    classification_suggestion: global
    classification: global
    rationale: |
      Pre-commit hooks are language-agnostic and CLI-agnostic. The
      `python-use-type-annotations` hook ships with `pre-commit-hooks`,
      which every BUILD repo uses. Same regex would trigger on `kailash-rs`
      Python tooling if any. No language or CLI variance.
    diff_summary: |
      Adds a new Discipline bullet between "Pre-commit hook workarounds"
      and "Commit-message claim accuracy":

        - **Pre-commit comment-syntax matchers**: the
          `python-use-type-annotations` hook regex matches `# type` (NOT
          `# type:`) per `pre-commit-hooks/.pre-commit-hooks.yaml::pygrep`.
          Comments referencing the `types` module — `# types.UnionType for
          PEP 604` — trigger a false positive. Reword to avoid `# type` as
          a literal substring (e.g. "PEP 604 produces `types.UnionType`"
          → "PEP 604 produces a union type"). Same class for any future
          `pygrep` hook that matches comment fragments without the
          trailing punctuation.

  - id: uv-index-cache-refresh
    type: rule_clarification
    location: rules/build-repo-release-discipline.md § MUST Rule 2
    classification_suggestion: global
    classification: global
    rationale: |
      `uv` is the mandated package manager per `python-environment.md`
      Rule 1; the cache-override is `uv`-specific (`pip` has shorter index
      TTL and does not need the flag). Same surface for kailash-rs if it
      ever moves to a `uv`-equivalent index cache. No language variance.
    diff_summary: |
      Adds a paragraph after the existing "PyPI cache lag" note:

        **`uv` index-cache override**: when `pypi.org/pypi/<pkg>/<ver>/json`
        returns the new metadata BUT `uv pip install "<pkg>==<ver>"` reports
        `No solution found ... no version of <pkg>==<ver>`, the gap is
        `uv`'s local index cache, not PyPI. Pass `--refresh` to force a
        re-fetch: `uv pip install --refresh "<pkg>==<ver>"`. The pip-direct
        path (`/tmp/verify/bin/pip install ...`) does not need this flag
        because pip's index TTL is shorter, but the
        build-repo-release-discipline standard is `uv` per
        `python-environment.md` Rule 1, so `--refresh` is the documented
        unblocker for the install-verification step.

