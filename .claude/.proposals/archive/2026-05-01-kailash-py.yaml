source_repo: kailash-py
codify_date: "2026-05-01"
codify_session: |
  Session 2026-05-01 — paired patch cut (#767 SSE durability + #768 parameterized
  generics + #750 list-cache invalidation) shipped end-to-end through
  admin-merge → tag → publish-pypi → clean-venv install verification.

  Two narrow tooling-quirk learnings surfaced during the cycle:

  1. **Pre-commit `python-use-type-annotations` hook regex matches `# type`
     not `# type:`.** Hit while writing the #768 fix in
     `dataflow/core/type_processor.py` — comment said
     `# types.UnionType for PEP 604` and the hook flagged it as a legacy
     `# type:` annotation comment. Cost one commit-retry cycle to diagnose.
     The regex source is
     `pre-commit-hooks/.pre-commit-hooks.yaml::pygrep` =>
     `'# type(?!: *ignore([^a-zA-Z0-9]|$))'`. Any comment starting with
     `# type` (no colon) followed by anything but `: ignore` triggers.

  2. **PyPI simple-index lag requires `uv pip install --refresh`.** Hit
     during the #770 / #771 release verification — `pypi.org/.../json`
     returned the new version metadata immediately after publish-pypi.yml
     succeeded, but `uv pip install "kailash-dataflow==2.7.3"` reported
     `No solution found, no version of kailash-dataflow==2.7.3`. Cause:
     `uv`'s local index cache. Adding `--refresh` resolved it instantly.
     `build-repo-release-discipline.md` Rule 2 already mandated retry
     with 60s pause but did not name `--refresh` as the unblocker.

  Neither is a new structural pattern — both extend existing rules with
  one-paragraph clarifications.

