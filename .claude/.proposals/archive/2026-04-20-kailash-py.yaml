changes:
  - id: testing-pytest-plugin-declaration-pair
    type: rule
    severity: HIGH
    target: rules/testing.md
    section: "MUST: Pytest Plugin + Marker Declaration Pair"
    summary: |
      Any test file that uses @pytest.mark.X decorator or an X fixture
      MUST have the corresponding pytest-X plugin declared in the
      sub-package's [dev] extras AND register X in the pytest markers
      config in the same commit. Un-declared plugin usage BLOCKS test
      collection with "'X' not found in markers configuration option"
      — identical failure class to the declared=imported rule in
      dependencies.md but for pytest plugins specifically.
    classification_suggestion: global
    rationale: |
      The failure mode is pytest-specific but language-agnostic within
      Python. kailash-rs uses cargo test which has its own equivalent
      pattern (proptest features, tokio-test features) that could hit
      the same declared-vs-used drift. Cross-SDK applicable.
    evidence:
      session: "2026-04-20"
      finding: |
        `packages/kailash-kaizen/tests/e2e/memory/test_persistent_buffer_e2e.py`
        used @pytest.mark.benchmark + benchmark fixture from pytest-benchmark;
        neither the plugin nor the marker was declared anywhere. Collection
        blocked 11,917 tests until commit 1313ae56 added pytest-benchmark>=4.0.0
        to kaizen [dev] + registered `benchmark` in markers.
      additional_context: |
        The broader pattern: pytest plugins are the invisible middle layer.
        Sub-package [dev] extras declare them; root pyproject.toml ini_options
        register their markers. Either layer can silently drift and both
        must align for collection to pass.

  - id: orphan-detection-collect-only-per-package-extras
    type: rule
    severity: MEDIUM
    target: rules/orphan-detection.md
    section: "§5a: Collect-Only Gate Per Sub-Package With [dev] Extras"
    summary: |
      Existing §5 mandates `pytest --collect-only` as a merge gate but
      implies a single root-venv invocation across every test directory.
      Monorepos with sub-package test-only deps (hypothesis in pact,
      respx in kaizen, pytest-benchmark in kaizen) cannot satisfy that
      shape — python-environment.md Rule 4 explicitly BLOCKS duplicating
      sub-package test deps in root [dev]. This proposal clarifies that
      the gate passes when EITHER (a) the root venv is bootstrapped with
      every sub-package's [dev] extras (`uv pip install -e packages/X[dev]`)
      OR (b) collection runs per-package inside the sub-package's own
      venv. Single combined root-venv invocation is NOT a requirement.
    classification_suggestion: global
    rationale: |
      Monorepo sub-package test-dep separation is a Python idiom; the
      equivalent in Rust is workspace-level dev-dependencies per-crate,
      which cargo already handles cleanly. The rule extension is
      Python-specific in mechanism but documents a general monorepo
      principle: collection-gate granularity matches dep-graph granularity.
    evidence:
      session: "2026-04-20"
      finding: |
        Attempted `pytest --collect-only tests/ packages/*/tests/`
        from root venv produced ImportPathMismatchError (2 conftest.py
        both register as `tests.conftest`) + ModuleNotFoundError for
        hypothesis + respx + pytest-benchmark. Per-package collection
        against each `packages/X/tests/` directory after installing
        `packages/X[dev]` extras succeeded for all 9 sub-packages.

  - id: specs-authority-full-sweep-on-edit
    type: rule
    severity: MEDIUM
    target: rules/specs-authority.md
    section: "MUST 5b: Full-Specs Re-Derivation On Edit"
    summary: |
      Extension of MUST Rule 5 (Spec Files Are Updated at First Instance).
      Add a sibling clause: every spec edit MUST trigger a re-derivation
      sweep against the FULL sibling-spec set in the same domain
      (specs/ml-*.md for ML edits, specs/dataflow-*.md for DataFlow edits,
      specs/nexus-*.md for Nexus edits), not only the edited file. Three
      categories of finding only emerge from the full sweep:
        1. Field-shape divergence — sibling specs reference the changed
           dataclass differently.
        2. Downstream consumer drift — specs whose mandates depend on
           the changed surface are now stale.
        3. Cross-spec terminology drift — same concept named two ways
           across files.
    classification_suggestion: global
    rationale: |
      Cross-SDK: kailash-rs has the same specs/ layout with the same
      cross-spec drift hazard. The rule is conceptually about spec
      authoring discipline, not language-specific mechanism.
    evidence:
      session_1: "2026-04-19 (journal 0007)"
      session_2: "2026-04-20 (journal 0008)"
      pattern_recurrence: |
        Round 3 narrow scope ("specs I just edited") produced 14/14 green
        APPROVE. Round 4 full-specs scope found 9 HIGH findings in the
        SAME ML domain because ml-tracking §2.2/§2.4 and ml-engines §6.1
        were never part of Phase 1 scope. The scope-narrowing caused a
        false-confidence APPROVE. Two sessions now confirm the pattern;
        rule extension strengthened by reproducibility.

cross_sdk_parity:
  - kailash-rs equivalent: |
      All 3 rule additions apply to kailash-rs. The pytest-plugin rule
      generalizes to cargo test feature-flag declaration. The collect-only
