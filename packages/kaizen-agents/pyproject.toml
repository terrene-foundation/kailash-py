[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kaizen-agents"
version = "0.11.0"
description = "PACT-governed autonomous agent engines built on Kailash Kaizen SDK"
authors = [{name = "Terrene Foundation", email = "info@terrene.foundation"}]
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    # ─────────────────────────────────────────────────────────────
    # kaizen-agents core. Audit (#890):
    # - kailash + kailash-kaizen + openai required (module-scope).
    # - httpx is function-local; small, kept core for ergonomics.
    # - kailash-pact, python-dotenv, structlog were all ORPHANS
    #   (zero imports anywhere in src/kaizen_agents/). DELETED.
    #   PACT semantics are reached via `kailash.trust.pact.*` (in
    #   `kailash` core), not the separate `kailash-pact` package.
    # ─────────────────────────────────────────────────────────────
    "kailash>=2.14.0",
    "kailash-kaizen>=2.36.0",  # requires the retired kaizen.providers.registry.get_provider_for_model + four-axis LlmClient.stream (#1720 Wave-2a/2b)
    "openai>=1.30.0",
    "httpx>=0.27.0",
    # Provider SDKs imported at runtime by the delegate / runtime adapters.
    # anthropic: delegate/adapters/anthropic_adapter.py + orchestration/adapters.py.
    # google-genai: delegate/adapters/google_adapter.py + runtime_adapters/gemini_cli.py
    #   (migrated off the deprecated google-generativeai per #1351).
    # A normal `pip install kaizen-agents` MUST resolve them or the Anthropic /
    # Gemini paths raise ImportError at adapter construction.
    "anthropic>=0.40.0",
    "google-genai>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.2.0",
    "pytest-cov>=4.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[project.urls]
"Homepage" = "https://github.com/terrene-foundation/kailash-py"
"Bug Tracker" = "https://github.com/terrene-foundation/kailash-py/issues"

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["tests*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
markers = [
    "unit: fast isolated unit tests (Tier 1)",
    "integration: integration tests against real infrastructure (Tier 2)",
    "regression: regression tests pinning a fixed bug (NEVER delete)",
]

[tool.black]
line-length = 88
target-version = ["py311", "py312", "py313"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
# Style-preference rules disabled at project level — kept the bug-class rules
# (E*, F*, B9*, UP*, SIM118) and only suppress nested-if / contextlib.suppress
# / negated-return / ternary-rewrite / dict-dispatch suggestions that frequently
# obscure intent in the agent / pattern code (clearer to leave nested if/try forms).
# Per-site `# noqa: <code>` is still preferred when the rule otherwise fires
# but the local intent argues for keeping the original form.
ignore = [
    "E501",   # line-length (Black handles this)
    "SIM102", # collapsible nested if — often clearer as written for agent code
    "SIM103", # negated return — readability is per-site judgment
    "SIM105", # contextlib.suppress — the try/except form is more grep-friendly here
    "SIM108", # ternary — nested if-else with explanatory branches stays clearer
    "SIM116", # dict dispatch — branch logic with side effects keeps if-elif
]

[tool.ruff.lint.isort]
known-first-party = ["kaizen", "kaizen_agents", "kailash"]

[tool.isort]
profile = "black"
known_first_party = ["kaizen", "kaizen_agents", "kailash"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true
