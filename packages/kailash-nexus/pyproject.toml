[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kailash-nexus"
version = "2.13.0"
description = "Zero-configuration multi-channel workflow orchestration platform"
authors = [{name = "Terrene Foundation", email = "info@terrene.foundation"}]
readme = "README.md"
license = {text = "Apache-2.0"}
keywords = ["workflow", "orchestration", "automation", "api", "cli", "mcp"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
]
dependencies = [
    # nexus is the canonical Kailash API server wrapper. `import nexus`
    # eagerly pulls `kailash.servers.gateway` (lazy-loaded from root kailash
    # via __getattr__) which transitively requires the full server middleware
    # stack: admin/user_management (bcrypt), middleware/auth/jwt (PyJWT),
    # middleware/database (sqlalchemy), gateway/security (cryptography).
    #
    # Per `deployment.md` MUST rule "Optional Dependencies Pin to
    # PyPI-Resolvable Versions", we DECLARE these deps directly rather than
    # pinning `kailash[server]>=2.16.0` — the [server] extra does not exist
    # on PyPI for kailash 2.16.0 / 2.17.0 (it lands with #890 in 2.18.0+).
    # Tag-push CI installs `kailash` from PyPI before the new release is
    # published, so `kailash[server]` would silently drop the extra.
    # Direct declaration is dialect-stable across the release boundary.
    "kailash>=2.50.0",
    # Server middleware stack (matches kailash[server] contents).
    "fastapi>=0.104.0",
    "starlette>=0.36.0",
    "uvicorn[standard]>=0.24.0",
    "aiohttp>=3.12.4",
    "aiohttp-cors>=0.7.0",
    "httpx>=0.25.0",
    "aiofiles>=24.1.0",
    "bcrypt>=4.3.0",
    "PyJWT>=2.8",
    "sqlalchemy>=2.0.0",
    "cryptography>=41.0",
    # Directly imported by nexus/transports/websocket.py — per
    # dependencies.md "Declared = Imported", declare even though
    # uvicorn[standard] pulls it transitively.
    "websockets>=12.0",
    "requests>=2.28",
    "janus>=1.0",
    # Multipart body extractors (issue #1174 AC 4). `python-multipart` backs
    # Starlette's `request.form()` MultiPartParser (the transport parser the
    # Multipart / UploadFile resolver dispatches to); `puremagic` is the
    # pure-Python (no native libmagic) content-sniff MIME deriver — handlers
    # see a sniffed `content_type`, never the attacker-controllable client
    # header. Per `dependencies.md` "Declared = Imported", both are declared
    # as core deps because the resolver imports them on the multipart path
    # (puremagic degrades to client-declared MIME + WARN when its import
    # fails, but the import IS attempted; python-multipart has no degrade
    # path — Starlette raises AssertionError without it).
    "python-multipart>=0.0.9",
    "puremagic>=1.0",
]
requires-python = ">=3.11"

[project.optional-dependencies]
metrics = ["prometheus_client>=0.20"]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    # Imported at module scope by tests/integration/auth/test_sso_integration.py
    # — required for `pytest --collect-only` to return exit 0
    # (orphan-detection.md §5 merge gate).
    "pytest-httpserver>=1.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (real services)",
    "e2e: End-to-end tests (complete flows)",
]
