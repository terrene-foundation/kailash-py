[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "eatp"
version = "0.1.0"
description = "Enterprise Agent Trust Protocol SDK — cryptographic trust chains, delegation, and verification for AI agent systems"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "Terrene Foundation" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
readme = "README.md"
keywords = ["trust", "agent", "delegation", "verification", "cryptography", "EATP", "AI", "governance"]
dependencies = [
    "pynacl>=1.5",
    "pydantic>=2.6",
    "jsonschema>=4.21",
    "click>=8.0",
]

[project.urls]
Documentation = "https://docs.terrenefoundation.org/eatp"
Repository = "https://github.com/terrene-foundation/kailash_python_sdk/tree/main/packages/eatp"
Issues = "https://github.com/terrene-foundation/kailash_python_sdk/issues"

[project.scripts]
eatp = "eatp.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "hypothesis>=6.98",
    "mypy>=1.8",
    "ruff>=0.3",
    "coverage>=7.4",
]
postgres = [
    "asyncpg>=0.29",
    "sqlalchemy[asyncio]>=2.0",
]
aws-kms = [
    "boto3>=1.34",
]
observability = [
    "opentelemetry-api>=1.20",
]
all = ["eatp[postgres]", "eatp[aws-kms]", "eatp[observability]"]

[tool.hatch.build.targets.wheel]
packages = ["src/eatp"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "TCH"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["eatp"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "postgres: marks tests requiring PostgreSQL",
    "benchmark: marks performance benchmark tests",
]

[tool.coverage.run]
source = ["eatp"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/a2a/*",
    "*/esa/*",
    "*/governance/*",
    "*/registry/*",
    "*/messaging/*",
    "*/knowledge/*",
    "*/orchestration/*",
    "*posture_agent*",
    "*audit_service*",
    "*graph_validator*",
    "*rotation*",
    "*crl*",
    "*security*",
    "*pseudo_agent*",
    "*cache*",
    "*timestamping*",
    "*trusted_agent*",
    "*multi_sig*",
    "*execution_context*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
    "pass",
    "@abstractmethod",
]

[tool.coverage.html]
directory = "htmlcov"
