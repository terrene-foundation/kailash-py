[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trust-plane"
version = "0.2.1"
description = "TrustPlane — EATP-powered trust environment for human-AI collaborative work"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Terrene Foundation", email = "info@terrene.foundation" },
]
keywords = ["eatp", "trust", "attestation", "governance", "accountability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "eatp>=0.1.0,<1.0.0",
    "click>=8.0",
    "filelock>=3.0",
    "mcp>=1.0.0",
]

[project.urls]
Documentation = "https://docs.terrenefoundation.org/trust-plane"
Repository = "https://github.com/terrene-foundation/kailash_python_sdk/tree/main/packages/trust-plane"
Issues = "https://github.com/terrene-foundation/kailash_python_sdk/issues"

[project.scripts]
attest = "trustplane.cli:main"
trustplane-mcp = "trustplane.mcp_server:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]
postgres = [
    "psycopg[binary]>=3.0",
    "psycopg_pool>=3.0",
]
aws = [
    "boto3>=1.26",
]
azure = [
    "azure-keyvault-keys>=4.8",
    "azure-identity>=1.12",
]
vault = [
    "hvac>=2.0",
]
encryption = [
    "cryptography>=41.0",
]
sso = [
    "PyJWT>=2.8",
    "cryptography>=41.0",
]
windows = [
    "pywin32; sys_platform == 'win32'",
]

[tool.hatch.build.targets.wheel]
packages = ["src/trustplane"]
exclude = ["**/.claude", "**/__pycache__"]

[tool.hatch.envs.default]
dependencies = [
    "eatp @ {root:uri}/../eatp",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "security: marks tests as security regression tests for hardened patterns",
    "unit: Unit tests (no I/O, no network)",
    "integration: Integration tests (real stores, files)",
    "e2e: End-to-end tests (full workflows, servers)",
]
