<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrustPlane Dashboard${title_suffix}</title>
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e2e5ea;
    --text: #1a1d23;
    --text-secondary: #5a5f6b;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --green: #16a34a;
    --green-bg: #dcfce7;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --yellow: #ca8a04;
    --yellow-bg: #fef9c3;
    --blue-bg: #dbeafe;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
  }
  .sidebar-brand {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .sidebar-brand h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .sidebar-brand .subtitle {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .nav-section {
    padding: 8px 12px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
    font-weight: 600;
  }
  .nav-link {
    display: block;
    padding: 8px 20px;
    color: var(--text-secondary);
    font-size: 14px;
    transition: background 0.15s, color 0.15s;
  }
  .nav-link:hover {
    background: var(--bg);
    color: var(--text);
    text-decoration: none;
  }
  .nav-link.active {
    background: var(--blue-bg);
    color: var(--primary);
    font-weight: 600;
  }

  /* Main content */
  .main {
    padding: 32px 40px;
    max-width: 1100px;
  }
  .page-header {
    margin-bottom: 28px;
  }
  .page-header h2 {
    font-size: 22px;
    font-weight: 700;
  }
  .page-header p {
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 4px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Stat grid */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.2;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.6;
  }
  .badge-pass { background: var(--green-bg); color: var(--green); }
  .badge-fail { background: var(--red-bg); color: var(--red); }
  .badge-pending { background: var(--yellow-bg); color: var(--yellow); }
  .badge-info { background: var(--blue-bg); color: var(--primary); }

  /* Table */
  .table-wrap {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text-secondary);
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
  }
  .filter-bar select, .filter-bar input {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: var(--surface);
  }
  .filter-bar label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Pagination */
  .pagination {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    justify-content: center;
  }
  .pagination a {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .pagination a:hover { background: var(--bg); text-decoration: none; }
  .pagination a.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* Verification result */
  .verify-result {
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .verify-pass { background: var(--green-bg); border: 1px solid var(--green); }
  .verify-fail { background: var(--red-bg); border: 1px solid var(--red); }
  .verify-result h3 { margin-bottom: 8px; }
  .verify-issues { list-style: disc; padding-left: 24px; margin-top: 8px; }
  .verify-issues li { margin-bottom: 4px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-secondary);
  }
  .empty-state p { font-size: 15px; }
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h1>TrustPlane</h1>
      <div class="subtitle">Trust Status Dashboard</div>
    </div>
    <div class="nav-section">Pages</div>
    <a class="nav-link${nav_overview}" href="/">Overview</a>
    <a class="nav-link${nav_decisions}" href="/decisions">Decisions</a>
    <a class="nav-link${nav_milestones}" href="/milestones">Milestones</a>
    <a class="nav-link${nav_holds}" href="/holds">Holds</a>
    <a class="nav-link${nav_verify}" href="/verify">Verify</a>
    <div class="nav-section">API</div>
    <a class="nav-link" href="/api/decisions">/api/decisions</a>
    <a class="nav-link" href="/api/milestones">/api/milestones</a>
    <a class="nav-link" href="/api/holds">/api/holds</a>
    <a class="nav-link" href="/api/verify">/api/verify</a>
  </nav>
  <main class="main">
    ${content}
  </main>
</div>
</body>
</html>
