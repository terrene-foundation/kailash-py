[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kailash-ml-protocols"
version = "0.1.0"
description = "Frozen interface contracts for kailash-ml and kailash-kaizen interop"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [
    { name = "Terrene Foundation" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
readme = "README.md"
keywords = ["ml", "protocols", "kailash", "machine-learning", "interfaces"]
dependencies = []

[project.urls]
Documentation = "https://docs.terrene.foundation/kailash-ml-protocols"
Repository = "https://github.com/terrene-foundation/kailash-py/tree/main/packages/kailash-ml-protocols"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
    "mypy>=1.8",
    "ruff>=0.3",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kailash_ml_protocols"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
timeout = 30

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.mypy]
python_version = "3.10"
strict = true
