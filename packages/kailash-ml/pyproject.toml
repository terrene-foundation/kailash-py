[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kailash-ml"
version = "1.1.0"
description = "Machine learning lifecycle for the Kailash ecosystem"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "Terrene Foundation" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
readme = "README.md"
keywords = ["ml", "machine-learning", "kailash", "automl", "feature-store", "model-registry"]
dependencies = [
    "kailash>=2.8.9",
    "kailash-dataflow>=2.0.11",
    "kailash-nexus>=2.1.0",
    "polars>=1.0",
    "pyarrow>=14.0",
    "numpy>=1.24",
    "scipy>=1.11",
    "scikit-learn>=1.5",
    "lightgbm>=4.0",
    "xgboost>=2.0",
    # UMAP (umap-learn) is a base dep as of the cuML eviction (Phase 1).
    # Per workspaces/kailash-ml-gpu-stack/04-validate/02-revised-stack.md
    # CRITICAL-1 disposition: cuML is evicted; UMAPTrainable wraps the
    # sklearn-native umap-learn package; sklearn.cluster.HDBSCAN covers
    # HDBSCAN (already in scikit-learn>=1.5). Phase 2 roadmap: torch-native
    # UMAP across MPS/ROCm/XPU.
    "umap-learn>=0.5",
    # Lightning is the training spine for every family per ml-engines.md
    # §3 MUST 2 — every training call routes through lightning.pytorch.Trainer.
    # Therefore lightning + torch are base dependencies, not optional extras.
    "torch>=2.2",
    "lightning>=2.2",
    "plotly>=5.18",
    "skl2onnx>=1.16",
    "onnxmltools>=1.12",
    "onnxruntime>=1.17",
    # PyYAML — reads the backend-compat-matrix.yaml package-data file
    # (W6) at runtime so ``km.doctor`` subcommands can operate against
    # an updateable matrix without a kailash-ml release.
    "pyyaml>=6.0",
    # httpx — used by ``kailash_ml.drift.alerts.WebhookAlertChannel``
    # (W26.d) for the async HTTP POST path. Declared-imported per
    # rules/dependencies.md: transitive availability via kailash's own
    # httpx dep is not a declaration.
    "httpx>=0.27",
]

[project.optional-dependencies]
dl = [
    "torch>=2.2",
    "lightning>=2.2",
    "torchvision>=0.17",
    "torchaudio>=2.2",
    "timm>=1.0",
    "transformers>=4.40",
    # Plotly is ALSO pinned here so the kailash_ml.diagnostics.DLDiagnostics
    # plot_*() methods install cleanly under `pip install kailash-ml[dl]`
    # regardless of any future decision to demote plotly from base deps.
    # See specs/ml-diagnostics.md § "Extras gating".
    "plotly>=5.18",
]
# Back-compat alias: [dl-gpu] used to duplicate every [dl] entry + add
# onnxruntime-gpu. As of 0.9.1 it extends [dl] instead, so the deep-learning
# dependency set lives in ONE place. Users who passed `kailash-ml[dl-gpu]`
# before get the same install plus onnxruntime-gpu. The GPU torch wheel is
# selected via `pip --extra-index-url` (see `kailash-ml-gpu-setup`).
dl-gpu = [
    "kailash-ml[dl]",
    "onnxruntime-gpu>=1.17",
]
rl = [
    "kailash-ml[dl]",
    "stable-baselines3>=2.3",
    "sb3-contrib>=2.3",
    "gymnasium>=0.29",
]
# Offline RL — d3rlpy for CQL, IQL, TD3+BC per specs/ml-rl-core.md §1.2.
rl-offline = [
    "kailash-ml[rl]",
    "d3rlpy>=2.6",
]
# Vectorized envs via envpool per specs/ml-rl-core.md §1.2 RC-01.
rl-envpool = [
    "kailash-ml[rl]",
    "envpool>=0.8",
]
# Distributed RL via ray[rllib] per specs/ml-rl-core.md §1.2 RC-03.
rl-distributed = [
    "kailash-ml[rl]",
    "ray[rllib]>=2.30",
]
# Inference server gRPC channel adapter — loud ImportError without.
grpc = ["grpcio>=1.60"]
# Real GP + Expected-Improvement path for BayesianSearchStrategy.
# Without [automl-bayes], BayesianSearchStrategy falls back to a
# deterministic EI surrogate (tested) per rules/dependencies.md.
automl-bayes = ["scikit-optimize>=0.9"]
agents = [
    "kailash-kaizen>=2.7.5",
]
explain = ["shap>=0.44"]
imbalance = ["imbalanced-learn>=0.12"]
# RAG evaluation backends for kailash_ml.diagnostics.RAGDiagnostics.
# Without [rag], evaluate() falls back to a pluggable JudgeCallable +
# deterministic heuristic; ragas_scores() / trulens_scores() raise
# ImportError naming this extra per rules/dependencies.md.
rag = [
    "ragas>=0.1",
    "trulens-eval>=0.20",
    "datasets>=2.0",
]
# xgboost is a base dependency as of 0.9.1 -- it ships with CUDA built in
# (xgboost>=2.0) and falls back to CPU automatically. The [xgb] alias remains
# for backward-compat with any pre-existing `pip install kailash-ml[xgb]`
# invocation; it resolves to the (already-installed) base dep.
xgb = ["xgboost>=2.0"]
catboost = ["catboost>=1.2"]
stats = ["statsmodels>=0.14"]
hpo = ["optuna>=3.0"]
mlflow = ["pyyaml>=6.0"]
huggingface = ["datasets>=2.0"]
dashboard = [
    "starlette>=0.35",
    "uvicorn>=0.27",
]
interop = ["pandas>=2.0"]
all = ["kailash-ml[dl,xgb,catboost,stats,rl,rl-offline,rl-envpool,rl-distributed,grpc,automl-bayes,agents,hpo,mlflow,huggingface,dashboard,interop,imbalance,explain]"]
all-gpu = ["kailash-ml[dl-gpu,xgb,catboost,stats,rl,rl-offline,rl-envpool,rl-distributed,grpc,automl-bayes,agents,hpo,mlflow,huggingface,dashboard,interop,imbalance,explain]"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
    "hypothesis>=6.98",
    "mypy>=1.8",
    "ruff>=0.3",
]

[project.scripts]
kailash-ml-gpu-setup = "kailash_ml._gpu_setup:main"
kailash-ml-dashboard = "kailash_ml.dashboard:main"
km-doctor = "kailash_ml.doctor:main"

[project.urls]
Documentation = "https://docs.terrene.foundation/kailash-ml"
Repository = "https://github.com/terrene-foundation/kailash-py/tree/main/packages/kailash-ml"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/kailash_ml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
timeout = 120
markers = [
    "unit: Unit tests (no I/O, no network)",
    "integration: Integration tests (real stores, real models)",
    "bench: Benchmark tests (performance)",
    "regression: Permanent regression tests (never delete; see rules/testing.md)",
    "invariant: Numeric/structural invariant guards (per rules/refactor-invariants.md)",
]
# Scoped warning filters — each entry has a documented origin + disposition
# per rules/observability.md MUST Rule 5. Unfiltered suite emits ~240
# upstream RuntimeWarnings from sklearn/numpy internals processing
# rank-degenerate synthetic test fixtures; filters suppress the known-harmless
# categories while letting production warnings through.
# Rule: use bare message-match (no module path) — module-scoped filters
# that reference lazy-imported packages (lightning.fabric.utilities,
# sklearn.exceptions, kailash_ml._decorators) cause pytest to import those
# modules at filter-parse time and intermittently segfault during
# xgboost/aiosqlite cleanup (observed on python 3.13 + pytest 9).
filterwarnings = [
    # sklearn PCA / NMF / extmath matmul divide-by-zero on rank-deficient
    # synthetic test fixtures (test_preprocessing.py PCA, test_clustering.py
    # spectral embedding with disconnected synthetic graph).
    "ignore:divide by zero encountered in matmul:RuntimeWarning",
    "ignore:invalid value encountered in matmul:RuntimeWarning",
    "ignore:overflow encountered in matmul:RuntimeWarning",
    "ignore:invalid value encountered in divide:RuntimeWarning",
    # Scientific-compute convergence warnings — tests pass sklearn
    # LogisticRegression small max_iter + NMF on dense random matrices
    # to exercise early-stop behavior. Warning expected, not actionable.
    "ignore:.*failed to converge.*:UserWarning",
    "ignore:.*Maximum number of iterations.*:UserWarning",
    # sklearn spectral embedding on disconnected synthetic graphs.
    "ignore:Graph is not fully connected:UserWarning",
    # LightGBM fitted with feature names, predicted on numpy array. Harmless
    # in the rank/convert helpers that drop feature names intentionally.
    "ignore:X does not have valid feature names, but LGBMClassifier was fitted with feature names:UserWarning",
    # Lightning "GPU available but not used" — the sklearn adapter is
    # CPU-only per ml-backends.md §5.1, so forcing accelerator="cpu" is
    # correct. Lightning's setup hint does not apply.
    "ignore:GPU available but not used.*:UserWarning",
    # Upstream Lightning 2.x deprecation — LeafSpec vs TreeSpec.is_leaf().
    # Lightning's internal _pytree.py uses `LeafSpec` with backticks in the
    # message so the regex must match the literal text.
    "ignore:.*isinstance.treespec, LeafSpec.*deprecated.*:",
    # Lightning performance hint for num_workers on small test fixtures.
    "ignore:The .train_dataloader. does not have many workers:UserWarning",
    # Our own @experimental decorator surfaces ExperimentalWarning when
    # P2 engines (FeatureEngineer, ModelVisualizer) are instantiated in
    # tests. These are by design — the decorator IS the tracking mechanism
    # per zero-tolerance.md Rule 2 iterative-TODOs carve-out.
    "ignore:.*is experimental \\(P2\\)\\..*:UserWarning",
    # torch 2.11 made the dynamo-based ONNX exporter the default; the
    # legacy TorchScript-based path is still available via dynamo=False
    # but emits a DeprecationWarning. OnnxBridge prefers the dynamo path
    # when the optional ``onnxscript`` package is installed; when it's
    # absent (as in the base [dev] install), the legacy exporter runs
    # and this warning fires. Per zero-tolerance.md Rule 1 exceptions:
    # upstream third-party deprecation with a tracked upstream path
    # (onnxscript as an install) — filter is scoped to the exact message.
    "ignore:You are using the legacy TorchScript-based ONNX export.*:DeprecationWarning",
    # Transitive torch deprecation inside the TorchScript exporter itself
    # (setup_onnx_logging). Same disposition as the legacy-exporter
    # deprecation above; resolves together when onnxscript ships as base.
    "ignore:The feature will be removed. Please remove usage of this function:DeprecationWarning",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.mypy]
python_version = "3.10"
strict = true
