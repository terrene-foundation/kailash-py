<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kailash-ml Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ================================================================
   Design tokens
   ================================================================ */
:root {
  /* Light theme (default) */
  --bg-app: #f8f9fa;
  --bg-sidebar: #ffffff;
  --bg-card: #ffffff;
  --bg-hover: #f1f3f5;
  --bg-input: #f1f3f5;
  --bg-code: #f1f3f5;
  --border: #dee2e6;
  --border-light: #e9ecef;
  --text-primary: #212529;
  --text-secondary: #495057;
  --text-muted: #868e96;
  --text-inverse: #ffffff;

  --accent: #364fc7;
  --accent-light: #4263eb;
  --accent-bg: rgba(54, 79, 199, 0.08);
  --green: #2b8a3e;
  --green-bg: rgba(43, 138, 62, 0.08);
  --red: #c92a2a;
  --red-bg: rgba(201, 42, 42, 0.08);
  --yellow: #e67700;
  --yellow-bg: rgba(230, 119, 0, 0.08);
  --purple: #7048e8;
  --purple-bg: rgba(112, 72, 232, 0.08);
  --orange: #d9480f;
  --orange-bg: rgba(217, 72, 15, 0.08);
  --cyan: #0c8599;
  --cyan-bg: rgba(12, 133, 153, 0.08);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);

  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;

  --sidebar-width: 240px;
  --header-height: 52px;

  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
}

[data-theme="dark"] {
  --bg-app: #0f1117;
  --bg-sidebar: #161822;
  --bg-card: #1a1c28;
  --bg-hover: #22243a;
  --bg-input: #22243a;
  --bg-code: #22243a;
  --border: #2a2d42;
  --border-light: #232538;
  --text-primary: #e1e4eb;
  --text-secondary: #9ca3b4;
  --text-muted: #6b7280;
  --text-inverse: #0f1117;

  --accent: #7c8cf5;
  --accent-light: #9ba5f8;
  --accent-bg: rgba(124, 140, 245, 0.12);
  --green: #51cf66;
  --green-bg: rgba(81, 207, 102, 0.1);
  --red: #ff6b6b;
  --red-bg: rgba(255, 107, 107, 0.1);
  --yellow: #fcc419;
  --yellow-bg: rgba(252, 196, 25, 0.1);
  --purple: #b197fc;
  --purple-bg: rgba(177, 151, 252, 0.1);
  --orange: #ff922b;
  --orange-bg: rgba(255, 146, 43, 0.1);
  --cyan: #22b8cf;
  --cyan-bg: rgba(34, 184, 207, 0.1);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
}

/* ================================================================
   Reset & Base
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg-app);
  color: var(--text-primary);
  line-height: 1.5;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ================================================================
   App layout
   ================================================================ */
.app-layout {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  grid-template-rows: var(--header-height) 1fr;
  grid-template-areas:
    "sidebar header"
    "sidebar main";
  min-height: 100vh;
}

/* ================================================================
   Header
   ================================================================ */
.app-header {
  grid-area: header;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 20;
}

.header-search {
  flex: 1;
  max-width: 480px;
  position: relative;
}

.header-search input {
  width: 100%;
  padding: 7px 12px 7px 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.15s;
}

.header-search input:focus {
  border-color: var(--accent);
}

.header-search input::placeholder {
  color: var(--text-muted);
}

.header-search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.theme-toggle {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  font-size: 16px;
}

.theme-toggle:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ================================================================
   Sidebar
   ================================================================ */
.app-sidebar {
  grid-area: sidebar;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 30;
  overflow-y: auto;
}

.sidebar-logo {
  height: var(--header-height);
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  flex-shrink: 0;
}

.sidebar-logo .logo-accent { color: var(--accent); }

.sidebar-nav {
  padding: 12px;
  flex: 1;
}

.sidebar-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  padding: 16px 8px 6px;
}

.sidebar-section-label:first-child {
  padding-top: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  text-decoration: none;
  user-select: none;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  text-decoration: none;
}

.nav-item.active {
  background: var(--accent-bg);
  color: var(--accent);
}

.nav-item svg { flex-shrink: 0; }

.nav-item .nav-badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--bg-hover);
  color: var(--text-muted);
}

.nav-item.active .nav-badge {
  background: var(--accent-bg);
  color: var(--accent);
}

.sidebar-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
}

/* ================================================================
   Main content
   ================================================================ */
.app-main {
  grid-area: main;
  padding: 24px;
  overflow-y: auto;
  max-height: calc(100vh - var(--header-height));
}

.page-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}

/* ================================================================
   Breadcrumb
   ================================================================ */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.breadcrumb a { color: var(--text-secondary); font-weight: 500; }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb .sep { color: var(--text-muted); font-size: 11px; }

/* ================================================================
   Stat cards (overview)
   ================================================================ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-card-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.stat-card-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.stat-card-sub {
  font-size: 12px;
  color: var(--text-muted);
}

.stat-card--accent .stat-card-value { color: var(--accent); }
.stat-card--green .stat-card-value { color: var(--green); }
.stat-card--red .stat-card-value { color: var(--red); }
.stat-card--yellow .stat-card-value { color: var(--yellow); }
.stat-card--purple .stat-card-value { color: var(--purple); }
.stat-card--cyan .stat-card-value { color: var(--cyan); }

/* ================================================================
   Cards
   ================================================================ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.card-body { padding: 0; }
.card-body--padded { padding: 18px; }

/* ================================================================
   Tables
   ================================================================ */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  text-align: left;
  padding: 10px 18px;
}

th {
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  background: var(--bg-card);
  position: sticky;
  top: 0;
}

th:hover { color: var(--text-secondary); }
th .sort-arrow { margin-left: 3px; font-size: 9px; opacity: 0.6; }

td {
  border-bottom: 1px solid var(--border-light);
  color: var(--text-secondary);
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-hover); }
td a { color: var(--accent); font-weight: 500; }
td a:hover { text-decoration: underline; }

/* ================================================================
   Badges
   ================================================================ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.badge-running { background: var(--accent-bg); color: var(--accent); }
.badge-completed { background: var(--green-bg); color: var(--green); }
.badge-failed { background: var(--red-bg); color: var(--red); }
.badge-killed { background: var(--yellow-bg); color: var(--yellow); }
.badge-staging { background: var(--purple-bg); color: var(--purple); }
.badge-production { background: var(--green-bg); color: var(--green); }
.badge-shadow { background: var(--yellow-bg); color: var(--yellow); }
.badge-archived { background: var(--bg-hover); color: var(--text-muted); }
.badge-pending { background: var(--bg-hover); color: var(--text-muted); }
.badge-success { background: var(--green-bg); color: var(--green); }
.badge-none { background: var(--bg-hover); color: var(--text-muted); }
.badge-moderate { background: var(--yellow-bg); color: var(--yellow); }
.badge-severe { background: var(--red-bg); color: var(--red); }

/* ================================================================
   Buttons
   ================================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: var(--font-sans);
  transition: background 0.12s, border-color 0.12s;
}

.btn:hover { background: var(--bg-hover); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--text-inverse);
}

.btn-primary:hover {
  background: var(--accent-light);
  border-color: var(--accent-light);
}

.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }

.btn-sm { padding: 4px 10px; font-size: 12px; }

.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ================================================================
   Compare bar
   ================================================================ */
.compare-bar {
  display: none;
  position: fixed;
  bottom: 0;
  left: var(--sidebar-width);
  right: 0;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 10px 24px;
  z-index: 50;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-lg);
}

.compare-bar.visible { display: flex; }

/* ================================================================
   Checkbox
   ================================================================ */
input[type="checkbox"] {
  width: 15px;
  height: 15px;
  accent-color: var(--accent);
  cursor: pointer;
}

/* ================================================================
   Diff highlights
   ================================================================ */
.diff-highlight {
  background: var(--yellow-bg);
  padding: 1px 4px;
  border-radius: 3px;
  font-weight: 600;
}

/* ================================================================
   Charts
   ================================================================ */
.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
  gap: 16px;
}

.chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}

/* ================================================================
   Key-value detail row
   ================================================================ */
.detail-grid {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 0;
}

.detail-grid dt {
  padding: 8px 18px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  border-bottom: 1px solid var(--border-light);
}

.detail-grid dd {
  padding: 8px 18px;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-light);
  font-family: var(--font-mono);
  word-break: break-all;
}

.detail-grid dt:last-of-type,
.detail-grid dd:last-of-type { border-bottom: none; }

/* ================================================================
   Filter bar
   ================================================================ */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.filter-bar input,
.filter-bar select {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
  outline: none;
}

.filter-bar input:focus,
.filter-bar select:focus { border-color: var(--accent); }

.filter-bar input { flex: 1; max-width: 320px; }

/* ================================================================
   Mono text
   ================================================================ */
.mono {
  font-family: var(--font-mono);
  font-size: 12px;
}

/* ================================================================
   Empty state
   ================================================================ */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}

.empty-state h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-secondary);
}

.empty-state p { font-size: 13px; }

/* ================================================================
   Loading
   ================================================================ */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
  color: var(--text-muted);
  font-size: 13px;
}

.loading::before {
  content: '';
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ================================================================
   Tag
   ================================================================ */
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  font-family: var(--font-mono);
}

/* ================================================================
   Responsive: mobile sidebar
   ================================================================ */
.mobile-menu-btn {
  display: none;
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-card);
  color: var(--text-primary);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 25;
}

@media (max-width: 860px) {
  .app-layout {
    grid-template-columns: 1fr;
    grid-template-areas:
      "header"
      "main";
  }

  .app-sidebar {
    position: fixed;
    left: -260px;
    top: 0;
    bottom: 0;
    width: 260px;
    transition: left 0.2s ease;
  }

  .app-sidebar.open { left: 0; }
  .sidebar-overlay.open { display: block; }
  .mobile-menu-btn { display: flex; }

  .compare-bar { left: 0; }

  .app-main { max-height: none; }

  .chart-grid { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr; }
  .app-main { padding: 16px; }
  th, td { padding: 8px 12px; }
}

/* ================================================================
   Search results dropdown
   ================================================================ */
.search-results {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  max-height: 320px;
  overflow-y: auto;
  z-index: 100;
  display: none;
}

.search-results.open { display: block; }

.search-result-item {
  padding: 8px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-light);
}

.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--bg-hover); }

.search-result-type {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--text-muted);
  flex-shrink: 0;
  width: 72px;
}

.search-result-name { color: var(--text-primary); font-weight: 500; }
</style>
</head>

      </a>
      <a class="nav-item" data-section="artifacts" onclick="navigate('artifacts')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Artifacts
      </a>

      <div class="sidebar-section-label">Data</div>
      <a class="nav-item" data-section="features" onclick="navigate('features')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        Features
        <span class="nav-badge" id="navFeatureCount">-</span>
      </a>

      <div class="sidebar-section-label">Monitoring</div>
      <a class="nav-item" data-section="drift" onclick="navigate('drift')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Drift
        <span class="nav-badge" id="navDriftCount">-</span>
      </a>
    </nav>
    <div class="sidebar-footer">Terrene Foundation</div>
  </aside>

  <!-- ========== HEADER ========== -->
  <header class="app-header">
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="header-search">
      <svg class="header-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="globalSearch" placeholder="Search experiments, models, features..." oninput="onSearchInput(this.value)" onfocus="onSearchFocus()" onblur="setTimeout(closeSearch, 200)">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ========== MAIN ========== -->
  <main class="app-main" id="app">
    <div class="loading">Loading dashboard...</div>
  </main>

</div>

<!-- Compare bar (outside grid so it stacks on top) -->
<div class="compare-bar" id="compareBar">
  <span id="compareCount" style="font-size:13px;font-weight:500">0 runs selected</span>
  <div style="display:flex;gap:8px">
    <button class="btn btn-sm" onclick="clearSelection()">Clear</button>
    <button class="btn btn-sm btn-primary" onclick="compareSelected()">Compare</button>
  </div>
</div>

<script>
// =========================================================================
// State
// =========================================================================
const state = {
  selectedRuns: new Set(),
  currentSort: { col: null, dir: "asc" },
  searchCache: { experiments: [], models: [], features: [] },
};

// =========================================================================
// Theme
// =========================================================================
function getStoredTheme() {
  try { return localStorage.getItem("kml-theme"); }
  catch { return null; }
}

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  const icon = document.getElementById("themeIcon");
  if (theme === "dark") {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
  try { localStorage.setItem("kml-theme", theme); }
  catch {}
}

function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme") || "light";
  applyTheme(current === "dark" ? "light" : "dark");
}

(function() {
  const stored = getStoredTheme();
  if (stored) applyTheme(stored);
  else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
    applyTheme("dark");
  }
})();

// =========================================================================
// Mobile sidebar
// =========================================================================
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("open");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
}

// =========================================================================
// API helpers
// =========================================================================
async function api(path) {
  const resp = await fetch(path);
  if (!resp.ok) {
    const body = await resp.json().catch(() => ({}));
    throw new Error(body.error || "HTTP " + resp.status);
  }
  return resp.json();
}

async function apiDelete(path) {
  const resp = await fetch(path, { method: "DELETE" });
  if (!resp.ok) {
    const body = await resp.json().catch(() => ({}));
    throw new Error(body.error || "HTTP " + resp.status);
  }
  return resp.json();
}

// =========================================================================
// Navigation
// =========================================================================
function navigate(route) {
  closeSidebar();
  location.hash = "#" + route;
}

function setActiveNav(section) {
  const base = section.split("/")[0];
  document.querySelectorAll(".nav-item").forEach(function(el) {
    el.classList.toggle("active", el.dataset.section === base);
  });
}

async function router() {
  const hash = location.hash.slice(1) || "overview";
  const app = document.getElementById("app");
  app.innerHTML = '<div class="loading">Loading...</div>';
  state.selectedRuns.clear();
  updateCompareBar();

  try {
    if (hash === "overview") {
      setActiveNav("overview");
      await renderOverview(app);
    } else if (hash === "experiments") {
      setActiveNav("experiments");
      await renderExperiments(app);
    } else if (hash.startsWith("experiments/")) {
      setActiveNav("experiments");
      var expName = decodeURIComponent(hash.slice("experiments/".length));
      await renderRuns(app, expName);
    } else if (hash.startsWith("runs/")) {
      setActiveNav("experiments");
      var runId = hash.slice("runs/".length);
      await renderRunDetail(app, runId);
    } else if (hash.startsWith("compare")) {
      setActiveNav("experiments");
      var params = new URLSearchParams(hash.split("?")[1] || "");
      var ids = (params.get("run_ids") || "").split(",").filter(Boolean);
      await renderComparison(app, ids);
    } else if (hash === "models") {
      setActiveNav("models");
      await renderModels(app);
    } else if (hash.startsWith("models/")) {
      setActiveNav("models");
      var modelName = decodeURIComponent(hash.slice("models/".length));
      await renderModelVersions(app, modelName);
    } else if (hash === "features") {
      setActiveNav("features");
      await renderFeatures(app);
    } else if (hash === "drift") {
      setActiveNav("drift");
      await renderDrift(app);
    } else if (hash.startsWith("drift/")) {
      setActiveNav("drift");
      var driftModel = decodeURIComponent(hash.slice("drift/".length));
      await renderDriftDetail(app, driftModel);
    } else if (hash === "artifacts") {
      setActiveNav("artifacts");
      await renderArtifacts(app);
    } else {
      setActiveNav("overview");
      await renderOverview(app);
    }
  } catch (err) {
    app.innerHTML = '<div class="card"><div class="empty-state"><h3>Error</h3><p>' + escapeHtml(err.message) + "</p></div></div>";
  }
}

window.addEventListener("hashchange", router);
window.addEventListener("load", function() {
  router();
  loadNavCounts();
});

// =========================================================================
// Nav badge counts
// =========================================================================
async function loadNavCounts() {
  try {
    var overview = await api("/api/overview");
    setText("navExpCount", overview.total_experiments);
    setText("navModelCount", overview.total_models);
    setText("navFeatureCount", overview.total_features);
    setText("navDriftCount", overview.active_drift_monitors);
  } catch {}
}

function setText(id, val) {
  var el = document.getElementById(id);
  if (el) el.textContent = val;
}

// =========================================================================
// Helpers
// =========================================================================
function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

function statusBadge(status) {
  if (!status) return "";
  var cls = status.toLowerCase();
  return '<span class="badge badge-' + cls + '">' + escapeHtml(status) + "</span>";
}

function stageBadge(stage) {
  if (!stage) return "";
  return '<span class="badge badge-' + stage + '">' + escapeHtml(stage) + "</span>";
}

function severityBadge(severity) {
  if (!severity) return "";
  return '<span class="badge badge-' + severity + '">' + escapeHtml(severity) + "</span>";
}

function formatDuration(start, end) {
  if (!start) return "-";
  var s = new Date(start);
  if (!end) return "running...";
  var e = new Date(end);
  var sec = Math.round((e - s) / 1000);
  if (sec < 60) return sec + "s";
  if (sec < 3600) return Math.floor(sec / 60) + "m " + (sec % 60) + "s";
  return Math.floor(sec / 3600) + "h " + Math.floor((sec % 3600) / 60) + "m";
}

function formatTime(iso) {
  if (!iso) return "-";
  try { return new Date(iso).toLocaleString(); }
  catch { return iso; }
}

function formatTimeShort(iso) {
  if (!iso) return "-";
  try {
    var d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + " " +
           d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
  } catch { return iso; }
}

function formatMetric(v) {
  if (v === null || v === undefined) return "-";
  if (typeof v === "number") {
    if (Number.isInteger(v)) return v.toString();
    return v.toFixed(6).replace(/0+$/, "").replace(/\.$/, ".0");
  }
  return String(v);
}

function plotlyTheme() {
  var dark = document.documentElement.getAttribute("data-theme") === "dark";
  return {
    paper_bgcolor: "transparent",
    plot_bgcolor: "transparent",
    font: { color: dark ? "#e1e4eb" : "#212529", family: "Inter, sans-serif", size: 12 },
    xaxis: { color: dark ? "#9ca3b4" : "#495057", gridcolor: dark ? "#2a2d42" : "#e9ecef", zerolinecolor: dark ? "#2a2d42" : "#dee2e6" },
    yaxis: { color: dark ? "#9ca3b4" : "#495057", gridcolor: dark ? "#2a2d42" : "#e9ecef", zerolinecolor: dark ? "#2a2d42" : "#dee2e6" },
    legend: { font: { color: dark ? "#e1e4eb" : "#212529" } },
    margin: { t: 36, r: 16, b: 44, l: 52 },
  };
}

function chartColors() {
  return ["#364fc7", "#2b8a3e", "#d9480f", "#7048e8", "#c92a2a", "#0c8599", "#e67700", "#862e9c"];
}

// =========================================================================
// Search
// =========================================================================
var searchTimeout = null;

async function onSearchInput(query) {
  clearTimeout(searchTimeout);
  if (query.length < 2) { closeSearch(); return; }
  searchTimeout = setTimeout(function() { doSearch(query); }, 200);
}

function onSearchFocus() {
  var input = document.getElementById("globalSearch");
  if (input.value.length >= 2) doSearch(input.value);
}

function closeSearch() {
  document.getElementById("searchResults").classList.remove("open");
}

async function doSearch(query) {
  var results = [];
  var q = query.toLowerCase();

  // Experiments
  try {
    if (!state.searchCache.experiments.length) {
      state.searchCache.experiments = await api("/api/experiments");
    }
    state.searchCache.experiments.forEach(function(exp) {
      if (exp.name.toLowerCase().includes(q)) {
        results.push({ type: "experiment", name: exp.name, route: "experiments/" + encodeURIComponent(exp.name) });
      }
    });
  } catch {}

  // Models
  try {
    if (!state.searchCache.models.length) {
      state.searchCache.models = await api("/api/models");
    }
    state.searchCache.models.forEach(function(m) {
      if (m.name.toLowerCase().includes(q)) {
        results.push({ type: "model", name: m.name, route: "models/" + encodeURIComponent(m.name) });
      }
    });
  } catch {}

  // Features
  try {
    if (!state.searchCache.features.length) {
      state.searchCache.features = await api("/api/features");
    }
    state.searchCache.features.forEach(function(f) {
      var name = f.schema_name || f.name || "";
      if (name.toLowerCase().includes(q)) {
        results.push({ type: "feature", name: name, route: "features" });
      }
    });
  } catch {}

  var container = document.getElementById("searchResults");
  if (results.length === 0) {
    container.innerHTML = '<div class="search-result-item"><span style="color:var(--text-muted)">No results</span></div>';
  } else {
    container.innerHTML = results.slice(0, 12).map(function(r) {
      return '<div class="search-result-item" onclick="navigate(\'' + r.route + '\');closeSearch()">' +
        '<span class="search-result-type">' + escapeHtml(r.type) + '</span>' +
        '<span class="search-result-name">' + escapeHtml(r.name) + '</span>' +
        "</div>";
    }).join("");
  }
  container.classList.add("open");
}

// =========================================================================
// Overview page
// =========================================================================
async function renderOverview(app) {
  var overview = await api("/api/overview");

  var html = '<div class="page-title">Overview</div>';
  html += '<div class="stat-grid">';
  html += statCard("Experiments", overview.total_experiments, "", "accent");
  html += statCard("Total Runs", overview.total_runs, overview.running_runs > 0 ? overview.running_runs + " running" : "", "accent");
  html += statCard("Completed", overview.completed_runs, "", "green");
  html += statCard("Failed", overview.failed_runs, "", "red");
  html += statCard("Models", overview.total_models, overview.production_models + " in production", "purple");
  html += statCard("Features", overview.total_features, "", "cyan");
  html += statCard("Drift Monitors", overview.active_drift_monitors, "", "yellow");
  html += "</div>";

  // Recent experiments
  var experiments;
  try { experiments = await api("/api/experiments"); } catch { experiments = []; }
  state.searchCache.experiments = experiments;

  if (experiments.length > 0) {
    html += '<div class="card">';
    html += '<div class="card-header"><span class="card-title">Recent Experiments</span>' +
      '<button class="btn btn-sm" onclick="navigate(\'experiments\')">View all</button></div>';
    html += '<div class="card-body"><table><thead><tr><th>Name</th><th>Runs</th><th>Latest</th><th>Created</th></tr></thead><tbody>';
    experiments.slice(0, 8).forEach(function(exp) {
      html += "<tr>" +
        '<td><a href="#experiments/' + encodeURIComponent(exp.name) + '">' + escapeHtml(exp.name) + "</a></td>" +
        "<td>" + exp.run_count + "</td>" +
        "<td>" + statusBadge(exp.latest_run_status) + "</td>" +
        "<td>" + formatTimeShort(exp.created_at) + "</td>" +
        "</tr>";
    });
    html += "</tbody></table></div></div>";
  }

  // Recent models
  var models;
  try { models = await api("/api/models"); } catch { models = []; }
  state.searchCache.models = models;

  if (models.length > 0) {
    html += '<div class="card">';
    html += '<div class="card-header"><span class="card-title">Registered Models</span>' +
      '<button class="btn btn-sm" onclick="navigate(\'models\')">View all</button></div>';
    html += '<div class="card-body"><table><thead><tr><th>Name</th><th>Latest Version</th><th>Updated</th></tr></thead><tbody>';
    models.slice(0, 8).forEach(function(m) {
      html += "<tr>" +
        '<td><a href="#models/' + encodeURIComponent(m.name) + '">' + escapeHtml(m.name) + "</a></td>" +
        "<td>v" + m.latest_version + "</td>" +
        "<td>" + formatTimeShort(m.updated_at) + "</td>" +
        "</tr>";
    });
    html += "</tbody></table></div></div>";
  }

  app.innerHTML = html;
}

function statCard(label, value, sub, colorClass) {
  return '<div class="stat-card stat-card--' + colorClass + '">' +
    '<div class="stat-card-label">' + escapeHtml(label) + '</div>' +
    '<div class="stat-card-value">' + escapeHtml(String(value)) + '</div>' +
    (sub ? '<div class="stat-card-sub">' + escapeHtml(sub) + '</div>' : '') +
    '</div>';
}

// =========================================================================
// Experiments list
// =========================================================================
async function renderExperiments(app) {
  var experiments = await api("/api/experiments");
  state.searchCache.experiments = experiments;

  var html = '<div class="page-title">Experiments</div>';

  if (experiments.length === 0) {
    html += '<div class="card"><div class="empty-state"><h3>No experiments yet</h3><p>Start logging experiments with ExperimentTracker to see them here.</p></div></div>';
    app.innerHTML = html;
    return;
  }

  html += '<div class="filter-bar"><input type="text" id="expFilter" placeholder="Filter experiments..." oninput="filterExperiments()"></div>';

  html += '<div class="card"><div class="card-body"><table id="expTable"><thead><tr>' +
    '<th onclick="sortExperimentsTable(\'name\')">Name <span class="sort-arrow"></span></th>' +
    '<th onclick="sortExperimentsTable(\'run_count\')">Runs <span class="sort-arrow"></span></th>' +
    '<th onclick="sortExperimentsTable(\'latest_run_status\')">Latest <span class="sort-arrow"></span></th>' +
    '<th onclick="sortExperimentsTable(\'description\')">Description <span class="sort-arrow"></span></th>' +
    '<th onclick="sortExperimentsTable(\'created_at\')">Created <span class="sort-arrow"></span></th>' +
    "</tr></thead><tbody>";

  experiments.forEach(function(exp) {
    html += '<tr data-name="' + escapeHtml(exp.name.toLowerCase()) + '">' +
      '<td><a href="#experiments/' + encodeURIComponent(exp.name) + '">' + escapeHtml(exp.name) + "</a></td>" +
      "<td>" + exp.run_count + "</td>" +
      "<td>" + statusBadge(exp.latest_run_status) + "</td>" +
      "<td>" + escapeHtml(exp.description || "-") + "</td>" +
      "<td>" + formatTimeShort(exp.created_at) + "</td>" +
      "</tr>";
  });

  html += "</tbody></table></div></div>";
  app.innerHTML = html;

  window._currentExperiments = experiments;
}

function filterExperiments() {
  var q = document.getElementById("expFilter").value.toLowerCase();
  document.querySelectorAll("#expTable tbody tr").forEach(function(row) {
    row.style.display = row.dataset.name.includes(q) ? "" : "none";
  });
}

function sortExperimentsTable(col) {
  if (!window._currentExperiments) return;
  if (state.currentSort.col === col) {
    state.currentSort.dir = state.currentSort.dir === "asc" ? "desc" : "asc";
  } else {
    state.currentSort.col = col;
    state.currentSort.dir = "asc";
  }
  var dir = state.currentSort.dir === "asc" ? 1 : -1;
  window._currentExperiments.sort(function(a, b) {
    var va = a[col] || "";
    var vb = b[col] || "";
    if (typeof va === "number") return (va - vb) * dir;
    va = String(va).toLowerCase();
    vb = String(vb).toLowerCase();
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    return 0;
  });
  renderExperiments(document.getElementById("app"));
}

// =========================================================================
// Runs list
// =========================================================================
async function renderRuns(app, expName) {
  var runs = await api("/api/experiments/" + encodeURIComponent(expName) + "/runs");

  var breadcrumb = '<div class="breadcrumb">' +
    '<a href="#experiments">Experiments</a>' +
    '<span class="sep">/</span>' +
    "<span>" + escapeHtml(expName) + "</span></div>";

  var html = breadcrumb;
  html += '<div class="page-title">' + escapeHtml(expName) + '</div>';

  if (runs.length === 0) {
    html += '<div class="card"><div class="empty-state"><h3>No runs</h3><p>No runs in this experiment yet.</p></div></div>';
    app.innerHTML = html;
    return;
  }

  // Collect all param and metric keys
  var paramKeys = new Set();
  var metricKeys = new Set();
  runs.forEach(function(run) {
    Object.keys(run.params || {}).forEach(function(k) { paramKeys.add(k); });
    Object.keys(run.metrics || {}).forEach(function(k) { metricKeys.add(k); });
  });
  var pKeys = Array.from(paramKeys).sort();
  var mKeys = Array.from(metricKeys).sort();

  html += '<div class="filter-bar"><input type="text" id="runFilter" placeholder="Filter runs..." oninput="filterRuns()">' +
    '<select id="runStatusFilter" onchange="filterRuns()"><option value="">All statuses</option>' +
    '<option value="running">Running</option><option value="completed">Completed</option>' +
    '<option value="failed">Failed</option><option value="killed">Killed</option></select></div>';

  html += '<div class="card"><div class="card-body" style="overflow-x:auto"><table id="runsTable">' +
    "<thead><tr>" +
    '<th style="width:36px"></th>' +
    '<th onclick="sortRunsTable(\'name\')">Name <span class="sort-arrow"></span></th>' +
    '<th onclick="sortRunsTable(\'status\')">Status <span class="sort-arrow"></span></th>' +
    '<th onclick="sortRunsTable(\'start_time\')">Started <span class="sort-arrow"></span></th>' +
    '<th onclick="sortRunsTable(\'duration\')">Duration <span class="sort-arrow"></span></th>';

  pKeys.forEach(function(pk) {
    html += '<th onclick="sortRunsTable(\'param:' + escapeHtml(pk) + '\')">' + escapeHtml(pk) + ' <span class="sort-arrow"></span></th>';
  });
  mKeys.forEach(function(mk) {
    html += '<th onclick="sortRunsTable(\'metric:' + escapeHtml(mk) + '\')">' + escapeHtml(mk) + ' <span class="sort-arrow"></span></th>';
  });

  html += "</tr></thead><tbody>";

  runs.forEach(function(run) {
    var runLabel = run.name || run.id.slice(0, 8);
    var statusLower = (run.status || "").toLowerCase();
    html += '<tr data-run-id="' + escapeHtml(run.id) + '" data-name="' + escapeHtml(runLabel.toLowerCase()) + '" data-status="' + statusLower + '">' +
      '<td><input type="checkbox" onchange="toggleRunSelect(\'' + escapeHtml(run.id) + '\')" ' + (state.selectedRuns.has(run.id) ? "checked" : "") + "></td>" +
      '<td><a href="#runs/' + escapeHtml(run.id) + '">' + escapeHtml(runLabel) + "</a></td>" +
      "<td>" + statusBadge(run.status) + "</td>" +
      "<td>" + formatTimeShort(run.start_time) + "</td>" +
      "<td>" + formatDuration(run.start_time, run.end_time) + "</td>";

    pKeys.forEach(function(pk) {
      html += "<td>" + escapeHtml(run.params && run.params[pk] != null ? run.params[pk] : "-") + "</td>";
    });
    mKeys.forEach(function(mk) {
      html += "<td>" + formatMetric(run.metrics ? run.metrics[mk] : null) + "</td>";
    });
    html += "</tr>";
  });

  html += "</tbody></table></div></div>";
  app.innerHTML = html;

  window._currentRuns = runs;
  window._currentExpName = expName;
  window._paramKeys = pKeys;
  window._metricKeys = mKeys;
}

function filterRuns() {
  var q = document.getElementById("runFilter").value.toLowerCase();
  var status = document.getElementById("runStatusFilter").value;
  document.querySelectorAll("#runsTable tbody tr").forEach(function(row) {
    var matchName = row.dataset.name.includes(q);
    var matchStatus = !status || row.dataset.status === status;
    row.style.display = (matchName && matchStatus) ? "" : "none";
  });
}

function sortRunsTable(col) {
  if (!window._currentRuns) return;
  var runs = window._currentRuns;

  if (state.currentSort.col === col) {
    state.currentSort.dir = state.currentSort.dir === "asc" ? "desc" : "asc";
  } else {
    state.currentSort.col = col;
    state.currentSort.dir = "asc";
  }

  var dir = state.currentSort.dir === "asc" ? 1 : -1;

  runs.sort(function(a, b) {
    var va, vb;
    if (col.startsWith("param:")) {
      var pk = col.slice(6);
      va = (a.params && a.params[pk]) || "";
      vb = (b.params && b.params[pk]) || "";
    } else if (col.startsWith("metric:")) {
      var mk = col.slice(7);
      va = a.metrics ? a.metrics[mk] : null;
      vb = b.metrics ? b.metrics[mk] : null;
      if (va == null) va = dir > 0 ? Infinity : -Infinity;
      if (vb == null) vb = dir > 0 ? Infinity : -Infinity;
      return (va - vb) * dir;
    } else if (col === "duration") {
      va = a.end_time && a.start_time ? new Date(a.end_time) - new Date(a.start_time) : 0;
      vb = b.end_time && b.start_time ? new Date(b.end_time) - new Date(b.start_time) : 0;
      return (va - vb) * dir;
    } else {
      va = a[col] || "";
      vb = b[col] || "";
    }
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    return 0;
  });

  renderRuns(document.getElementById("app"), window._currentExpName);
}

function toggleRunSelect(runId) {

  document.getElementById("compareCount").textContent = count + " run" + (count !== 1 ? "s" : "") + " selected";
  bar.classList.toggle("visible", count >= 2);
}

function clearSelection() {
  state.selectedRuns.clear();

}

function compareSelected() {

}

  if (metricEntries.length > 0) {
    html += '<div class="card"><div class="card-header"><span class="card-title">Metrics</span>' +

      '<div class="card-body"><table><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody>';

      '<div class="card-body card-body--padded"><div class="chart-grid" id="metricCharts"></div></div></div>';

      '<span style="font-size:12px;color:var(--text-muted)">' + artifacts.length + " files</span></div>" +
      '<div class="card-body"><table><thead><tr><th>Path</th></tr></thead><tbody>';

      html += '<tr><td class="mono">' + escapeHtml(art) + "</td></tr>";

    html += "</tbody></table></div></div>";

    var chartsDiv = document.getElementById("metricCharts");

      }
    }
  }

// =========================================================================
// Comparison view
// =========================================================================
async function renderComparison(app, runIds) {
  if (runIds.length < 2) {
    app.innerHTML = '<div class="card"><div class="empty-state"><h3>Select runs to compare</h3><p>Go to an experiment and select at least 2 runs.</p></div></div>';
    return;
  }

  var comparison = await api("/api/compare?run_ids=" + runIds.join(","));

  var breadcrumb = '<div class="breadcrumb">' +
    '<a href="#experiments">Experiments</a>' +
    '<span class="sep">/</span>' +
    '<span>Compare (' + comparison.run_ids.length + " runs)</span></div>";

  var html = breadcrumb;
  html += '<div class="page-title">Run Comparison</div>';

  // Params diff
  var paramEntries = Object.entries(comparison.params || {}).sort(function(a, b) { return a[0].localeCompare(b[0]); });
  if (paramEntries.length > 0) {
    html += '<div class="card"><div class="card-header"><span class="card-title">Parameters</span></div>' +
      '<div class="card-body" style="overflow-x:auto"><table><thead><tr><th>Parameter</th>';
    for (var i = 0; i < comparison.run_names.length; i++) {
      var label = comparison.run_names[i] || comparison.run_ids[i].slice(0, 8);
      html += "<th>" + escapeHtml(label) + "</th>";
    }
    html += "</tr></thead><tbody>";

    paramEntries.forEach(function(entry) {
      var key = entry[0];
      var values = entry[1];
      var allSame = values.every(function(v) { return v === values[0]; });
      html += "<tr><td>" + escapeHtml(key) + "</td>";
      values.forEach(function(v) {
        var dv = v != null ? escapeHtml(v) : "-";
        html += allSame ? "<td>" + dv + "</td>" : '<td><span class="diff-highlight">' + dv + "</span></td>";
      });
      html += "</tr>";
    });
    html += "</tbody></table></div></div>";
  }

  // Metrics table
  var metricEntries = Object.entries(comparison.metrics || {}).sort(function(a, b) { return a[0].localeCompare(b[0]); });
  if (metricEntries.length > 0) {
    html += '<div class="card"><div class="card-header"><span class="card-title">Metrics</span></div>' +
      '<div class="card-body" style="overflow-x:auto"><table><thead><tr><th>Metric</th>';
    for (var mi = 0; mi < comparison.run_names.length; mi++) {
      var mlabel = comparison.run_names[mi] || comparison.run_ids[mi].slice(0, 8);
      html += "<th>" + escapeHtml(mlabel) + "</th>";
    }
    html += "</tr></thead><tbody>";

    metricEntries.forEach(function(entry) {
      var mkey = entry[0];
      var mvalues = entry[1];
      html += "<tr><td>" + escapeHtml(mkey) + "</td>";
      var numericVals = mvalues.filter(function(v) { return v != null; });
      var best = numericVals.length > 0 ? Math.max.apply(null, numericVals) : null;
      mvalues.forEach(function(v) {
        var isBest = v != null && v === best && numericVals.length > 1;
        html += "<td" + (isBest ? ' style="color:var(--green);font-weight:600"' : "") + ">" + formatMetric(v) + "</td>";
      });
      html += "</tr>";
    });
    html += "</tbody></table></div></div>";
  }

  // Metric bar chart
  if (metricEntries.length > 0) {
    html += '<div class="card"><div class="card-header"><span class="card-title">Metrics Comparison</span></div>' +
      '<div class="card-body card-body--padded"><div id="compareBarChart" class="chart-container" style="border:none;padding:0"></div></div></div>';
  }

  // Training curves overlay
  if (metricEntries.length > 0) {
    html += '<div class="card"><div class="card-header"><span class="card-title">Training Curves</span></div>' +
      '<div class="card-body card-body--padded"><div class="chart-grid" id="compareCurves"></div></div></div>';
  }

  app.innerHTML = html;

  // Render charts
  if (metricEntries.length > 0) {
    var colors = chartColors();
    var theme = plotlyTheme();

    // Bar chart
    var barTraces = [];
    for (var bi = 0; bi < comparison.run_ids.length; bi++) {
      var blabel = comparison.run_names[bi] || comparison.run_ids[bi].slice(0, 8);
      barTraces.push({
        x: metricEntries.map(function(e) { return e[0]; }),
        y: metricEntries.map(function(e) { return e[1][bi]; }),
        name: blabel,
        type: "bar",
        marker: { color: colors[bi % colors.length] },
      });
    }

    Plotly.newPlot("compareBarChart", barTraces, Object.assign({}, theme, {
      barmode: "group",
    }), { responsive: true, displayModeBar: false });

    // Overlay curves
    var curvesDiv = document.getElementById("compareCurves");
    for (var ci = 0; ci < metricEntries.length; ci++) {
      var ckey = metricEntries[ci][0];
      var ccontainer = document.createElement("div");
      ccontainer.className = "chart-container";
      curvesDiv.appendChild(ccontainer);

      var curveTraces = [];
      for (var ri = 0; ri < comparison.run_ids.length; ri++) {
        try {
          var history = await api("/api/runs/" + comparison.run_ids[ri] + "/metrics/" + encodeURIComponent(ckey));
          if (history.length > 0) {
            var clabel = comparison.run_names[ri] || comparison.run_ids[ri].slice(0, 8);
            curveTraces.push({
              x: history.map(function(h) { return h.step; }),
              y: history.map(function(h) { return h.value; }),
              type: "scatter",
              mode: "lines+markers",
              name: clabel,
              line: { color: colors[ri % colors.length], width: 2 },
              marker: { size: 3 },
            });
          }
        } catch (e) {}
      }

      if (curveTraces.length > 0) {
        Plotly.newPlot(ccontainer, curveTraces, Object.assign({}, theme, {
          title: { text: ckey, font: { color: theme.font.color, size: 13, family: "Inter, sans-serif" } },
          xaxis: Object.assign({}, theme.xaxis, { title: "Step" }),
          yaxis: Object.assign({}, theme.yaxis, { title: "Value" }),
        }), { responsive: true, displayModeBar: false });
      } else {
        ccontainer.remove();
      }
    }
  }
}

      "<td>" + formatTimeShort(ver.created_at) + "</td>" +

    html += '<div class="card"><div class="card-header"><span class="card-title">Model Signature (v' + latest.version + ')</span></div>' +

      });
      html += "</tbody></table></div></div>";

  app.innerHTML = html;

// =========================================================================
// Artifacts browser
// =========================================================================
async function renderArtifacts(app) {
  var html = '<div class="page-title">Artifacts</div>';

  // Get all models and their versions to find artifacts
  var models;
  try { models = await api("/api/models"); } catch { models = []; }

  if (models.length === 0) {
    html += '<div class="card"><div class="empty-state"><h3>No artifacts</h3><p>Register models to see their artifacts here.</p></div></div>';
    app.innerHTML = html;
    return;
  }

  var allArtifacts = [];
  for (var i = 0; i < models.length; i++) {
    try {
      var versions = await api("/api/models/" + encodeURIComponent(models[i].name) + "/versions");
      versions.forEach(function(ver) {
        if (ver.artifact_path) {
          allArtifacts.push({
            model: models[i].name,
            version: ver.version,
            stage: ver.stage,
            path: ver.artifact_path,
            onnx_status: ver.onnx_status,
            created_at: ver.created_at,
          });
        }
      });
    } catch {}
  }

  // Also get artifacts from experiment runs
  var experiments;
  try { experiments = await api("/api/experiments"); } catch { experiments = []; }

  var runArtifacts = [];
  for (var ei = 0; ei < experiments.length; ei++) {
    try {
      var runs = await api("/api/experiments/" + encodeURIComponent(experiments[ei].name) + "/runs");
      runs.forEach(function(run) {
        if (run.artifacts && run.artifacts.length > 0) {
          run.artifacts.forEach(function(art) {
            runArtifacts.push({
              experiment: experiments[ei].name,
              run: run.name || run.id.slice(0, 8),
              run_id: run.id,
              path: art,
            });
          });
        }
      });
    } catch {}
  }

  if (allArtifacts.length > 0) {
    html += '<div class="card"><div class="card-header"><span class="card-title">Model Artifacts</span>' +
      '<span style="font-size:12px;color:var(--text-muted)">' + allArtifacts.length + " total</span></div>" +
      '<div class="card-body"><table><thead><tr>' +
      "<th>Model</th><th>Version</th><th>Stage</th><th>ONNX</th><th>Path</th><th>Created</th>" +
      "</tr></thead><tbody>";
    allArtifacts.forEach(function(a) {
      var onnxBadge = a.onnx_status === "success" ? statusBadge("COMPLETED") : a.onnx_status === "failed" ? statusBadge("FAILED") : '<span class="badge badge-pending">' + escapeHtml(a.onnx_status || "pending") + "</span>";
      html += "<tr>" +
        '<td><a href="#models/' + encodeURIComponent(a.model) + '">' + escapeHtml(a.model) + "</a></td>" +
        "<td>v" + a.version + "</td>" +
        "<td>" + stageBadge(a.stage) + "</td>" +
        "<td>" + onnxBadge + "</td>" +
        '<td class="mono">' + escapeHtml(a.path) + "</td>" +
        "<td>" + formatTimeShort(a.created_at) + "</td>" +
        "</tr>";
    });
    html += "</tbody></table></div></div>";
  }

  if (runArtifacts.length > 0) {
    html += '<div class="card"><div class="card-header"><span class="card-title">Run Artifacts</span>' +
      '<span style="font-size:12px;color:var(--text-muted)">' + runArtifacts.length + " total</span></div>" +
      '<div class="card-body"><table><thead><tr>' +
      "<th>Experiment</th><th>Run</th><th>Path</th>" +
      "</tr></thead><tbody>";
    runArtifacts.forEach(function(a) {
      html += "<tr>" +
        '<td><a href="#experiments/' + encodeURIComponent(a.experiment) + '">' + escapeHtml(a.experiment) + "</a></td>" +
        '<td><a href="#runs/' + escapeHtml(a.run_id) + '">' + escapeHtml(a.run) + "</a></td>" +
        '<td class="mono">' + escapeHtml(a.path) + "</td>" +
        "</tr>";
    });
    html += "</tbody></table></div></div>";
  }

  if (allArtifacts.length === 0 && runArtifacts.length === 0) {
    html += '<div class="card"><div class="empty-state"><h3>No artifacts found</h3><p>Artifacts will appear here when models are registered or runs log artifacts.</p></div></div>';
  }

  app.innerHTML = html;
}

  var html = '<div class="page-title">Feature Store</div>';

  if (features.length === 0) {
    html += '<div class="card"><div class="empty-state"><h3>No feature schemas</h3><p>Register feature schemas with FeatureStore to see them here.</p></div></div>';
    app.innerHTML = html;
    return;
  }

  html += '<div class="filter-bar"><input type="text" id="featureFilter" placeholder="Filter features..." oninput="filterFeatures()"></div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Registered Schemas</span>' +
    '<span style="font-size:12px;color:var(--text-muted)">' + features.length + " total</span></div>" +
    '<div class="card-body"><table id="featureTable"><thead><tr>' +
    "<th>Schema Name</th><th>Version</th><th>Rows</th><th>Last Computed</th><th>Created</th><th>Updated</th>" +
    "</tr></thead><tbody>";

  features.forEach(function(f) {
    var name = f.schema_name || f.name || "-";
    html += '<tr data-name="' + escapeHtml(name.toLowerCase()) + '">' +
      "<td>" + escapeHtml(name) + "</td>" +
      "<td>v" + (f.version || 1) + "</td>" +
      "<td>" + (f.row_count != null ? f.row_count.toLocaleString() : "-") + "</td>" +
      "<td>" + formatTimeShort(f.last_computed_at) + "</td>" +
      "<td>" + formatTimeShort(f.created_at) + "</td>" +
      "<td>" + formatTimeShort(f.updated_at) + "</td>" +
      "</tr>";
  });

  html += "</tbody></table></div></div>";
  app.innerHTML = html;
}

function filterFeatures() {
  var q = document.getElementById("featureFilter").value.toLowerCase();
  document.querySelectorAll("#featureTable tbody tr").forEach(function(row) {
    row.style.display = row.dataset.name.includes(q) ? "" : "none";
  });
}

// =========================================================================
// Drift monitoring
// =========================================================================
async function renderDrift(app) {
  var driftModels;
  try { driftModels = await api("/api/drift"); } catch { driftModels = []; }

  var html = '<div class="page-title">Drift Monitoring</div>';

  if (driftModels.length === 0) {
    html += '<div class="card"><div class="empty-state"><h3>No drift data</h3><p>Configure drift monitoring with DriftMonitor to see reports here.</p></div></div>';
    app.innerHTML = html;
    return;
  }

  html += '<div class="card"><div class="card-header"><span class="card-title">Monitored Models</span>' +
    '<span style="font-size:12px;color:var(--text-muted)">' + driftModels.length + " models</span></div>" +
    '<div class="card-body"><table><thead><tr>' +
    "<th>Model</th><th>Active</th><th>Drift Status</th><th>Severity</th><th>Last Check</th>" +
    "</tr></thead><tbody>";

  driftModels.forEach(function(dm) {
    var report = dm.latest_report;
    var driftStatus = "-";
    var severity = "-";
    var lastCheck = "-";

    if (report) {
      // Report from get_drift_history is a raw dict from the DB
      var driftDetected = report.overall_drift_detected || report.drift_detected;
      driftStatus = driftDetected ? '<span class="badge badge-severe">DRIFT</span>' : '<span class="badge badge-none">OK</span>';
      severity = severityBadge(report.overall_severity || report.severity || "none");
      lastCheck = formatTimeShort(report.checked_at);
    }

    html += "<tr>" +
      '<td><a href="#drift/' + encodeURIComponent(dm.model_name) + '">' + escapeHtml(dm.model_name) + "</a></td>" +
      "<td>" + (dm.active_monitoring ? '<span class="badge badge-running">ACTIVE</span>' : '<span class="badge badge-pending">INACTIVE</span>') + "</td>" +
      "<td>" + driftStatus + "</td>" +
      "<td>" + severity + "</td>" +
      "<td>" + lastCheck + "</td>" +
      "</tr>";
  });

  html += "</tbody></table></div></div>";
  app.innerHTML = html;
}

async function renderDriftDetail(app, modelName) {
  var history;
  try { history = await api("/api/drift/" + encodeURIComponent(modelName) + "?limit=50"); } catch { history = []; }

  var breadcrumb = '<div class="breadcrumb">' +
    '<a href="#drift">Drift</a>' +
    '<span class="sep">/</span>' +
    "<span>" + escapeHtml(modelName) + "</span></div>";

  var html = breadcrumb;
  html += '<div class="page-title">Drift History: ' + escapeHtml(modelName) + "</div>";

  if (history.length === 0) {
    html += '<div class="card"><div class="empty-state"><h3>No drift reports</h3><p>No drift check history for this model.</p></div></div>';
    app.innerHTML = html;
    return;
  }

  html += '<div class="card"><div class="card-header"><span class="card-title">Reports</span>' +
    '<span style="font-size:12px;color:var(--text-muted)">' + history.length + " records</span></div>" +
    '<div class="card-body"><table><thead><tr>' +
    "<th>Checked At</th><th>Drift</th><th>Severity</th><th>Ref Samples</th><th>Cur Samples</th>" +
    "</tr></thead><tbody>";

  history.forEach(function(report) {
    var driftDetected = report.overall_drift_detected || report.drift_detected;
    html += "<tr>" +
      "<td>" + formatTime(report.checked_at) + "</td>" +
      "<td>" + (driftDetected ? '<span class="badge badge-severe">YES</span>' : '<span class="badge badge-none">NO</span>') + "</td>" +
      "<td>" + severityBadge(report.overall_severity || report.severity || "none") + "</td>" +
      "<td>" + (report.sample_size_reference || "-") + "</td>" +
      "<td>" + (report.sample_size_current || "-") + "</td>" +
      "</tr>";
  });

  html += "</tbody></table></div></div>";

  // Feature-level drift from latest report (if available in the stored data)
  var latest = history[0];
  if (latest && latest.feature_results) {
    var featureResults;
    try {
      featureResults = typeof latest.feature_results === "string" ? JSON.parse(latest.feature_results) : latest.feature_results;
    } catch { featureResults = []; }

    if (featureResults.length > 0) {
      html += '<div class="card"><div class="card-header"><span class="card-title">Feature-Level Drift (Latest)</span></div>' +
        '<div class="card-body"><table><thead><tr>' +
        "<th>Feature</th><th>PSI</th><th>KS Stat</th><th>KS p-value</th><th>Drift</th><th>Type</th>" +
        "</tr></thead><tbody>";

      featureResults.forEach(function(fr) {
        html += "<tr>" +
          "<td>" + escapeHtml(fr.feature_name) + "</td>" +
          '<td class="mono">' + formatMetric(fr.psi) + "</td>" +
          '<td class="mono">' + formatMetric(fr.ks_statistic) + "</td>" +
          '<td class="mono">' + formatMetric(fr.ks_pvalue) + "</td>" +
          "<td>" + (fr.drift_detected ? '<span class="badge badge-severe">YES</span>' : '<span class="badge badge-none">NO</span>') + "</td>" +
          "<td>" + severityBadge(fr.drift_type || "none") + "</td>" +
          "</tr>";
      });

      html += "</tbody></table></div></div>";

      // PSI bar chart
      html += '<div class="card"><div class="card-header"><span class="card-title">PSI by Feature</span></div>' +
        '<div class="card-body card-body--padded"><div id="psiChart" class="chart-container" style="border:none;padding:0"></div></div></div>';
    }
  }

  app.innerHTML = html;

  // Render PSI chart
  if (latest && latest.feature_results) {
    var fr;
    try {
      fr = typeof latest.feature_results === "string" ? JSON.parse(latest.feature_results) : latest.feature_results;
    } catch { fr = []; }

    if (fr.length > 0) {
      var theme = plotlyTheme();
      var psiColors = fr.map(function(f) {
        if (f.psi >= 0.25) return "var(--red)";
        if (f.psi >= 0.1) return "var(--yellow)";
        return "var(--green)";
      });

      Plotly.newPlot("psiChart", [{
        x: fr.map(function(f) { return f.feature_name; }),
        y: fr.map(function(f) { return f.psi; }),
        type: "bar",
        marker: { color: psiColors },
      }], Object.assign({}, theme, {
        xaxis: Object.assign({}, theme.xaxis, { title: "Feature" }),
        yaxis: Object.assign({}, theme.yaxis, { title: "PSI" }),
        shapes: [{
          type: "line", x0: -0.5, x1: fr.length - 0.5,
          y0: 0.2, y1: 0.2,
          line: { color: "var(--red)", width: 1, dash: "dash" },
        }],
      }), { responsive: true, displayModeBar: false });
    }
  }
}
</script>
