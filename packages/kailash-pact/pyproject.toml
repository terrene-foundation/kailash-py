[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kailash-pact"
version = "0.5.0"
description = "PACT governance framework — D/T/R accountability grammar, operating envelopes, knowledge clearance, and verification gradient for AI agent organizations"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "Terrene Foundation" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
readme = "README.md"
keywords = ["governance", "pact", "agent", "trust", "D/T/R", "envelopes", "clearance", "EATP", "AI"]
dependencies = [
    "kailash>=2.2.0",
    "click>=8.0",
    "fastapi>=0.109",
    "slowapi>=0.1.9",
    # Kaizen integration
    "kailash-kaizen>=2.0.0",
    # PostgreSQL
    "psycopg[binary]>=3.0",
    "psycopg_pool>=3.0",
]

[project.urls]
Documentation = "https://docs.terrene.foundation/kailash-pact"
Repository = "https://github.com/terrene-foundation/kailash-py/tree/main/packages/kailash-pact"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
    "hypothesis>=6.98",
    "httpx>=0.27",
    "mypy>=1.8",
    "ruff>=0.3",
]

[project.scripts]
kailash-pact = "pact.governance.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/pact"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
timeout = 120
markers = [
    "security: marks tests as security regression tests",
    "unit: Unit tests (no I/O, no network)",
    "integration: Integration tests (real stores, files)",
    "property: Property-based tests (Hypothesis)",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.mypy]
python_version = "3.11"
strict = true
