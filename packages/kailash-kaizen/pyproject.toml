[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kailash-kaizen"
version = "2.42.0"
description = "Advanced AI agent framework built on Kailash SDK"
authors = [{name = "Terrene Foundation", email = "info@terrene.foundation"}]
readme = "README.md"
license = {text = "Apache-2.0"}
keywords = ["kailash", "ai", "agents", "workflow", "automation", "signature-programming"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Operating System :: OS Independent",
]
dependencies = [
    # ─────────────────────────────────────────────────────────────
    # Kaizen core. Slimmed from 29 deps per the issue #890 audit; aiosqlite
    # promoted back to core in 2.24.5 (kaizen.memory.persistent_tiers imports
    # it eagerly, so it cannot be an optional extra). All other deps (provider
    # SDKs, observability, PostgreSQL, RAG numerics) remain lazy-loaded or
    # scoped to optional subsystems behind extras.
    # ─────────────────────────────────────────────────────────────
    "kailash>=2.56.0",  # mask_error_text (ollama_provider.py) is new in core 2.56.0
    "kailash-mcp>=0.2.4",       # core/base_agent.py:32 module-scope MCPClient
    "pydantic>=2.0.0",          # llm/deployment.py + auth modules
    "typing-extensions>=4.5.0", # core/schema_factory.py
    "anyio>=4.0.0",             # autonomy observability/hooks/interrupts
    "httpx>=0.25.0",            # llm/http_client.py + llm/client.py module-scope
    "aiohttp>=3.13.3",          # autonomy/control/transports/http + nodes/ai/semantic_memory
    "PyJWT>=2.8.0",             # security/authentication.py module-scope
    "cryptography>=41.0.0",     # security/encryption.py (AESGCM, PBKDF2HMAC, hashes)
    "aiosqlite>=0.19.0",        # memory/persistent_tiers.py module-scope (multi-tier memory); pure-Python over stdlib sqlite3
]
requires-python = ">=3.11"

[project.optional-dependencies]
# ─────────────────────────────────────────────────────────────────
# LLM provider SDKs — opt-in per provider. All imports are
# function-local in providers/llm/{azure,google}.py and friends.
# ─────────────────────────────────────────────────────────────────
providers-azure = [
    # #1892: azure-ai-inference + azure-core were dropped -- their sole
    # consumer (the legacy kaizen.providers.llm.azure.AzureAIFoundryProvider,
    # the azure.ai.inference-SDK-based chat/embed client) was removed; Azure
    # AI Foundry is now served by the four-axis LlmClient (azure_ai_foundry
    # preset), which speaks plain HTTPS via httpx (already a core dep) -- no
    # Azure SDK needed. azure-identity remains: kaizen.llm.auth.azure.AzureEntra
    # (four-axis auth) still uses it for the workload-identity / managed-
    # identity variants.
    "azure-identity>=1.15.0",
]
providers-google = [
    "google-genai>=1.21.0",
]
providers-tokens = [
    "tiktoken>=0.5.0",
]
providers-http = [
    "requests>=2.32",   # signatures/multi_modal + huggingface embedder fallbacks
]

# Server endpoints — autonomy hook metrics + monitoring/dashboard. Per
# framework-first.md, kailash-nexus is the canonical API surface; the
# in-tree FastAPI surfaces here are auxiliary and behind this extra.
server = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
]

# Observability — Prometheus metrics + OpenTelemetry tracing + structlog.
observability = [
    "prometheus-client>=0.19.0",
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "structlog>=23.0.0",
]

# Database extra — PostgreSQL trust migration (asyncpg). asyncpg is genuinely
# optional: Postgres-only and not eagerly imported anywhere. (aiosqlite, the
# multi-tier-memory dep, is now a core dependency — see above — because it is
# imported eagerly by kaizen.memory.persistent_tiers.)
db = [
    "asyncpg>=0.28.0",
]

# Distributed cache — governance/rate_limiter.
cache = [
    "redis>=5.0.0",
]

# RAG / multimodal — the complete `import kaizen.nodes.rag` dependency set.
# numpy/Pillow: similarity, vision, hybrid search. networkx: graph RAG.
# requests: pulled transitively via kailash.nodes.api.rest / the kailash data
# path that the resurrected rag modules import. (aiosqlite is now a core dep.)
rag = [
    "numpy>=1.24.0",
    "Pillow>=10.0.0",
    "networkx>=3.0",
    "requests>=2.32",
]

# Research validator — GitPython for repo introspection.
research-validator = [
    "GitPython>=3.1.0",
]

dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "black>=23.0",
    "isort>=5.12",
    "ruff>=0.1.0",
    "fakeredis>=2.20.0",
    "respx>=0.21.0",
    "pytest-benchmark>=4.0.0",
    "pymongo>=4.6.0",  # tests/utils/docker_config.py MongoDB health check
    # pytest.ini declares `timeout = 120` + @pytest.mark.timeout(N) markers
    # tree-wide; the plugin providing both was undeclared (testing.md §
    # "Pytest Plugin + Marker Declaration Pair" — plugin + marker registration
    # MUST land together). Found as a pre-existing "Unknown config option:
    # timeout" warning during this session's gate run; fixed per
    # zero-tolerance.md Rule 1 (pre-existing warnings MUST be resolved
    # immediately).
    "pytest-timeout>=2.2.0",
]
# AWS Bedrock preset (#498 Session 3, S4b-i) -- botocore owns SigV4
# canonicalization; inlined hmac.new in kaizen.llm.auth.aws is BLOCKED.
bedrock = [
    "botocore>=1.34",
]
# Vertex AI presets (#498 Session 5, S5) -- google-auth owns the OAuth2
# token-fetch flow; inlined JWT-bearer signing in kaizen.llm.auth.gcp
# is BLOCKED by zero-tolerance Rule 4.
vertex = [
    "google-auth>=2.0",
]
# Open-weight LLM interpretability diagnostics (#567 PR#4 of 7).
# InterpretabilityDiagnostics uses transformers for AutoModel+tokenizer,
# sae-lens for pre-trained Gemma-Scope SAE features. Plotting methods
# also require plotly + matplotlib which are installed via these two
# anchor deps' transitive trees.
interpretability = [
    "transformers>=4.40,<5.0",
    "sae-lens>=3.0",
]
# LLM-as-judge surface: LLMDiagnostics + LLMJudge + wrapper judges
# (#567 PR#5 of 7). Bundles algorithmic metrics (ROUGE/BLEU/BERTScore)
# for parity with MLFP's LLMDiagnostics.evaluate_* API. LLM calls route
# through kaizen_agents.Delegate (framework-first); this extra covers
# the optional algorithmic + structural-similarity deps.
judges = [
    "bert-score>=0.3.13",
    "rouge-score>=0.1.2",
    "sacrebleu>=2.4",
]
# Pure-algorithmic NLP metrics (no LLM, no cost surface). Split from
# [judges] so users who only want grep-able reference comparisons don't
# pay for the full judge runtime.
evaluation = [
    "rouge-score>=0.1.2",
    "sacrebleu>=2.4",
    "bert-score>=0.3.13",
]
# Research surface — arxiv paper search + PDF parsing for ResearchParser
# (#814 — declare lazy-import deps in research/parser.py).
research = [
    "arxiv>=2.0",
    "pypdf>=4.0",
]
# Web-search surface — DuckDuckGo search + HTML extraction for
# WebSearchTool/WebFetchTool (#814 — declare lazy-import deps in
# tools/native/search_tools.py + convert bs4 silent-degradation to
# loud failure).
web-search = [
    "duckduckgo-search>=6.0",
    "beautifulsoup4>=4.12",
]

# Backwards-compatibility umbrella — preserves the pre-#890 default install.
all = [
    "kailash-kaizen[providers-azure,providers-google,providers-tokens,providers-http,server,observability,db,cache,rag,research-validator]",
]

[project.urls]
Homepage = "https://github.com/terrene-foundation/kailash-py"
Documentation = "https://docs.kailash.com/kaizen"
Repository = "https://github.com/terrene-foundation/kailash-py"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (real services)",
    "e2e: End-to-end tests (complete flows)",
    "requires_azure: Tests requiring Azure AI Foundry credentials",
    "requires_docker: Tests requiring Docker Model Runner",
    "requires_google: Tests requiring Google Gemini credentials",
    "regression: Regression tests for fixed bugs",
    "benchmark: Performance benchmark tests (pytest-benchmark)",
]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "examples/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
# Ignore specific rules that cause false positives
extend-ignore = [
    "F401",  # Unused imports in __init__.py (re-exports)
    "F811",  # Redefinition of functions (known issue, post-release fix)
    "F821",  # Undefined names (forward references in type hints)
    "E402",  # Module level import not at top (conditional imports)
    "E721",  # Type comparison using ==  (acceptable pattern)
    "E712",  # Comparison to True/False (acceptable pattern)
    "E722",  # Bare except clauses (intentional fallback patterns)
    "E741",  # Ambiguous variable names (common patterns)
    "F841",  # Local variable assigned but never used
]

[tool.ruff.lint.per-file-ignores]
# Allow all patterns in test files
"tests/**/*.py" = ["E", "F"]
