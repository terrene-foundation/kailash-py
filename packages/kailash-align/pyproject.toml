[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kailash-align"
version = "0.7.0"
description = "LLM fine-tuning and alignment framework for the Kailash platform"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Terrene Foundation", email = "engineering@terrene.foundation" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "kailash>=2.11.0",
    "kailash-ml>=0.11.0",
    "kailash-kaizen>=2.7.5",
    "torch>=2.2,<3.0",
    "transformers>=4.40,<5.0",
    "trl>=1.0,<2.0",
    "peft>=0.10",
    "accelerate>=1.4",
    "datasets>=4.0",
    "click>=8.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
rlhf = [
    "bitsandbytes>=0.43,<1.0",
]
eval = [
    "lm-eval>=0.4,<1.0",
]
serve = [
    "llama-cpp-python>=0.3",
    "gguf>=0.10",
]
online = [
    "vllm>=0.6",
]
rl-bridge = [
    "kailash-ml[rl]>=1.1,<2.0",
]
all = [
    "kailash-align[rlhf,eval,serve,online,rl-bridge]",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
    "ruff>=0.3",
]

[project.scripts]
kailash-align-prepare = "kailash_align.cli:main"

[project.urls]
Documentation = "https://docs.terrene.foundation/kailash-align"
Repository = "https://github.com/terrene-foundation/kailash-py/tree/main/packages/kailash-align"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/kailash_align"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
timeout = 30
markers = [
    "unit: Unit tests (no I/O, no network)",
    "integration: Tier 2 integration tests (real infrastructure, no mocks)",
    "gpu: Tests requiring GPU (slow, skipped by default)",
]

[tool.ruff]
target-version = "py311"
line-length = 100
