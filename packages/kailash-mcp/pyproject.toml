[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kailash-mcp"
version = "0.2.5"
description = "Production-ready Model Context Protocol (MCP) client, server, and platform for Kailash SDK"
authors = [{name = "Terrene Foundation", email = "info@terrene.foundation"}]
readme = "README.md"
license = {text = "Apache-2.0"}
keywords = ["mcp", "model-context-protocol", "kailash", "workflow", "ai", "agents"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
]
dependencies = [
    "kailash>=2.8.6",
    "mcp[cli]>=1.23.0",
    "pydantic>=2.6",
]
requires-python = ">=3.11"

[project.optional-dependencies]
http = [
    "aiohttp>=3.12.4",
    "httpx>=0.25.0",
]
sse = [
    "aiohttp>=3.12.4",
]
websocket = [
    "websockets>=12.0",
]
auth-jwt = [
    "PyJWT>=2.8",
    "cryptography>=41.0",
]
auth-oauth = [
    "PyJWT>=2.8",
    "cryptography>=41.0",
    "aiohttp>=3.12.4",
]
server = [
    "fastapi>=0.115.12",
    "uvicorn[standard]>=0.31.0",
]
platform = [
    "fastapi>=0.115.12",
    "uvicorn[standard]>=0.31.0",
]
full = [
    "kailash-mcp[http,sse,websocket,auth-jwt,auth-oauth,server,platform]",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
]

[project.scripts]
kailash-mcp = "kailash_mcp.platform_server:main"

[project.urls]
Homepage = "https://github.com/terrene-foundation/kailash-py"
Repository = "https://github.com/terrene-foundation/kailash-py"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (real services)",
    "e2e: End-to-end tests (complete flows)",
]
asyncio_mode = "auto"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E203", "E501", "F401", "F841"]
