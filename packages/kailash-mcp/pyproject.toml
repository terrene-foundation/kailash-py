[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kailash-mcp"
version = "0.3.1"
description = "Production-ready Model Context Protocol (MCP) client, server, and platform for Kailash SDK"
authors = [{name = "Terrene Foundation", email = "info@terrene.foundation"}]
readme = "README.md"
license = {text = "Apache-2.0"}
keywords = ["mcp", "model-context-protocol", "kailash", "workflow", "ai", "agents"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
]
dependencies = [
    # ─────────────────────────────────────────────────────────────
    # MCP wrapper core. Audit (#890):
    # - kailash + mcp[cli] required.
    # - pydantic was an ORPHAN (zero imports in src/kailash_mcp/);
    #   `mcp[cli]` already declares pydantic as its own dep so it
    #   remains transitively available. DELETED in 0.2.13.
    # - aiohttp + websockets are referenced UNCONDITIONALLY at
    #   module-scope class-body type annotations in
    #   transports.py:902 (StreamableHTTPTransport) +
    #   transports.py:954 (WebSocket transport). They are NOT
    #   optional — `import kailash_mcp` fails on a clean install
    #   without them (NoneType.ClientResponse / NoneType
    #   .WebSocketServerProtocol at class-definition time). 0.2.14
    #   restores them to core deps. The `[http]` / `[sse]` /
    #   `[websocket]` extras retain their declarations as harmless
    #   redundancy (already-installed entries are no-ops).
    # ─────────────────────────────────────────────────────────────
    "kailash>=2.50.0",
    "mcp[cli]>=1.23.0",
    "aiohttp>=3.12.4",
    "websockets>=12.0",
]
requires-python = ">=3.11"

[project.optional-dependencies]
http = [
    "aiohttp>=3.12.4",
    "httpx>=0.25.0",
]
sse = [
    "aiohttp>=3.12.4",
]
websocket = [
    "websockets>=12.0",
]
auth-jwt = [
    "PyJWT>=2.8",
    "cryptography>=41.0",
]
auth-oauth = [
    "PyJWT>=2.8",
    "cryptography>=41.0",
    "aiohttp>=3.12.4",
]
server = [
    "fastapi>=0.115.12",
    "uvicorn[standard]>=0.31.0",
]
platform = [
    "fastapi>=0.115.12",
    "uvicorn[standard]>=0.31.0",
]
# Operational monitoring (real Prometheus histogram for tool/resource/prompt
# call duration — #1708 W2). Guarded via try/except ImportError in
# utils/metrics.py so this stays an OPTIONAL extra: absence silently
# disables the mcp_tool_duration_seconds Histogram without breaking
# `import kailash_mcp`. Mirrors the `monitoring` extra name in the root
# kailash package (pyproject.toml).
monitoring = [
    "prometheus-client>=0.22.1",
]
full = [
    "kailash-mcp[http,sse,websocket,auth-jwt,auth-oauth,server,platform,monitoring]",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
]

[project.scripts]
kailash-mcp = "kailash_mcp.platform_server:main"

[project.urls]
Homepage = "https://github.com/terrene-foundation/kailash-py"
Repository = "https://github.com/terrene-foundation/kailash-py"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (real services)",
    "e2e: End-to-end tests (complete flows)",
    "regression: Regression tests for specific issues (NEVER deleted)",
]
asyncio_mode = "auto"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E203", "E501", "F401", "F841"]
