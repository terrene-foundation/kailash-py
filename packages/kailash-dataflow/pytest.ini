[pytest]
# DataFlow Test Configuration

# Python path (required for imports)
pythonpath = src

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (fast, mocked, no external dependencies)
    integration: Integration tests (requires Docker services)
    e2e: End-to-end tests (complete user workflows)
    critical: Critical functionality that must pass
    slow: Tests that take > 10 seconds
    requires_postgres: Test requires PostgreSQL
    requires_mysql: Test requires MySQL
    requires_redis: Test requires Redis
    requires_docker: Test requires Docker services
    performance: Performance-related tests
    tier1: Unit tests (fast, no external dependencies)
    tier2: Integration tests (requires Docker services)
    tier3: End-to-end tests (complete user workflows)
    tdd: TDD-enhanced tests with savepoint isolation (<100ms target)
    postgresql: Tests for PostgreSQL database
    sqlite: Tests for SQLite database
    bug_reproduction: Bug reproduction tests (minimal failing examples)
    bug_investigation: Bug investigation tests (hypothesis validation)
    regression: Regression tests for fixed bugs (permanent, never delete)

# Test output
# NOTE (issue #979 S1 — CRIT-B): `-m` lives HERE as the SOLE marker-filter
# location for the unit tier. The integration / e2e workflows MUST NOT
# inject another `-m` on the command line; they override by passing
# `-o "addopts="` followed by their own marker expression. Keeping the
# filter pinned to one config file makes the active filter grep-able.
addopts =
    -v
    --strict-markers
    --tb=short
    -m "not (requires_postgres or requires_mysql or requires_redis or requires_docker)"

# Per-test timeout (issue #979 S1 — PR #976 failure-layer 1).
# Without these directives a hung test consumes the whole job's wall-clock
# instead of failing with a per-test traceback. `pytest-timeout>=2.3.0`
# is the corresponding plugin pin in pyproject.toml's `[dev]` extras.
timeout = 120
timeout_method = thread

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function

# Coverage options (when run with pytest-cov)
[coverage:run]
source = packages/kailash-dataflow
omit =
    */tests/*
    */test_*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
