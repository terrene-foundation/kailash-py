[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kailash-dataflow"
version = "2.9.0"
description = "Workflow-native database framework for Kailash SDK"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "Terrene Foundation", email = "info@terrene.foundation" }
]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    # ─────────────────────────────────────────────────────────────
    # DataFlow core. Down from 22 deps → 5. See issue #890 audit.
    # asyncpg + sqlalchemy stay core because the migrations module
    # (17 files under src/dataflow/migrations/) imports asyncpg at
    # module-scope and is the canonical PostgreSQL DDL surface.
    # Refactoring migrations to lazy-import is a separate workstream.
    # MySQL / SQLite / Mongo / Redis drivers move behind their per-DB
    # extras since their imports are function-local.
    # ─────────────────────────────────────────────────────────────
    "kailash>=2.18.0",
    "sqlalchemy>=2.0.0",   # decorators.py + multi_tenancy + model_registry
    "asyncpg>=0.28.0",     # migrations/* (17 files, module-scope) — PG canonical async driver
    "click>=8.0.0",        # CLI: dataflow.cli.{validate,analyze,generate,perf,commands}
    "sqlparse>=0.5.0",     # tenancy/interceptor.py:15 module-scope
]

[project.optional-dependencies]
# ─────────────────────────────────────────────────────────────────
# Database driver extras — pick the additional driver(s) your app uses.
# Postgres async (asyncpg) is core; psycopg2-binary (sync), aiomysql,
# aiosqlite, motor+pymongo are opt-in.
# ─────────────────────────────────────────────────────────────────
postgres-sync = [
    "psycopg2-binary>=2.9",  # sync paths (migrations/sync_ddl_executor.py, etc.)
]
mysql = [
    "aiomysql>=0.2.0",
]
sqlite = [
    "aiosqlite>=0.19.0",
]
mongo = [
    "motor>=3.3.0",
    "pymongo[srv]>=4.5.0",  # `[srv]` extra pulls dnspython transitively for mongodb+srv:// URLs
]
redis = [
    "redis>=4.5.0",
]

# Optional FastAPI surfaces — `nexus_adapter` + the SaaS / API gateway templates.
# Most apps using Kailash should run their HTTP layer through `kailash-nexus`;
# this extra is present for the in-tree fabric/nexus integration helpers.
api = [
    "fastapi>=0.104.0",
]

# Multi-tenancy + audit-trail crypto. Function-local imports of
# cryptography.fernet / cryptography.hazmat — the slim install does not
# carry it.
security = [
    "cryptography>=3.4.0",
]

# Performance instrumentation (psutil-driven migration validators + perf testers).
monitoring = [
    "psutil>=5.9.0",
]

# Templates — SaaS starter + API gateway starter scaffolds. These are
# example apps users copy out of the wheel; they need PyJWT + pydantic +
# FastAPI to run. Not required by `import dataflow`.
templates = [
    "PyJWT[crypto]>=2.8.0",
    "pydantic>=2.0.0",
    "fastapi>=0.104.0",
]

# Existing fabric + extras (preserved verbatim from the prior layout).
fabric = [
    "httpx>=0.27",
    "watchdog>=4.0",
    "msgpack>=1.0",
    "prometheus-client>=0.20",
]
cloud = [
    "boto3>=1.35",
    "google-cloud-storage>=2.18",
]
excel = [
    "openpyxl>=3.1.0",
]
parquet = [
    "pyarrow>=14.0.0",
]
streaming = [
    "aiokafka>=0.11",
    "websockets>=13.0",
]
fabric-all = [
    "kailash-dataflow[fabric,cloud,excel,parquet,streaming]",
]

# Backwards-compatibility umbrella — preserves the pre-#890 default install
# experience for users who don't want to migrate.
all = [
    "kailash-dataflow[postgres-sync,mysql,sqlite,mongo,redis,api,security,monitoring,templates,fabric-all]",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.0.0",
    # Required for pytest.ini::timeout — surfaces hung tests as single-test
    # failures with stack traces, instead of 15-minute job-wide timeouts
    # that lose all diagnostic. Without this plugin pytest silently ignores
    # the `timeout` / `timeout_method` directives.
    "pytest-timeout>=2.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
    # Pinned EXACT for the engine.py pyright regression gate
    # (tests/regression/test_engine_pyright_invariant.py). Bumping requires
    # re-baselining the gate's PINNED_PYRIGHT_VERSION + thresholds in the
    # SAME PR per zero-tolerance.md Rule 1b.
    "pyright==1.1.371",
]

# CLI entry point removed — all commands were stubs printing "coming soon".
# Reinstated when real CLI functionality is implemented.

[project.urls]
Homepage = "https://github.com/terrene-foundation/kailash-py"
Repository = "https://github.com/terrene-foundation/kailash-py"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
markers = [
    "unit: tier 1 unit tests (mocks allowed)",
    "integration: tier 2 integration tests (real infrastructure)",
    "e2e: tier 3 end-to-end tests (real infrastructure)",
    "regression: permanent bug reproduction",
    "security: security-critical path",
    "trust: trust-plane path",
]

[tool.coverage.run]
source = ["src/dataflow"]
branch = true
omit = [
    "tests/*",
    "*/__init__.py",
    "*/_vendor/*",
]

[tool.coverage.report]
# General coverage floor per rules/testing.md § Coverage Requirements.
# Security-critical subpackages (src/dataflow/security,
# src/dataflow/trust) are gated to 100% separately — run pytest with
# --cov=src/dataflow/security --cov=src/dataflow/trust
# --cov-fail-under=100 for that target.
fail_under = 80
show_missing = true
skip_covered = false
precision = 2
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.black]
line-length = 88
target-version = ["py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
