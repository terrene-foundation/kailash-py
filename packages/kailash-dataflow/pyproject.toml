[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kailash-dataflow"
version = "2.0.9"
description = "Workflow-native database framework for Kailash SDK"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "Terrene Foundation", email = "info@terrene.foundation" }
]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "kailash>=2.8.6",
    "sqlalchemy>=2.0.0",
    "alembic>=1.12.0",
    "asyncpg>=0.28.0",
    "aiosqlite>=0.19.0",
    "aiomysql>=0.2.0",
    "motor>=3.3.0",
    "pymongo>=4.5.0",
    "dnspython>=2.4.0",
    "redis>=4.5.0",
    "pydantic>=2.0.0",
    "click>=8.0.0",
    "sqlparse>=0.5.0",
    # API
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "PyJWT[crypto]>=2.8.0",
    "passlib[bcrypt]>=1.7.4",
    # Enterprise
    "cryptography>=3.4.0",
    "flask>=2.0.0",
    "flask-jwt-extended>=4.0.0",
    # Performance
    "psutil>=5.9.0",
]

[project.optional-dependencies]
fabric = [
    "httpx>=0.27",
    "watchdog>=4.0",
    "msgpack>=1.0",
    "prometheus-client>=0.20",
]
cloud = [
    "boto3>=1.35",
    "google-cloud-storage>=2.18",
]
excel = [
    "openpyxl>=3.1.0",
]
parquet = [
    "pyarrow>=14.0.0",
]
streaming = [
    "aiokafka>=0.11",
    "websockets>=13.0",
]
fabric-all = [
    "kailash-dataflow[fabric,cloud,excel,parquet,streaming]",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
]

# CLI entry point removed — all commands were stubs printing "coming soon".
# Reinstated when real CLI functionality is implemented.

[project.urls]
Homepage = "https://github.com/terrene-foundation/kailash-py"
Repository = "https://github.com/terrene-foundation/kailash-py"
Issues = "https://github.com/terrene-foundation/kailash-py/issues"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
markers = [
    "unit: tier 1 unit tests (mocks allowed)",
    "integration: tier 2 integration tests (real infrastructure)",
    "e2e: tier 3 end-to-end tests (real infrastructure)",
    "regression: permanent bug reproduction",
    "security: security-critical path",
    "trust: trust-plane path",
]

[tool.coverage.run]
source = ["src/dataflow"]
branch = true
omit = [
    "tests/*",
    "*/__init__.py",
    "*/_vendor/*",
]

[tool.coverage.report]
# General coverage floor per rules/testing.md § Coverage Requirements.
# Security-critical subpackages (src/dataflow/security,
# src/dataflow/trust) are gated to 100% separately — run pytest with
# --cov=src/dataflow/security --cov=src/dataflow/trust
# --cov-fail-under=100 for that target.
fail_under = 80
show_missing = true
skip_covered = false
precision = 2
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.black]
line-length = 88
target-version = ["py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
