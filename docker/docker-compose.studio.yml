version: '3.8'

services:
  # Shared infrastructure services
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kailash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kailash123}
      POSTGRES_DB: kailash_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kailash"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy for multi-tenant routing
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - studio-backend
      - studio-frontend

  # Backend API service (per tenant)
  studio-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      - TENANT_ID=${TENANT_ID:-default}
      - DATABASE_URL=postgresql://kailash:${POSTGRES_PASSWORD:-kailash123}@postgres:5432/kailash_studio
      - REDIS_URL=redis://redis:6379/${REDIS_DB:-0}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ../tenants/${TENANT_ID:-default}/workflows:/app/workflows
      - ../tenants/${TENANT_ID:-default}/data:/app/data
      - ../tenants/${TENANT_ID:-default}/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m kailash.api.studio --host 0.0.0.0 --port 8000

  # Frontend service (per tenant)
  studio-frontend:
    build:
      context: ../studio
      dockerfile: ../docker/Dockerfile.frontend
      args:
        - REACT_APP_API_URL=${API_URL:-http://localhost:8000}
        - REACT_APP_TENANT_ID=${TENANT_ID:-default}
    ports:
      - "3000:80"
    depends_on:
      - studio-backend
    environment:
      - NODE_ENV=production

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: kailash-studio-network