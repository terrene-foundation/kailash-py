version: '3.8'

services:
  # PostgreSQL for Admin Framework
  postgres-admin:
    image: postgres:15-alpine
    container_name: kailash-admin-postgres
    environment:
      POSTGRES_DB: kailash_admin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./init-admin-db.sql:/docker-entrypoint-initdb.d/02-admin.sql
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d kailash_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Ollama for LLM operations
  ollama:
    image: ollama/ollama:latest
    container_name: kailash-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support is optional - comment out if no GPU available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Redis for caching and session management
  redis-admin:
    image: redis:7-alpine
    container_name: kailash-admin-redis
    ports:
      - "6380:6379"  # Different port to avoid conflicts
    volumes:
      - admin_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  admin_postgres_data:
  admin_redis_data:
  ollama_data:

networks:
  default:
    name: kailash-admin-network
