version: '3.8'

services:
  # PostgreSQL Database for production multi-tenant setup
  postgres:
    image: postgres:15-alpine
    container_name: kailash-postgres
    environment:
      POSTGRES_DB: kailash_studio
      POSTGRES_USER: kailash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kailash123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kailash -d kailash_studio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching and real-time features
  redis:
    image: redis:7-alpine
    container_name: kailash-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API with Studio endpoints
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: kailash-backend
    environment:
      DATABASE_URL: postgresql://kailash:${POSTGRES_PASSWORD:-kailash123}@postgres:5432/kailash_studio
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      TENANT_ID: ${TENANT_ID:-default}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src
      - workflow_data:/app/data
    command: python -m uvicorn kailash.api.studio:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Frontend React app
  frontend:
    build:
      context: ../studio
      dockerfile: ../docker/Dockerfile.frontend
    container_name: kailash-frontend
    environment:
      REACT_APP_API_URL: ${API_URL:-http://localhost:8000}
      REACT_APP_WS_URL: ${WS_URL:-ws://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: kailash-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # MinIO for object storage (workflows, node implementations, etc.)
  minio:
    image: minio/minio:latest
    container_name: kailash-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kailash}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kailash123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: kailash-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: kailash-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  workflow_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: kailash-network
