name: Test kailash-ml

# IT-1 note: CUDA jobs run on [self-hosted, cuda, gpu] runners with
# continue-on-error: true until the runner is provisioned and verified
# green via gpu-smoke.yml.  Once green, flip to blocking by removing
# the `continue-on-error: true  # IT-1: non-blocking until runner live`
# line from each CUDA job.  Grep pattern for the flip:
#   grep -n 'continue-on-error: true.*IT-1' .github/workflows/test-kailash-ml.yml

on:
  push:
    branches: [feat/*, feature/*, fix/*, docs/*, session/*, session-*]
    paths:
      - "packages/kailash-ml/**"
      - ".github/workflows/test-kailash-ml.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/kailash-ml/**"
      - ".github/workflows/test-kailash-ml.yml"
  workflow_dispatch:
    inputs:
      variant:
        description: "Test variant to run"
        required: false
        default: "base"
        type: choice
        options:
          - base
          - dl
          - rl
          - cuda
          - all

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check version consistency
        run: |
          PYPROJECT_VER=$(python -c "
          import tomllib
          with open('packages/kailash-ml/pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          INIT_VER=$(python -c "
          import ast, pathlib
          src = pathlib.Path('packages/kailash-ml/src/kailash_ml/_version.py').read_text()
          for node in ast.walk(ast.parse(src)):
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if getattr(target, 'id', '') == '__version__':
                          print(ast.literal_eval(node.value))
          ")
          echo "pyproject.toml: $PYPROJECT_VER"
          echo "_version.py:    $INIT_VER"
          if [ "$PYPROJECT_VER" != "$INIT_VER" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VER vs _version.py=$INIT_VER"
            exit 1
          fi

  test-base:
    name: Base (Python ${{ matrix.python-version }})
    needs: version-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-ml-py${{ matrix.python-version }}-${{ hashFiles('packages/kailash-ml/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-ml-py${{ matrix.python-version }}-

      - name: Install kailash-ml[dev]
        run: |
          uv venv .venv
          # Install root kailash editable — kailash.diagnostics.protocols
          # (PR #570) is not yet on PyPI, so a transitive resolve would miss
          # the module that PR#2+ (issue #567) diagnostics adapters import.
          uv pip install -e "." --python .venv/bin/python
          uv pip install -e "packages/kailash-ml[dev]" --python .venv/bin/python

      - name: Lint (ruff)
        run: |
          .venv/bin/ruff check packages/kailash-ml/src/ packages/kailash-ml/tests/ --select=E9,F63,F7,F82

      - name: Test (unit + integration)
        timeout-minutes: 10
        run: |
          .venv/bin/python -m pytest \
            packages/kailash-ml/tests/unit/ \
            -m 'not (slow or gpu or bench)' \
            --maxfail=10 -q --timeout=30

      - name: Coverage
        if: matrix.python-version == '3.12'
        run: |
          # Coverage must install the [dl] extra AND run tests/integration/
          # — the unit tests use `pytest.importorskip("torch")`, so without
          # torch installed they SKIP silently and dl.py (596 stmts) drops
          # coverage to ~23%. The integration tests exercise the real torch
          # surface and are the only place dl.py / every plot_* / grad_cam /
          # lr_range_test / diagnose_* path actually runs.
          #
          # Also install the root `kailash` package editable from the local
          # tree — `kailash.diagnostics.protocols` (PR #570) has not been
          # released to PyPI yet, so a transitive `kailash>=2.8.9` resolve
          # from PyPI would miss the module the integration tests import.
          uv pip install -e "." --python .venv/bin/python
          uv pip install -e "packages/kailash-ml[dl,dev,stats]" --python .venv/bin/python
          # kailash-ml integration tests import `kailash_align` via
          # test_rl_align_cross_sdk_wiring.py (cross-SDK RL protocol wiring).
          # Install kailash-align editable so the test collects cleanly.
          # Per rules/deployment.md § "Sibling-Package CI Installs Root
          # SDK Editable For Unreleased Core Modules" — the same discipline
          # applies bi-directionally at the bridge boundary.
          uv pip install -e "packages/kailash-align[dev]" --python .venv/bin/python
          # pytest-httpserver for test_drift_alerting_wiring webhook tests
          uv pip install pytest-cov pytest-httpserver --python .venv/bin/python
          .venv/bin/python -m pytest \
            packages/kailash-ml/tests/unit/ \
            packages/kailash-ml/tests/integration/ \
            -m 'not (slow or gpu or bench)' \
            --cov=packages/kailash-ml/src/kailash_ml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -q --timeout=60

  test-dl:
    name: Deep Learning
    needs: version-check
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.variant == 'dl' || inputs.variant == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install kailash-ml[dl,dev]
        run: |
          uv venv .venv
          uv pip install -e "." --python .venv/bin/python
          uv pip install -e "packages/kailash-ml[dl,dev]" --python .venv/bin/python

      - name: Test DL
        timeout-minutes: 15
        run: |
          .venv/bin/python -m pytest \
            packages/kailash-ml/tests/ \
            -m 'dl or deep_learning' \
            --maxfail=5 -q --timeout=120

  test-rl:
    name: Reinforcement Learning
    needs: version-check
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.variant == 'rl' || inputs.variant == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install kailash-ml[rl,dev]
        run: |
          uv venv .venv
          uv pip install -e "." --python .venv/bin/python
          uv pip install -e "packages/kailash-ml[rl,dev]" --python .venv/bin/python

      - name: Test RL
        timeout-minutes: 15
        run: |
          .venv/bin/python -m pytest \
            packages/kailash-ml/tests/ \
            -m 'rl or reinforcement_learning' \
            --maxfail=5 -q --timeout=120

  # ---------------------------------------------------------------------------
  # CUDA jobs — runs on [self-hosted, cuda, gpu] runner (IT-1)
  #
  # These jobs are currently NON-BLOCKING (continue-on-error: true) because
  # the self-hosted GPU runner has not been provisioned yet.
  #
  # To flip CUDA from non-blocking to blocking once the runner is live:
  #   1. Run gpu-smoke.yml manually and confirm it passes green.
  #   2. Remove the line `continue-on-error: true  # IT-1: non-blocking until runner live`
  #      from the test-cuda and test-cuda-dl jobs below.
  #   Grep pattern:  grep -n 'continue-on-error: true.*IT-1' .github/workflows/test-kailash-ml.yml
  #
  # Runner registration (human steps):
  #   See docs/ci/self-hosted-runner.md for the full provisioning guide.
  #   Required labels: self-hosted, cuda, gpu
  #   Required secret:  RUNNER_TOKEN  (GitHub org secret, rotated per schedule)
  # ---------------------------------------------------------------------------

  test-cuda:
    name: CUDA smoke (km.doctor + DeviceReport)
    needs: version-check
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.variant == 'cuda' || inputs.variant == 'all')
    # IT-1: route to self-hosted GPU runner once provisioned.
    # Keep this runs-on value — as soon as the runner registers with these
    # labels, GitHub will assign jobs here automatically.
    runs-on: [self-hosted, cuda, gpu]
    # IT-1: non-blocking until runner live — remove this line to make blocking
    continue-on-error: true # IT-1: non-blocking until runner live
    timeout-minutes: 30

    steps:
      - name: Pre-run cleanup
        shell: bash
        run: |
          rm -rf .venv
          echo "Pre-run cleanup complete."

      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Verify CUDA host
        shell: bash
        run: nvidia-smi --query-gpu=name,driver_version --format=csv,noheader,nounits

      - name: Install kailash-ml[dl,dev] + root kailash editable
        run: |
          uv venv .venv
          uv pip install -e "." --python .venv/bin/python
          uv pip install -e "packages/kailash-ml[dl,dev]" --python .venv/bin/python

      - name: km.doctor gpu — assert CUDA DeviceReport populated
        run: |
          .venv/bin/python - <<'PYEOF'
          import io, json
          from kailash_ml.doctor import doctor
          buf = io.StringIO()
          code = doctor(as_json=True, out=buf)
          payload = json.loads(buf.getvalue())
          print(json.dumps(payload, indent=2))
          assert code == 0, f"km.doctor exit {code}"
          by_name = {b["backend"]: b for b in payload["backends"]}
          assert "cuda" in by_name, f"cuda not found: {list(by_name)}"
          assert by_name["cuda"]["status"] == "ok", by_name["cuda"]
          assert by_name["cuda"]["devices"] >= 1, by_name["cuda"]
          print(f"PASS: {by_name['cuda']['devices']} CUDA GPU(s) ok")
          PYEOF

      - name: Test CUDA-gated unit + integration tests
        timeout-minutes: 20
        run: |
          .venv/bin/python -m pytest \
            packages/kailash-ml/tests/unit/ \
            packages/kailash-ml/tests/integration/ \
            -m 'cuda or gpu' \
            --maxfail=5 -q --timeout=120

      - name: Post-run cleanup
        if: always()
        shell: bash
        run: |
          rm -rf .venv
          echo "Post-run cleanup complete."

  test-cuda-dl:
    name: CUDA deep learning (torch training on GPU)
    needs: version-check
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.variant == 'cuda' || inputs.variant == 'all')
    # IT-1: route to self-hosted GPU runner once provisioned.
    runs-on: [self-hosted, cuda, gpu]
    # IT-1: non-blocking until runner live — remove this line to make blocking
    continue-on-error: true # IT-1: non-blocking until runner live
    timeout-minutes: 45

    steps:
      - name: Pre-run cleanup
        shell: bash
        run: |
          rm -rf .venv
          echo "Pre-run cleanup complete."

      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Verify CUDA host
        shell: bash
        run: nvidia-smi --query-gpu=name,driver_version --format=csv,noheader,nounits

      - name: Install kailash-ml[dl,dev] + root kailash editable
        run: |
          uv venv .venv
          uv pip install -e "." --python .venv/bin/python
          uv pip install -e "packages/kailash-ml[dl,dev]" --python .venv/bin/python

      - name: Test DL on CUDA (torch + GPU-backed tests)
        timeout-minutes: 35
        run: |
          .venv/bin/python -m pytest \
            packages/kailash-ml/tests/ \
            -m '(dl or deep_learning) and (cuda or gpu)' \
            --maxfail=5 -q --timeout=300

      - name: Post-run cleanup
        if: always()
        shell: bash
        run: |
          rm -rf .venv
          echo "Post-run cleanup complete."
