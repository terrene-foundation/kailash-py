name: Security Tests

# Run weekly and on trust module changes for adversarial security testing
on:
  pull_request:
    branches: [main]
    paths:
      - "src/kailash/runtime/trust/**"
      - "packages/kailash-kaizen/src/kaizen/trust/**"
      - "tests/security/**"
  schedule:
    - cron: "0 3 * * 3" # Wednesday at 3:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  SDK_DEV_MODE: true

jobs:
  security-tests:
    name: Adversarial Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -e ".[dev]" --python .venv/bin/python
          uv pip install -e "packages/kailash-kaizen[dev]" --python .venv/bin/python

      - name: Run Security Test Suite
        run: |
          mkdir -p reports
          .venv/bin/python -m pytest tests/security/ \
            -v --tb=short --timeout=120 \
            --junitxml=reports/security-results.xml \
            2>&1 | tee reports/security.log
        continue-on-error: false

      - name: Upload Security Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-test-reports
          path: reports/
          retention-days: 30

      - name: Security Test Summary
        if: always()
        run: |
          echo "## Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/security.log ]; then
            passed=$(grep -oP '\d+ passed' reports/security.log 2>/dev/null || echo "0 passed")
            failed=$(grep -oP '\d+ failed' reports/security.log 2>/dev/null || echo "")
            echo "- **Adversarial Tests**: $passed $failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Adversarial Tests**: No results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "- Key extraction resistance" >> $GITHUB_STEP_SUMMARY
          echo "- Delegation chain manipulation" >> $GITHUB_STEP_SUMMARY
          echo "- Constraint gaming prevention (18 scenarios)" >> $GITHUB_STEP_SUMMARY
          echo "- Revocation race conditions" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-org boundary enforcement" >> $GITHUB_STEP_SUMMARY
          echo "- Audit integrity verification" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Security tests failed! Review reports/security.log for details."
          echo "Security test failures may indicate critical vulnerabilities."
          echo "Do NOT merge until all security tests pass."
