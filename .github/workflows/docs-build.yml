name: Build Documentation

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "mkdocs.yml"
      - ".github/workflows/docs-build.yml"
      - ".github/workflows/docs-deploy.yml"
  push:
    branches:
      [feat/*, feature/*, fix/*, docs/*, release/*, session/*, session-*]
    paths:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "mkdocs.yml"
      - ".github/workflows/docs-build.yml"
  workflow_dispatch:

concurrency:
  # Prevent duplicate runs: Use branch name for both push and PR events
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python (self-hosted)
        run: |
          if command -v pyenv &> /dev/null; then
            export PYENV_ROOT="$HOME/.pyenv"
            export PATH="$PYENV_ROOT/bin:$PATH"
            eval "$(pyenv init -)"
          fi
          python3 --version

      - name: Install dependencies
        run: |
          if command -v pyenv &> /dev/null; then
            export PYENV_ROOT="$HOME/.pyenv"
            export PATH="$PYENV_ROOT/bin:$PATH"
            eval "$(pyenv init -)"
          fi
          python3 -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build documentation
        run: |
          cd docs
          python build_docs.py

      - name: Verify documentation build
        run: |
          # Check that the build output exists
          if [ ! -d "./docs/_build/html" ]; then
            echo "Documentation build failed - no output directory found"
            exit 1
          fi
          echo "✅ Documentation built successfully"
