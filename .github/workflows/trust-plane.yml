name: Trust Plane CI

on:
  push:
    branches: [main]
    paths:
      - "src/kailash/trust/**"
      - ".github/workflows/trust-plane.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/kailash/trust/**"
      - ".github/workflows/trust-plane.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8 —
    # paths filter on src/kailash/trust/** rarely matches release-cut diffs,
    # but defense-in-depth keeps the rule's enforcement uniform across all
    # PR-gate jobs.
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install kailash with trust extra
        run: |
          pip install -e ".[trust,trust-sso,trust-encryption,dev]"
          pip install -e "packages/kailash-pact[dev]"

      - name: Run trust protocol tests
        run: pytest tests/trust/ -x -q --tb=short --ignore=tests/trust/plane

      - name: Run trust plane tests
        run: pytest tests/trust/plane/ -x -q --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: reports/
          retention-days: 14

  smoke:
    name: Smoke Test (entry points)
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8 —
    # entry-point smoke verifies imports already exercised on source-change PRs.
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install kailash with trust
        run: pip install -e ".[trust,cli]"

      - name: Verify new import paths
        run: |
          python -c "from kailash.trust import GenesisRecord; print('Protocol OK')"
          python -c "from kailash.trust.plane import TrustProject; print('Plane OK')"

      - name: Test summary
        if: always()
        run: |
          echo "## Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- kailash.trust import: verified" >> $GITHUB_STEP_SUMMARY
          echo "- kailash.trust.plane import: verified" >> $GITHUB_STEP_SUMMARY
