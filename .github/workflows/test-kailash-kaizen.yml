name: Test kailash-kaizen

# Wires kailash-kaizen into CI. Previously kaizen had NO CI job (unified-ci.yml
# runs only core + mcp + pact + dataflow), so kaizen tests — including the
# cross_sdk_parity gate — were never exercised on PRs. This job closes that gap.
#
# SCOPE: two infra-free pytest invocations, run sequentially in the same step.
#
#   1. LLM deployment layer (tests/unit/llm) + cross-SDK parity
#      (tests/cross_sdk_parity) — the ORIGINAL scope (where the #1721 parity
#      drift hid red on main). Marker filter kept EXACTLY as it shipped so
#      this coverage is byte-for-byte preserved.
#   2. EXPANDED: every additional FAST, deterministic, NO-INFRA
#      `tests/unit/<tier>` subdirectory (issue-1717-vertex-claude sweep item
#      FCI — a workspace-issue follow-up to the #1721 gap). A broader marker
#      exclusion set (adds requires_postgres/redis/db/llm, llm_execution,
#      real_llm, cost, stress, endurance, memory_intensive, flaky, slow,
#      load, migration, the paid-provider markers openai/anthropic/google,
#      docker/ollama, tier3, performance, etc. on top of the original set) is
#      applied ONLY to this invocation — it is NOT applied to invocation 1 so
#      as to never narrow the original gate's selection.
#
#      Two subdirectories are deliberately EXCLUDED by directory (a third —
#      tests/unit/strategies/ — was RESOLVED and is no longer excluded; see
#      note below):
#        - tests/unit/package/  — SLOW: test_installation.py performs real
#          `pip install`/build-wheel/build-sdist subprocess calls (~85-170s
#          total for 5 tests) — infra-shaped, not a per-PR-gate fit.
#        - tests/unit/examples/ — HANGS: confirmed via a full 300s bounded
#          run whose traceback shows an in-flight `ssl.SSLSocket.recv()`
#          blocked inside `httpcore` — a genuine outbound network call, not
#          a pytest-timeout artifact. Pre-dates this session (the original
#          workflow's header comment already excluded "the slow
#          example-script suite"); this audit independently reproduced the
#          hang with byte-level evidence and confirms the exclusion.
#        - [RESOLVED, issue #1736] tests/unit/strategies/ — was HANGING:
#          multiple files (test_multi_cycle_strategy.py, test_single_shot_
#          strategy.py, ...) construct a real BaseAgent + strategy and call
#          .execute() with zero LLM/MCP mocking; WorkflowGenerator.
#          generate_signature_workflow() defaults the LLMAgentNode `provider`
#          to `"openai"` whenever BaseAgentConfig.llm_provider is unset (the
#          common case in these tests), so any environment with a real
#          OPENAI_API_KEY configured attempted a genuine outbound network
#          call — pytest-timeout's signal-based --timeout did not reliably
#          abort the resulting 300s+ hang. Fixed by an autouse conftest.py
#          fixture (tests/unit/strategies/conftest.py) stubbing both the
#          kaizen.providers.registry.get_provider() registry seam and the
#          legacy direct-instantiation seam (kaizen.providers.llm.openai.
#          OpenAIProvider, used by BaseAgent._simple_execute_async) with a
#          deterministic, well-formed completion — no behavioral assertion
#          was weakened; every strategy still executes real code against a
#          real (mocked) completion. All 240 tests now pass in ~30s (was
#          300s+ hangs). It is now gated on every CI run like every other
#          test in this tier.
#        tests/unit/performance/ is EXCLUDED because its 18 tests assert
#        ABSOLUTE wall-clock p95-latency thresholds (`assert perf["p95"] <
#        10/50/100` ms) — deterministic locally (~0.11s) but flake-prone on
#        shared CI runners per testing.md § "Complexity Bounds Use Self-
#        Normalizing Ratios, Not Absolute Wall-Clock Thresholds". (The tier
#        carries NO pytest markers — it is NOT benchmark-tagged.) Gating it
#        would ratchet the thresholds under CI load; excluded until the tests
#        are rewritten to self-normalizing ratios.
#
#      One file is excluded via --ignore within an otherwise-clean tier (two
#      others — tests/unit/mcp/test_catalog_server.py and tests/unit/rag/
#      test_advanced_nodes.py — were RESOLVED and are no longer --ignore'd;
#      see notes below):
#        - [RESOLVED, issue #1735] tests/unit/mcp/test_catalog_server.py —
#          was RED on CI (35 failures, all `ModuleNotFoundError: No module
#          named 'kaizen.manifest'`) because src/kaizen/mcp/catalog_server/
#          tools/{deployment,application,governance}.py import a
#          `kaizen.manifest` package (AgentManifest/AppManifest/
#          GovernanceManifest + TOML loader/validation errors) that was
#          fully implemented on disk (~26KB at src/kaizen/manifest/) but
#          UNCOMMITTED: the repo-root .gitignore `MANIFEST` pattern
#          (intended for the sdist MANIFEST file) also matched the
#          `kaizen/manifest/` directory on case-insensitive filesystems
#          (macOS APFS), so `git add` silently skipped it and it never
#          reached CI (Linux CI is case-sensitive, so the module was
#          genuinely absent there). Fixed by anchoring the .gitignore
#          pattern to `/MANIFEST` (repo-root sdist file only), committing
#          the module (with 5 review-driven hardening fixes — see
#          packages/kailash-kaizen/tests/unit/test_manifest_fixes.py), and
#          re-including this file in the tier above. It is now gated on
#          every CI run like every other test in this tier.
#        - tests/unit/providers/test_ollama_model_manager.py —
#          INFRA-DEPENDENT: `ollama` (the pip client library, distinct from
#          the vendored `ollama_provider.py`/`ollama_model_manager.py`
#          modules) is not installed and not declared in any kaizen extra;
#          `kaizen.providers.__init__.py` intentionally gates the legacy
#          Ollama re-exports behind `OLLAMA_AVAILABLE` (real `import ollama`
#          success) by design, so this file's `from kaizen.providers import
#          OllamaModelManager` raises ImportError whenever the optional
#          client library is absent — this is the declared install matrix,
#          not a regression.
#        - [RESOLVED, issue #1736] tests/unit/rag/test_advanced_nodes.py —
#          was HANGING (same class as tests/unit/strategies/): HyDENode /
#          SelfCorrectingRAGNode / StepBackRAGNode construct real
#          LLMAgentNode(provider="openai", ...) instances for their four
#          LLM-backed steps; the SAME registry seam attempted a genuine
#          network call whenever a real API key was configured. Fixed by a
#          module-scoped autouse fixture (_stub_llm_provider, added directly
#          in this test file — NOT a directory-wide conftest, so the other 14
#          files in tests/unit/rag/ are byte-for-byte unaffected) stubbing
#          kaizen.providers.registry.get_provider() with a deterministic
#          completion. Mocking then EXPOSED a genuinely pre-existing src/ bug
#          (out of the original test-hygiene scope but fixed here per
#          zero-tolerance Rule 1 — found it, own it): every `_parse_*` helper
#          in kaizen/nodes/rag/advanced.py (_parse_abstract_query,
#          _parse_hypotheses, _parse_query_variations,
#          _parse_verification_response) read `response.get("content", "")` on
#          the FULL envelope LLMAgentNode.execute() returns
#          (`{"success": ..., "response": {"content": ...}, ...}`) — the real
#          content is NESTED under "response", so "content" was NEVER a
#          top-level key and all four parsers always returned empty/[],
#          silently forcing HyDE/StepBack/SelfCorrecting RAG to their
#          rule-based fallback on EVERY call. Fixed to unwrap the envelope
#          (`response.get("response", response).get("content", "")`, flat-dict
#          tolerant). All 50 tests now pass in ~4s (was 300s+ hangs); the file
#          is re-included in the tier above and fully gated — NO --deselect.
#          The one HyDE no-LLM test explicitly stubs an *unavailable* provider
#          so it genuinely exercises the documented rule-based fallback rather
#          than the mocked-completion path.
#
#      Two flaky tests are excluded via --deselect (NOT --ignore — the rest
#      of their file still runs):
#        - tests/unit/memory/test_semantic_memory.py::
#          TestSemanticMemorySimilaritySearch::{test_find_similar_basic,
#          test_find_similar_limit} — the mock simple_embedding_function is
#          hash-based, so under Python hash randomization (PYTHONHASHSEED) the
#          similarity ranking is non-deterministic: find_similar() returns []
#          on some seeds/versions (passed on 3.14, failed on 3.12 in a local
#          CI repro). Pre-existing, in code this PR does NOT touch — test-
#          hygiene follow-up.
#
#      ALL optional-dep failures (numpy/Pillow/networkx/prometheus/
#      opentelemetry[+otlp-grpc-exporter]/pynacl/pytz/psutil/qrcode/
#      beautifulsoup4) are RESOLVED by installing the [observability,rag]
#      extras + the OTLP gRPC exporter + the loose deps above — NOT by
#      exclusion. The auth/SSO + autonomy tests that appeared undeclared-dep
#      now run (qrcode/psutil are installed as loose deps). Verified against a
#      local fresh-venv Python-3.12 CI repro post-#1736 (strategies/ +
#      test_advanced_nodes.py re-included): 6773 passed, 73 skipped, 1820
#      deselected, 0 dep errors, in 171.97s.
#
# A per-test --timeout on both invocations makes any hang fail loudly
# instead of hanging the job. timeout_method=thread is set in pytest.ini
# (issue #1736) for stronger hang enforcement — the default "signal" method
# does not reliably interrupt a hang blocked inside a C extension's blocking
# syscall (e.g. a real outbound network read when a Tier-1 test is missing
# LLM mocking); the same local repro above (0 failures across 6773 tests)
# confirms the switch does not regress any other kaizen tier.
#
# COST: single Python (3.12), triggered only on kaizen path changes — mirrors
# the test-pact single-version precedent. Pre-expansion ~3-5 min/run. Post-
# expansion the install grows (observability/rag extras + otlp-grpc exporter +
# loose deps numpy/Pillow/networkx/otel/prometheus/pynacl/pytz/psutil/qrcode/
# beautifulsoup4) and the expanded invocation runs ~6773 tests in ~172s (local
# 3.12 repro, post-#1736) — total est. ~9-13 min/run post-expansion.

on:
  push:
    branches: [feat/*, feature/*, fix/*, docs/*, session/*, session-*, chore/*]
    paths:
      - "packages/kailash-kaizen/**"
      - ".github/workflows/test-kailash-kaizen.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/kailash-kaizen/**"
      - ".github/workflows/test-kailash-kaizen.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check version consistency (pyproject.toml == __init__.py)
        run: |
          PYPROJECT_VER=$(python -c "
          import tomllib
          with open('packages/kailash-kaizen/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          INIT_VER=$(python -c "
          import ast, pathlib
          src = pathlib.Path('packages/kailash-kaizen/src/kaizen/__init__.py').read_text()
          for node in ast.walk(ast.parse(src)):
              if isinstance(node, ast.Assign):
                  for t in node.targets:
                      if getattr(t, 'id', '') == '__version__':
                          print(ast.literal_eval(node.value))
          ")
          echo "pyproject.toml: $PYPROJECT_VER"
          echo "__init__.py:    $INIT_VER"
          if [ "$PYPROJECT_VER" != "$INIT_VER" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VER vs __init__.py=$INIT_VER"
            exit 1
          fi

  test-kaizen:
    name: Test kailash-kaizen (LLM + cross-SDK parity + expanded FAST unit tiers)
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8 — their
    # diff is metadata-only; version-check above still runs on the release cut.
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    needs: version-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-kaizen-py3.12-${{ hashFiles('packages/kailash-kaizen/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-kaizen-py3.12-

      - name: Install kailash-kaizen[dev] + sibling packages
        run: |
          uv venv .venv
          # Root kailash editable — kaizen imports the current core surface.
          uv pip install -e "." --python .venv/bin/python
          # Sibling packages kaizen's import graph pulls in at collection time.
          uv pip install -e "packages/kailash-nexus" --python .venv/bin/python
          uv pip install -e "packages/kailash-dataflow" --python .venv/bin/python
          # NOTE: kailash-kaizen (below) MUST be installed BEFORE kaizen-agents:
          # kaizen-agents pins kailash-kaizen>=2.35.0, and if the local editable
          # kaizen is not yet present uv resolves that pin against PyPI (which lags
          # the in-repo version) and fails "no solution found". Local-first ordering
          # makes the in-repo editable kaizen satisfy the pin.
          # LLM-provider extras the wire/auth tests exercise: bedrock (botocore
          # SigV4), vertex (google-auth OAuth/WIF), providers-azure (Entra),
          # providers-google (google-genai), providers-tokens (tiktoken).
          # observability (prometheus-client/opentelemetry/structlog) + rag
          # (numpy/Pillow/networkx) are REQUIRED for the expanded unit tiers to
          # COLLECT: the observability/execution/rag/signatures/tools tests do a
          # hard top-level import of these extras' deps (they are optional
          # extras, absent from the base install, hence a local-only pass before).
          uv pip install -e "packages/kailash-kaizen[dev,bedrock,vertex,providers-azure,providers-google,providers-tokens,observability,rag]" --python .venv/bin/python
          # kaizen-agents installed AFTER kailash-kaizen so its kailash-kaizen>=2.35.0
          # pin resolves against the local editable kaizen (see NOTE above).
          uv pip install -e "packages/kaizen-agents" --python .venv/bin/python
          # src/kaizen/core/autonomy/observability/tracing_manager.py hard-imports
          # opentelemetry.exporter.otlp.proto.grpc, which the [observability] extra
          # does NOT ship — install it explicitly so every test that transitively
          # imports tracing_manager collects. (kaizen packaging gap: [observability]
          # should include this exporter — test-hygiene follow-up.)
          uv pip install opentelemetry-exporter-otlp-proto-grpc --python .venv/bin/python
          # Loose deps the expanded unit tiers hard-import but NO kaizen extra
          # declares: pynacl (trust crypto), pytz (governance time-windows),
          # psutil (autonomy + integrations), qrcode (auth/SSO), beautifulsoup4
          # (tools web-fetch). Undeclared-dep test-hygiene gap — follow-up filed.
          uv pip install pynacl pytz psutil qrcode beautifulsoup4 --python .venv/bin/python
          uv pip install polars --python .venv/bin/python

      - name: Lint (ruff — syntax/undefined only)
        run: |
          .venv/bin/ruff check \
            packages/kailash-kaizen/src/kaizen/llm/ \
            packages/kailash-kaizen/tests/cross_sdk_parity/ \
            --select=E9,F63,F7,F82

      - name: Test (LLM unit + cross-SDK parity, infra-free)
        timeout-minutes: 10
        working-directory: packages/kailash-kaizen
        run: |
          ../../.venv/bin/python -m pytest \
            tests/unit/llm/ \
            tests/cross_sdk_parity/ \
            -m 'not (integration or e2e or requires_azure or requires_docker or requires_google or benchmark)' \
            --timeout=60 --maxfail=15 -q

      - name: Test (expanded FAST unit tiers, infra-free)
        timeout-minutes: 10
        working-directory: packages/kailash-kaizen
        run: |
          ../../.venv/bin/python -m pytest \
            tests/unit/audio/ \
            tests/unit/composition/ \
            tests/unit/config/ \
            tests/unit/core/ \
            tests/unit/cost/ \
            tests/unit/deploy/ \
            tests/unit/execution/ \
            tests/unit/governance/ \
            tests/unit/integrations/ \
            tests/unit/interpretability/ \
            tests/unit/judges/ \
            tests/unit/kaizen/ \
            tests/unit/l3/ \
            tests/unit/mcp/ \
            tests/unit/test_manifest.py \
            tests/unit/test_manifest_fixes.py \
            tests/unit/memory/ \
            tests/unit/mixins/ \
            tests/unit/ml/ \
            tests/unit/monitoring/ \
            tests/unit/nodes/ \
            tests/unit/observability/ \
            tests/unit/orchestration/ \
            tests/unit/providers/ --ignore=tests/unit/providers/test_ollama_model_manager.py \
            tests/unit/rag/ \
            tests/unit/research/ \
            tests/unit/runtime/ \
            tests/unit/security/ \
            tests/unit/session/ \
            tests/unit/signatures/ \
            tests/unit/strategies/ \
            tests/unit/tools/ \
            tests/unit/trust/ \
            -m 'not (integration or e2e or requires_azure or requires_docker or requires_google or benchmark or requires_postgres or requires_redis or requires_ollama or requires_db or requires_llm or llm_execution or real_llm or ollama_validation or cost or landing_ai or stress or endurance or requires_infrastructure or requires_kafka or requires_mongodb or memory_intensive or requires_isolation or data_intensive or flaky or slow or load or migration or openai or anthropic or google or docker or ollama or integration_llm or tier3 or performance)' \
            --deselect tests/unit/memory/test_semantic_memory.py::TestSemanticMemorySimilaritySearch::test_find_similar_basic \
            --deselect tests/unit/memory/test_semantic_memory.py::TestSemanticMemorySimilaritySearch::test_find_similar_limit \
            --timeout=30 --maxfail=50 -q
