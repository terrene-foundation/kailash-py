name: PR Notification (no auto-merge — open-source repo)

# kailash-py is open-source. All PRs require admin approval.
# This workflow only sends Discord notifications when Claude creates PRs.

on:
  pull_request:
    types: [labeled]

jobs:
  notify:
    # Skip release-prep PRs (release/v*) — they should never carry the auto-fix
    # / needs-review labels per ci-runners.md MUST Rule 8 (defense-in-depth).
    if: (github.event.label.name == 'auto-fix' || github.event.label.name == 'needs-review') && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          LABEL: ${{ github.event.label.name }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            if [ "$LABEL" = "auto-fix" ]; then
              COLOR=3066993
              DESC="High confidence — ready for admin review"
            else
              COLOR=15105570
              DESC="Needs careful review before merging"
            fi
            payload=$(jq -n \
              --arg t "[PR #${PR_NUMBER}] ${PR_TITLE}" \
              --arg url "https://github.com/${REPO}/pull/${PR_NUMBER}" \
              --argjson color "$COLOR" \
              --arg desc "$DESC" \
              '{embeds:[{title:$t,url:$url,color:$color,description:$desc}]}')
            curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL" || true
          fi
