name: PR Notification (no auto-merge — open-source repo)

# kailash-py is open-source. All PRs require admin approval.
# This workflow only sends Discord notifications when Claude creates PRs.

on:
  pull_request:
    types: [labeled]

jobs:
  notify:
    if: github.event.label.name == 'auto-fix' || github.event.label.name == 'needs-review'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            PR="${{ github.event.pull_request.number }}"
            TITLE="${{ github.event.pull_request.title }}"
            LABEL="${{ github.event.label.name }}"
            REPO="${{ github.repository }}"

            if [ "$LABEL" = "auto-fix" ]; then
              COLOR=3066993
              DESC="High confidence — ready for admin review"
            else
              COLOR=15105570
              DESC="Needs careful review before merging"
            fi

            curl -s -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"[PR #${PR}] ${TITLE}\",\"url\":\"https://github.com/${REPO}/pull/${PR}\",\"color\":${COLOR},\"description\":\"${DESC}\"}]}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
