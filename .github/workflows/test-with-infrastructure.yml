name: Test with SDK Infrastructure

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SDK_DEV_MODE: true

jobs:
  test-with-infrastructure:
    runs-on: ubuntu-latest
    
    services:
      # Services are automatically managed by GitHub Actions
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kailash
          POSTGRES_PASSWORD: kailash123
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: kailash
          MONGO_INITDB_ROOT_PASSWORD: kailash123
          MONGO_INITDB_DATABASE: kailash
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    
    - name: Install dependencies
      run: |
        uv sync --frozen
        uv pip install pytest-cov
    
    - name: Wait for services and initialize databases
      run: |
        # Wait for Qdrant to be ready (try different endpoints)
        echo "Waiting for Qdrant to start..."
        for i in {1..60}; do
          # Try the root endpoint first (more likely to respond)
          if curl -f http://localhost:6333/ >/dev/null 2>&1; then
            echo "✅ Qdrant is ready"
            break
          elif curl -f http://localhost:6333/health >/dev/null 2>&1; then
            echo "✅ Qdrant is ready"
            break
          elif curl -f http://localhost:6333/readyz >/dev/null 2>&1; then
            echo "✅ Qdrant is ready"
            break
          fi
          echo "Waiting for Qdrant... (attempt $i/60)"
          sleep 3
        done
        
        # If Qdrant still not ready, continue anyway (it's not critical for basic tests)
        if ! curl -f http://localhost:6333/ >/dev/null 2>&1; then
          echo "⚠️  Qdrant not responding, but continuing with other services"
        fi
        
        # Create PostgreSQL databases
        echo "Creating databases..."
        for db in transactions compliance analytics crm marketing reports; do
          PGPASSWORD=kailash123 createdb -h localhost -U kailash "$db" 2>/dev/null || echo "Database $db may already exist"
        done
        
        # Initialize PostgreSQL databases with tables and data
        PGPASSWORD=kailash123 psql -h localhost -U kailash -d postgres < docker/init-sdk-dev-db.sql
        
        # Initialize MongoDB
        echo "Installing MongoDB client..."
        # Install mongodb client using snap (more reliable on GitHub Actions)
        sudo apt-get update && sudo apt-get install -y mongodb-clients
        
        echo "Initializing MongoDB..."
        mongo --host localhost:27017 -u kailash -p kailash123 --authenticationDatabase admin < docker/init-mongo.js
    
    - name: Start remaining services
      run: |
        # Start Kafka using Docker Compose (GitHub Actions doesn't support Kafka as a service)
        docker compose -f docker/docker-compose.sdk-dev.yml up -d zookeeper kafka kafka-ui
        
        # Start Mock API server
        cd docker/mock-api-server
        npm install
        node server.js &
        
        # Wait for services
        sleep 30
    
    - name: Create environment file
      run: |
        cat > sdk-users/.env.sdk-dev << EOF
        SDK_DEV_MODE=true
        POSTGRES_PASSWORD=kailash123
        TRANSACTION_DB=postgresql://kailash:kailash123@localhost:5432/transactions
        COMPLIANCE_DB=postgresql://kailash:kailash123@localhost:5432/compliance
        ANALYTICS_DB=postgresql://kailash:kailash123@localhost:5432/analytics
        CRM_DB=postgresql://kailash:kailash123@localhost:5432/crm
        MARKETING_DB=postgresql://kailash:kailash123@localhost:5432/marketing
        REPORTS_DB=postgresql://kailash:kailash123@localhost:5432/reports
        MONGO_USERNAME=kailash
        MONGO_PASSWORD=kailash123
        MONGO_URL=mongodb://kailash:kailash123@localhost:27017/kailash
        KAFKA_BROKERS=localhost:9092
        WEBHOOK_API=http://localhost:8888
        FRAUD_ALERT_API=http://localhost:8888
        NOTIFICATION_API=http://localhost:8888
        ENRICHMENT_API=http://localhost:8888
        OLLAMA_HOST=http://localhost:11434
        MCP_SERVER_URL=http://localhost:8765
        EOF
    
    - name: Run infrastructure tests
      run: |
        # Run infrastructure tests (if any exist)
        TEST_COUNT=$(uv run pytest tests/ -m requires_infrastructure --collect-only -q | grep -c "test session starts" || echo 0)
        if [ "$TEST_COUNT" -gt 0 ]; then
          echo "Running $TEST_COUNT infrastructure tests..."
          uv run pytest tests/ -m requires_infrastructure -v
        else
          echo "✅ No infrastructure tests found - this is expected for now"
        fi
    
    - name: Run comprehensive examples
      run: |
        # Run financial processor
        uv run python sdk-users/workflows/by-enterprise/data-processing/scripts/financial_processor_minimal.py
        
        # Run lead scoring
        uv run python sdk-users/workflows/by-enterprise/sales-marketing/scripts/lead_scoring_minimal.py
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          .coverage
          htmlcov/