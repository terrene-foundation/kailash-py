name: Test with SDK Infrastructure

on:
  # Only run on PRs to avoid duplicate runs when merging
  pull_request:
    branches: [ main ]
  # Allow manual triggering for debugging
  workflow_dispatch:
  # Run weekly to ensure infrastructure compatibility
  schedule:
    - cron: '0 0 * * 0'  # Sunday at midnight UTC

env:
  SDK_DEV_MODE: true

jobs:
  test-with-infrastructure:
    runs-on: self-hosted
    timeout-minutes: 20  # Prevent hanging workflows
    env:
      HOME: ${{ github.workspace }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      run: |
        # Install uv in a custom location to avoid permission issues
        export CARGO_HOME="${GITHUB_WORKSPACE}/.cargo"
        export RUSTUP_HOME="${GITHUB_WORKSPACE}/.rustup"
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "${GITHUB_WORKSPACE}/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        uv sync --frozen
        uv pip install pytest-cov
    
    - name: Setup Node.js for mock API server
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Start SDK development infrastructure
      run: |
        echo "Starting SDK development infrastructure with docker-compose..."
        cd docker
        
        # Stop any existing containers
        docker compose -f docker-compose.sdk-dev.yml down -v || true
        
        # Start all services
        docker compose -f docker-compose.sdk-dev.yml up -d
        
        # Wait for services to be ready
        echo "Waiting for services to start..."
        sleep 30
        
        # Check service health
        echo "Checking service health..."
        docker compose -f docker-compose.sdk-dev.yml ps
    
    - name: Create environment file
      run: |
        cat > sdk-users/.env.sdk-dev << EOF
        SDK_DEV_MODE=true
        POSTGRES_PASSWORD=kailash123
        TRANSACTION_DB=postgresql://kailash:kailash123@localhost:5432/transactions
        COMPLIANCE_DB=postgresql://kailash:kailash123@localhost:5432/compliance
        ANALYTICS_DB=postgresql://kailash:kailash123@localhost:5432/analytics
        CRM_DB=postgresql://kailash:kailash123@localhost:5432/crm
        MARKETING_DB=postgresql://kailash:kailash123@localhost:5432/marketing
        REPORTS_DB=postgresql://kailash:kailash123@localhost:5432/reports
        MONGO_USERNAME=kailash
        MONGO_PASSWORD=kailash123
        MONGO_URL=mongodb://kailash:kailash123@localhost:27017/kailash
        KAFKA_BROKERS=localhost:9092
        WEBHOOK_API=http://localhost:8888
        FRAUD_ALERT_API=http://localhost:8888
        NOTIFICATION_API=http://localhost:8888
        ENRICHMENT_API=http://localhost:8888
        OLLAMA_HOST=http://localhost:11434
        MCP_SERVER_URL=http://localhost:8765
        EOF
    
    - name: Run infrastructure tests
      run: |
        # Check if any infrastructure tests exist
        echo "Checking for infrastructure tests..."
        
        # For now, we don't have specific infrastructure tests
        # This step is a placeholder for future infrastructure-specific tests
        echo "✅ Infrastructure services are ready for testing"
        echo "   - PostgreSQL databases initialized"
        echo "   - MongoDB collections created"
        echo "   - Qdrant vector store available"
        echo "   - Mock API server running"
    
    - name: Run comprehensive examples
      run: |
        echo "Testing SDK examples with infrastructure..."
        
        # Run financial processor
        echo "Running financial processor example..."
        if uv run python sdk-users/workflows/by-enterprise/data-processing/scripts/financial_processor_minimal.py; then
          echo "✅ Financial processor example completed successfully"
        else
          echo "❌ Financial processor example failed"
          exit 1
        fi
        
        # Run lead scoring
        echo "Running lead scoring example..."
        if uv run python sdk-users/workflows/by-enterprise/sales-marketing/scripts/lead_scoring_minimal.py; then
          echo "✅ Lead scoring example completed successfully"
        else
          echo "❌ Lead scoring example failed"
          exit 1
        fi
        
        echo "✅ All examples completed successfully!"
    
    - name: Stop infrastructure
      if: always()
      run: |
        echo "Stopping SDK development infrastructure..."
        cd docker
        docker compose -f docker-compose.sdk-dev.yml down -v || true
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          .coverage
          htmlcov/