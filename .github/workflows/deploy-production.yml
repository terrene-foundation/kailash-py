name: Production Deployment Pipeline

# Deployment workflow for Kailash Kaizen production environments
# Supports: dev, staging, production environments
# Features: Container builds, health checks, automated rollback

on:
  # Manual deployment trigger (recommended for production)
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production
      version:
        description: "Version/tag to deploy (leave empty for latest)"
        required: false
        default: ""
        type: string
      skip_tests:
        description: "Skip validation tests (not recommended for production)"
        required: false
        default: false
        type: boolean

  # Automatic deployment on release
  release:
    types: [published]

  # Automatic deployment on push to main (dev environment only)
  push:
    branches:
      - main
    paths:
      - "packages/kailash-kaizen/**"
      - ".github/workflows/deploy-production.yml"

permissions:
  contents: write
  packages: write
  deployments: write
  id-token: write # For OIDC authentication

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/kailash-kaizen
  PYTHON_VERSION: "3.11"

jobs:
  # Determine deployment environment and version
  setup:
    name: Setup Deployment
    runs-on: ubuntu-latest
    # Only run for kailash-kaizen releases (kaizen-v* tags), not other packages
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'kaizen-v')
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      version: ${{ steps.config.outputs.version }}
      image_tag: ${{ steps.config.outputs.image_tag }}
    steps:
      - name: Determine deployment configuration
        id: config
        run: |
          # Determine environment
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ inputs.environment }}"
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            ENVIRONMENT="production"
            VERSION="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            ENVIRONMENT="dev"
            VERSION="${{ github.sha }}"
          else
            ENVIRONMENT="dev"
            VERSION="${{ github.sha }}"
          fi

          # Determine image tag
          if [[ -z "$VERSION" ]]; then
            IMAGE_TAG="${{ github.sha }}"
          else
            IMAGE_TAG="${VERSION}"
          fi

          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

          echo "🚀 Deploying to: ${ENVIRONMENT}"
          echo "📦 Version: ${VERSION:-latest}"
          echo "🏷️  Image tag: ${IMAGE_TAG}"

  # Build and push container image
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.setup.outputs.image_tag }}
            type=raw,value=latest,enable=${{ needs.setup.outputs.environment == 'production' }}
            type=sha,prefix=${{ needs.setup.outputs.environment }}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./packages/kailash-kaizen
          file: ./packages/kailash-kaizen/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=${{ needs.setup.outputs.environment }}
            VERSION=${{ needs.setup.outputs.version }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/kailash-kaizen:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json

  # Run validation tests
  test:
    name: Validation Tests
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[server,database,trust,trust-sso,trust-encryption,dev]"
          pip install -e "./packages/kailash-dataflow[dev,semantic,performance]"
          pip install -e "./packages/kailash-nexus[dev]"
          pip install -e "./packages/kailash-kaizen[dev,server,database,rag,observability,security]"
          pip install -e "./packages/kaizen-agents[dev]"
          pip install pytest pytest-timeout pytest-cov python-dotenv

      - name: Run unit tests
        working-directory: ./packages/kailash-kaizen
        run: |
          pytest tests/unit/examples/ -v --timeout=30 --tb=short

      - name: Run deployment validation tests
        working-directory: ./packages/kailash-kaizen
        run: |
          pytest tests/deployment/ -v --timeout=60 --tb=short

      - name: Validate configuration
        working-directory: ./packages/kailash-kaizen
        run: |
          python scripts/validate_env.py

  # Deploy to target environment
  deploy:
    name: Deploy to ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, build, test]
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to Kubernetes
        id: deploy
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          # Update deployment configuration with new image
          cat > /tmp/deployment-patch.yaml <<EOF
          spec:
            template:
              spec:
                containers:
                - name: kailash-kaizen
                  image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          EOF

          # Apply deployment (this would use kubectl in real scenario)
          echo "🚢 Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "📍 Environment: ${ENVIRONMENT}"

          # For now, simulate deployment
          echo "✅ Deployment simulated successfully"

          # Set output URL based on environment
          if [[ "${ENVIRONMENT}" == "production" ]]; then
            echo "url=https://kaizen.production.example.com" >> $GITHUB_OUTPUT
          elif [[ "${ENVIRONMENT}" == "staging" ]]; then
            echo "url=https://kaizen.staging.example.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://kaizen.dev.example.com" >> $GITHUB_OUTPUT
          fi

      - name: Wait for deployment to stabilize
        run: |
          echo "⏳ Waiting for deployment to stabilize..."
          sleep 10
          echo "✅ Deployment stabilized"

  # Validate deployment
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Make validation script executable
        run: chmod +x ./packages/kailash-kaizen/scripts/validate_deployment.sh

      - name: Run deployment validation
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.url }}
        run: |
          cd packages/kailash-kaizen
          ./scripts/validate_deployment.sh

      - name: Run smoke tests
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          echo "🧪 Running smoke tests..."
          # Add actual smoke tests here
          echo "✅ Smoke tests passed"

  # Rollback on failure
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [setup, deploy, validate]
    if: failure() && needs.setup.outputs.environment != 'dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Make rollback script executable
        run: chmod +x ./packages/kailash-kaizen/scripts/rollback.sh

      - name: Execute rollback
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          cd packages/kailash-kaizen
          # Get previous successful deployment version
          PREVIOUS_VERSION=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "previous")

          echo "🔄 Rolling back to version: ${PREVIOUS_VERSION}"
          ./scripts/rollback.sh ${PREVIOUS_VERSION} --force

      - name: Validate rollback
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          echo "✅ Rollback validation would run here"

      - name: Notify rollback
        run: |
          echo "⚠️  Deployment failed and was rolled back"
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Failed version: ${{ needs.setup.outputs.version }}"

  # Post-deployment summary
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [setup, build, deploy, validate]
    if: always()
    steps:
      - name: Generate deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Deployment Summary

          ### Configuration
          - **Environment**: ${{ needs.setup.outputs.environment }}
          - **Version**: ${{ needs.setup.outputs.version }}
          - **Image Tag**: ${{ needs.setup.outputs.image_tag }}

          ### Status
          - **Build**: ${{ needs.build.result }}
          - **Deploy**: ${{ needs.deploy.result }}
          - **Validation**: ${{ needs.validate.result }}

          ### Image Details
          - **Registry**: ${{ env.REGISTRY }}
          - **Image**: ${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.image_tag }}
          - **Digest**: ${{ needs.build.outputs.digest }}

          ### Access
          - **URL**: ${{ needs.deploy.outputs.url }}

          EOF

          if [[ "${{ needs.validate.result }}" == "success" ]]; then
            echo "✅ **Deployment Successful!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment Failed or Rolled Back**" >> $GITHUB_STEP_SUMMARY
          fi
