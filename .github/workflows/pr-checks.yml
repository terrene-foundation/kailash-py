# DEPRECATED: This workflow is replaced by unified-ci.yml
# Keeping for reference during migration period
# Will be removed after successful validation of unified workflow

name: PR Checks (DEPRECATED)

# Temporarily disabled - use unified-ci.yml instead
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (this workflow is deprecated)'
        required: true
        default: 'Testing deprecated workflow'

# Cancel duplicate runs on the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort ruff

    - name: Check formatting with black
      run: black --check src/ tests/

    - name: Check import sorting with isort
      run: isort --check src/ tests/

    - name: Lint with ruff
      run: |
        # Check for critical errors only (syntax errors, undefined names, etc.)
        ruff check src/ tests/ --select=E9,F63,F7,F82
        echo "✅ No critical linting errors found"

  test-matrix:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio
        pip install -e ".[dev]" || pip install -e .

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=src/kailash --cov-report=xml --cov-report=term-missing --tb=short \
          -k "not (test_async_switch_missing_input or test_async_merge_missing_data)"

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: coverage-${{ matrix.python-version }}

  security-check:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
        format: 'table'
        output: 'trivy-results.txt'
        exit-code: '0'  # Don't fail the build
        ignore-unfixed: true

    # Try SARIF upload for repos with Advanced Security
    - name: Run Trivy scan for SARIF
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '0'
      continue-on-error: true

    - name: Upload SARIF results (if Advanced Security enabled)
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
      if: always()

    - name: Upload scan results as artifact (fallback)
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-results
        path: |
          trivy-results.txt
          trivy-results.sarif
        retention-days: 7
      if: always()
      continue-on-error: true

  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Test example files
      run: |
        # Create required directories
        mkdir -p output data/outputs examples/data/outputs

        # Test that examples can be imported
        for example in examples/*.py; do
          if [[ -f "$example" && "$example" != *"__"* && "$example" != *"test_"* ]]; then
            echo "Validating $example"
            python -m py_compile "$example" || exit 1
          fi
        done

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint-and-format, test-matrix, security-check, validate-examples]
    if: always()
    steps:
    - name: Summary
      run: |
        echo "## PR Check Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Lint and Format: ${{ needs.lint-and-format.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Tests: ${{ needs.test-matrix.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Security: ${{ needs.security-check.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Examples: ${{ needs.validate-examples.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ needs.lint-and-format.result }}" != "success" ] || \
           [ "${{ needs.test-matrix.result }}" != "success" ] || \
           [ "${{ needs.validate-examples.result }}" != "success" ]; then
          echo "❌ PR checks failed. Please fix the issues above." >> $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "✅ All PR checks passed!" >> $GITHUB_STEP_SUMMARY
        fi
