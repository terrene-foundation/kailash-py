name: CI Pipeline

# Runs on GitHub-hosted ubuntu-latest runners.
# Push to feature branches runs Tier 1 unit tests (fast).
# PRs to main run the same checks. Manual dispatch allows full test suite.

on:
  push:
    branches: [feat/*, feature/*, fix/*, docs/*, session/*, session-*, debug/*]
    paths:
      - "src/**"
      - "packages/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/unified-ci.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "packages/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/unified-ci.yml"
  workflow_dispatch:
    inputs:
      test-mode:
        description: "Test execution mode"
        required: false
        default: "fast"
        type: choice
        options:
          - fast # Tier 1 unit tests only (no external dependencies)
          - full # All tests including slow ones
          - infrastructure # Docker infrastructure tests only

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Improved concurrency: Group by PR number for PR events, unique run_id for push events
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # Skip push CI when an open PR already covers the branch
  check-duplicate:
    name: Check for Duplicate Run
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8.
    # On push events, head_ref is empty so this expression evaluates to true,
    # leaving push-event behavior intact. On pull_request events from
    # release/v*, this short-circuits before the duplicate-PR check fires.
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check if push event should be skipped
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('skip', 'false');
              return;
            }
            const branch = context.ref.replace('refs/heads/', '');
            try {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${branch}`
              });
              core.setOutput('skip', prs.length > 0 ? 'true' : 'false');
            } catch (error) {
              core.setOutput('skip', 'false');
            }

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: check-duplicate
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8 —
    # release diffs are metadata-only (pyproject.toml version anchors +
    # CHANGELOG); the source-change PRs the release bundles already
    # exercised this matrix. Saves ~45 min × matrix-size per release cycle.
    if: needs.check-duplicate.outputs.should-skip != 'true' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          uv venv .venv
          # Per #890 slim-core refactor: extras renamed.
          # OLD: cli/database/postgres/mysql/files/distributed/http/mfa/otel
          # NEW: db-postgres/db-mysql/db-sqlite/http-client/auth-azure/telemetry/redis/trust
          # `cli` and `files` were folded into core/server respectively.
          uv pip install -e ".[dev,server,http-client,db-postgres,db-mysql,db-sqlite,redis,monitoring,auth,auth-azure,trust,mcp,scheduler,telemetry,data]" --python .venv/bin/python
          uv pip install -e packages/kailash-mcp --python .venv/bin/python
          uv pip install numpy --python .venv/bin/python

      - name: Lint (ruff)
        run: .venv/bin/ruff check src/ tests/ --select=E9,F63,F7,F82

      - name: Type check (pyright)
        continue-on-error: true # 3001 pre-existing errors — tracked in #73
        run: |
          uv pip install pyright --python .venv/bin/python
          .venv/bin/pyright src/kailash/ --pythonversion ${{ matrix.python-version }} --level error 2>&1 | tail -5

      - name: Test (Tier 1 — unit tests)
        timeout-minutes: 15
        run: |
          .venv/bin/python -m pytest \
            tests/unit/ \
            tests/trust/plane/unit/ \
            tests/security/ \
            -m 'not (slow or performance or integration or e2e or requires_docker or requires_postgres or requires_mysql or requires_redis or requires_ollama)' \
            --maxfail=10 -q -p no:xdist --timeout=30

      - name: Test (Tier 2 — integration runtime tests)
        timeout-minutes: 10
        continue-on-error: true # Tier 2 has thread/I/O tests that may fail on CI runners
        run: |
          .venv/bin/python -m pytest \
            tests/tier2_integration/ \
            -m 'not (requires_docker or requires_postgres or requires_mysql or requires_redis or requires_ollama)' \
            --maxfail=20 -q -p no:xdist --timeout=60

  test-pact:
    name: Test PACT (Python 3.11)
    needs: check-duplicate
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8.
    if: needs.check-duplicate.outputs.should-skip != 'true' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-py3.11-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-py3.11-

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -e ".[trust]" --python .venv/bin/python
          uv pip install -e "packages/kailash-pact[dev]" --python .venv/bin/python

      - name: Test kailash-pact
        timeout-minutes: 5
        run: |
          cd packages/kailash-pact
          ../../.venv/bin/python -m pytest tests/ \
            --maxfail=5 -q --timeout=120

  test-dataflow:
    name: Test DataFlow Unit Suite (Tier 1)
    needs: check-duplicate
    # Re-applies issue #898 gate (PR #968 was reverted; this is a fresh
    # implementation atop issue #979's tier-1 cleanup — S1+S2a+S-EV+S3+S4+S5a).
    # Paths cover BOTH the package and the core SDK (per ci-runners.md Rule 6 —
    # filter MUST follow the transitive dep graph, not just package dir).
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8.
    if: needs.check-duplicate.outputs.should-skip != 'true' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    # 25 min cap accommodates issue #1010 Phase A diagnostic capture
    # (reviewer-observed hang up to 17:31 min). Production setsid wrapper
    # finishes in ~5-6 min so the bump is headroom, not regression risk.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-py3.11-dataflow-${{ hashFiles('pyproject.toml', 'packages/kailash-dataflow/pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-py3.11-dataflow-

      - name: Install dependencies
        # Per deployment.md § "Sibling-Package CI Installs Root SDK Editable":
        # root kailash MUST be installed editable BEFORE the sub-package so
        # `kailash.<new_module>` resolves to the local checkout, not stale PyPI.
        run: |
          uv venv .venv
          uv pip install -e "." --python .venv/bin/python
          uv pip install -e "packages/kailash-dataflow[dev]" --python .venv/bin/python

      - name: Test DataFlow tier-1 unit suite (issue-1010 Phase A diagnostic)
        if: github.ref_name == 'debug/issue-1010-phase-a-diagnostics' || github.head_ref == 'debug/issue-1010-phase-a-diagnostics'
        timeout-minutes: 24
        env:
          DATAFLOW_DIAGNOSE_FINALIZE: "1"
          PYTHONFAULTHANDLER: "1"
          DATAFLOW_DIAGNOSE_LOG: "/tmp/issue-1010-diagnostic.log"
        # Issue #1010 Phase A — diagnostic capture branch ONLY.
        # `-s` disables pytest's --capture=fd so fixture stderr/file
        # writes survive to the runner log. The conftest session fixture
        # mirrors output to /tmp/issue-1010-diagnostic.log so even a
        # SIGKILL on job-timeout cancel leaves the forensic dump on disk
        # for the "Print diagnostic log" step below.
        run: |
          cd packages/kailash-dataflow
          ../../.venv/bin/python -X faulthandler -m pytest tests/unit/ \
            --maxfail=10 -q -s --timeout=120

      - name: Print issue-1010 diagnostic log (always)
        if: always() && (github.ref_name == 'debug/issue-1010-phase-a-diagnostics' || github.head_ref == 'debug/issue-1010-phase-a-diagnostics')
        # Run even on step cancel / job timeout so the on-disk forensic
        # capture reaches the job log. `cat` is null-safe.
        run: |
          echo "=== /tmp/issue-1010-diagnostic.log ==="
          if [ -f /tmp/issue-1010-diagnostic.log ]; then
            cat /tmp/issue-1010-diagnostic.log
          else
            echo "(no diagnostic file written; fixture may not have activated)"
          fi
          echo "=== end of diagnostic log ==="

      - name: Upload issue-1010 diagnostic log
        if: always() && (github.ref_name == 'debug/issue-1010-phase-a-diagnostics' || github.head_ref == 'debug/issue-1010-phase-a-diagnostics')
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: issue-1010-phase-a-diagnostic
          path: /tmp/issue-1010-diagnostic.log
          if-no-files-found: warn

      - name: Test DataFlow tier-1 unit suite
        if: github.ref_name != 'debug/issue-1010-phase-a-diagnostics' && github.head_ref != 'debug/issue-1010-phase-a-diagnostics'
        timeout-minutes: 10
        # ZERO `-m` flag here: pytest.ini::addopts is the SOLE marker filter
        # location per S1 CRIT-B fix (packages/kailash-dataflow/pytest.ini).
        # `--timeout=120` matches the addopts entry; explicit here as defense
        # against pytest-timeout plugin auto-discovery regressions.
        #
        # Post-summary finalizer hang workaround: after pytest produces its
        # summary (~50s, brief AC#6 ≤2min), Python's GC finalizer can
        # deadlock on aiosqlite cleanup (brief failure-layer #3, rules/
        # patterns.md § Async Resource Cleanup). The wrapper polls pytest's
        # stdout for the summary line; if pytest reaches the summary but
        # the process is still alive 30s later, SIGKILL the finalizer and
        # exit based on the summary's pass/fail count. This keeps the gate
        # responsive to real test failures while not burning the 10-minute
        # step timeout on the known finalizer hang. The underlying SDK fix
        # (DataFlow.__del__ async cleanup discipline) is tracked separately.
        run: |
          cd packages/kailash-dataflow
          LOG=/tmp/pytest-dataflow.out
          # Write directly to the log (no tee pipeline) so `$!` captures
          # the actual pytest PID — not a tee subshell. setsid puts pytest
          # in its own process group so `kill -9 -PGID` reaches every
          # finalizer thread, not just the shell wrapper.
          setsid ../../.venv/bin/python -m pytest tests/unit/ \
            --maxfail=10 -q --timeout=120 > "$LOG" 2>&1 &
          PYTEST_PID=$!
          PYTEST_PGID=$(ps -o pgid= -p "$PYTEST_PID" | tr -d ' ')

          # Wait up to 150s for natural completion (brief AC#6 ≤2min has plenty headroom).
          for _ in $(seq 1 150); do
            if ! kill -0 "$PYTEST_PID" 2>/dev/null; then
              wait "$PYTEST_PID"; EXIT=$?
              tail -20 "$LOG"
              echo "::notice::pytest exited cleanly with code $EXIT"
              exit "$EXIT"
            fi
            sleep 1
          done

          # pytest still alive past 150s — inspect summary.
          tail -20 "$LOG"
          if grep -qE '^=+ .* passed' "$LOG" && \
             ! grep -qE '^=+ [^=]*[1-9][0-9]* failed' "$LOG" && \
             ! grep -qE '^=+ [^=]*[1-9][0-9]* error' "$LOG"; then
            echo "::warning::Pytest reached success summary but finalizer hung; SIGKILLing process group ${PYTEST_PGID} (rules/patterns.md § Async Resource Cleanup)"
            kill -9 -- "-${PYTEST_PGID}" 2>/dev/null || true
            kill -9 "$PYTEST_PID" 2>/dev/null || true
            wait "$PYTEST_PID" 2>/dev/null || true
            echo "::notice::Summary-based success after SIGKILL"
            exit 0
          fi
          echo "::error::Pytest hung without successful summary"
          kill -9 -- "-${PYTEST_PGID}" 2>/dev/null || true
          kill -9 "$PYTEST_PID" 2>/dev/null || true
          exit 124
