name: CI Pipeline

# Runs on GitHub-hosted ubuntu-latest runners.
# Push to feature branches runs Tier 1 unit tests (fast).
# PRs to main run the same checks. Manual dispatch allows full test suite.

on:
  push:
    branches: [feat/*, feature/*, fix/*, docs/*, session/*, session-*]
    paths:
      - "src/**"
      - "packages/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/unified-ci.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "packages/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/unified-ci.yml"
  workflow_dispatch:
    inputs:
      test-mode:
        description: "Test execution mode"
        required: false
        default: "fast"
        type: choice
        options:
          - fast # Tier 1 unit tests only (no external dependencies)
          - full # All tests including slow ones
          - infrastructure # Docker infrastructure tests only

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Improved concurrency: Group by PR number for PR events, unique run_id for push events
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # Skip push CI when an open PR already covers the branch
  check-duplicate:
    name: Check for Duplicate Run
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8.
    # On push events, head_ref is empty so this expression evaluates to true,
    # leaving push-event behavior intact. On pull_request events from
    # release/v*, this short-circuits before the duplicate-PR check fires.
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check if push event should be skipped
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('skip', 'false');
              return;
            }
            const branch = context.ref.replace('refs/heads/', '');
            try {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${branch}`
              });
              core.setOutput('skip', prs.length > 0 ? 'true' : 'false');
            } catch (error) {
              core.setOutput('skip', 'false');
            }

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: check-duplicate
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8 —
    # release diffs are metadata-only (pyproject.toml version anchors +
    # CHANGELOG); the source-change PRs the release bundles already
    # exercised this matrix. Saves ~45 min × matrix-size per release cycle.
    if: needs.check-duplicate.outputs.should-skip != 'true' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          uv venv .venv
          # Per #890 slim-core refactor: extras renamed.
          # OLD: cli/database/postgres/mysql/files/distributed/http/mfa/otel
          # NEW: db-postgres/db-mysql/db-sqlite/http-client/auth-azure/telemetry/redis/trust
          # `cli` and `files` were folded into core/server respectively.
          uv pip install -e ".[dev,server,http-client,db-postgres,db-mysql,db-sqlite,redis,monitoring,auth,auth-azure,trust,mcp,scheduler,telemetry,data]" --python .venv/bin/python
          uv pip install -e packages/kailash-mcp --python .venv/bin/python
          uv pip install numpy --python .venv/bin/python

      - name: Lint (ruff)
        run: .venv/bin/ruff check src/ tests/ --select=E9,F63,F7,F82

      - name: Type check (pyright)
        continue-on-error: true # 3001 pre-existing errors — tracked in #73
        run: |
          uv pip install pyright --python .venv/bin/python
          .venv/bin/pyright src/kailash/ --pythonversion ${{ matrix.python-version }} --level error 2>&1 | tail -5

      - name: Test (Tier 1 — unit tests)
        timeout-minutes: 15
        run: |
          .venv/bin/python -m pytest \
            tests/unit/ \
            tests/trust/plane/unit/ \
            tests/security/ \
            -m 'not (slow or performance or integration or e2e or requires_docker or requires_postgres or requires_mysql or requires_redis or requires_ollama)' \
            --maxfail=10 -q -p no:xdist --timeout=30

      - name: Test (Tier 2 — integration runtime tests)
        timeout-minutes: 10
        continue-on-error: true # Tier 2 has thread/I/O tests that may fail on CI runners
        run: |
          .venv/bin/python -m pytest \
            tests/tier2_integration/ \
            -m 'not (requires_docker or requires_postgres or requires_mysql or requires_redis or requires_ollama)' \
            --maxfail=20 -q -p no:xdist --timeout=60

  test-pact:
    name: Test PACT (Python 3.11)
    needs: check-duplicate
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8.
    if: needs.check-duplicate.outputs.should-skip != 'true' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-py3.11-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-py3.11-

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -e ".[trust]" --python .venv/bin/python
          uv pip install -e "packages/kailash-pact[dev]" --python .venv/bin/python

      - name: Test kailash-pact
        timeout-minutes: 5
        run: |
          cd packages/kailash-pact
          ../../.venv/bin/python -m pytest tests/ \
            --maxfail=5 -q --timeout=120

  test-dataflow:
    name: Test DataFlow Unit Suite (Tier 1)
    needs: check-duplicate
    # Re-applies issue #898 gate (PR #968 was reverted; this is a fresh
    # implementation atop issue #979's tier-1 cleanup — S1+S2a+S-EV+S3+S4+S5a).
    # Paths cover BOTH the package and the core SDK (per ci-runners.md Rule 6 —
    # filter MUST follow the transitive dep graph, not just package dir).
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8.
    if: needs.check-duplicate.outputs.should-skip != 'true' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-py3.11-dataflow-${{ hashFiles('pyproject.toml', 'packages/kailash-dataflow/pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-py3.11-dataflow-

      - name: Install dependencies
        # Per deployment.md § "Sibling-Package CI Installs Root SDK Editable":
        # root kailash MUST be installed editable BEFORE the sub-package so
        # `kailash.<new_module>` resolves to the local checkout, not stale PyPI.
        run: |
          uv venv .venv
          uv pip install -e "." --python .venv/bin/python
          uv pip install -e "packages/kailash-dataflow[dev]" --python .venv/bin/python

      - name: Test DataFlow tier-1 unit suite
        timeout-minutes: 10
        # ZERO `-m` flag here: pytest.ini::addopts is the SOLE marker filter
        # location per S1 CRIT-B fix (packages/kailash-dataflow/pytest.ini).
        # `--timeout=120` matches the addopts entry; explicit here as defense
        # against pytest-timeout plugin auto-discovery regressions.
        #
        # Issue #1010 / #1002 AC#3 closure: the setsid + 150s polling +
        # SIGKILL wrapper that previously lived here is GONE. The wrapper
        # masked non-daemon aiosqlite worker threads that blocked
        # _Py_Finalize at interpreter exit. Two-part fix landed:
        #   - PR #1014 (a8b54a97): fresh-loop disconnect for the
        #     _shared_pools SQLite branch.
        #   - PR #1016 (a9bc2c7c): conftest monkey-patch forcing every
        #     aiosqlite worker thread to daemon=True, so survivors of
        #     close() do not block threading._shutdown().
        # PR #1016 CI on Linux/Python 3.11 completed end-to-end in 76s
        # with the setsid wrapper still in place — pytest exited
        # naturally well before the 150s polling threshold. Removing
        # the wrapper now makes any future regression visible at the
        # 10-min step timeout instead of being silently SIGKILLed.
        run: |
          cd packages/kailash-dataflow
          ../../.venv/bin/python -m pytest tests/unit/ \
            --maxfail=10 -q --timeout=120

      - name: Test DataFlow infra-free regression gates
        timeout-minutes: 10
        # tests/regression/ is a MIXED dir: infra-free gates (the engine.py
        # pyright invariant, codeql/security/import-discipline checks) PLUS
        # Postgres/Redis-requiring tests. This [dev]-only runner has no infra,
        # so the marker filter below excludes every infra-requiring test and
        # runs only the infra-free gates (the engine pyright gate among them).
        # The infra-requiring regression tests are exercised by the
        # infrastructure workflow, not here.
        #
        # Explicit `-m` is REQUIRED and intentionally overrides pytest.ini's
        # addopts marker filter: addopts excludes requires_* but NOT
        # integration/e2e, which this directory DOES contain. (The unit step
        # above keeps zero `-m` per the addopts-is-sole-filter convention; that
        # convention holds for tests/unit/, which has no integration tests.)
        run: |
          cd packages/kailash-dataflow
          ../../.venv/bin/python -m pytest tests/regression/ \
            -m "not (requires_postgres or requires_mysql or requires_redis or requires_docker or integration or e2e)" \
            --maxfail=10 -q --timeout=120

  # F-REGRESSION-INFRA-CI: the dataflow tests/regression/ Postgres+Redis tests
  # (#1249 / #1252 tenant-isolation-leak SECURITY regressions + #979 S1
  # preconditions) were run by NO CI job — the test-dataflow job above excludes
  # every requires_* marker, and test-with-infrastructure.yml runs no pytest
  # (it is a config validator). This job provides Postgres + Redis via service
  # containers and runs exactly the requires_postgres/requires_redis-marked
  # regression tests. The explicit `-m` intentionally overrides pytest.ini's
  # addopts marker filter (same convention as the infra-free step above).
  test-dataflow-infra:
    name: Test DataFlow Infra Regression (Postgres/Redis)
    needs: check-duplicate
    if: needs.check-duplicate.outputs.should-skip != 'true' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: kailash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d kailash_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The dataflow test_suite fixture (tests/conftest.py) reads
      # TEST_DATABASE_URL; its default points at :5434, so set it explicitly to
      # the service-mapped :5432. DATAFLOW_TEST_MODE matches the conftest default.
      TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/kailash_test
      DATAFLOW_TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-py3.11-dataflow-infra-${{ hashFiles('pyproject.toml', 'packages/kailash-dataflow/pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-py3.11-dataflow-infra-

      - name: Install dependencies
        # Root kailash editable BEFORE the sub-package (deployment.md sibling-CI
        # rule). db-postgres (asyncpg) + redis provide the async drivers; the
        # dataflow [postgres-sync] extra provides psycopg2-binary, REQUIRED by the
        # auto_migrate synchronous DDL path the tenant-isolation tests exercise
        # (DataFlow is async-first but creates tables via the sync DDL executor).
        run: |
          uv venv .venv
          uv pip install -e ".[db-postgres,redis]" --python .venv/bin/python
          uv pip install -e "packages/kailash-dataflow[dev,postgres-sync]" --python .venv/bin/python

      - name: Run Postgres/Redis-marked regression tests
        timeout-minutes: 10
        run: |
          cd packages/kailash-dataflow
          ../../.venv/bin/python -m pytest tests/regression/ \
            -m "requires_postgres or requires_redis" \
            --maxfail=10 -q --timeout=120
