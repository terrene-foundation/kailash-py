name: Trust Module Tests

# Run on PRs that modify trust-related code, and weekly for regression detection
on:
  pull_request:
    branches: [main]
    paths:
      - "src/kailash/trust/**"
      - "src/kailash/runtime/trust/**"
      - "src/kailash/runtime/base.py"
      - "src/kailash/runtime/local.py"
      - "src/kailash/runtime/async_local.py"
      - "packages/kailash-kaizen/src/kaizen/trust/**"
      - "packages/kailash-dataflow/src/dataflow/trust/**"
      - "packages/kailash-nexus/src/nexus/trust/**"
      - "tests/trust/**"
      - "tests/unit/runtime/trust/**"
      - "packages/kailash-kaizen/tests/unit/trust/**"
      - "packages/kailash-kaizen/tests/integration/trust/**"
      - "packages/kailash-dataflow/tests/unit/trust/**"
      - "packages/kailash-nexus/tests/unit/trust/**"
  schedule:
    - cron: "0 6 * * 1" # Monday at 6:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  trust-unit-tests:
    name: Trust Unit Tests
    # Skip release-prep PRs (release/v*) per ci-runners.md MUST Rule 8 —
    # paths filter on trust modules rarely matches release-cut diffs, but
    # defense-in-depth keeps the rule's enforcement uniform. Scheduled
    # weekly + workflow_dispatch still cover release-cut SHAs.
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[trust,rfc3161,dev]"
          uv pip install -e "packages/kailash-kaizen[dev]"
          uv pip install -e "packages/kailash-dataflow[dev]"
          uv pip install -e "packages/kailash-nexus[dev]"

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Core SDK Trust Tests
        run: |
          .venv/bin/python -m pytest tests/unit/runtime/trust/ \
            -v --tb=short --timeout=60 \
            --junitxml=reports/core-trust-results.xml \
            2>&1 | tee reports/core-trust.log
        continue-on-error: false

      - name: Run RFC-3161 Timestamp Verification Tests (#1332)
        run: |
          .venv/bin/python -m pytest \
            tests/regression/test_issue_1332_rfc3161_verify_fail_closed.py \
            tests/regression/test_issue_1332_rfc3161_live_binding.py \
            -v --tb=short --timeout=60 \
            --junitxml=reports/rfc3161-results.xml \
            2>&1 | tee reports/rfc3161.log
        continue-on-error: false

      - name: Run Kaizen Trust Unit Tests
        run: |
          .venv/bin/python -m pytest packages/kailash-kaizen/tests/unit/trust/ \
            -v --tb=short --timeout=120 \
            --junitxml=reports/kaizen-trust-results.xml \
            2>&1 | tee reports/kaizen-trust.log
        continue-on-error: false

      - name: Run DataFlow Trust Tests
        run: |
          .venv/bin/python -m pytest packages/kailash-dataflow/tests/unit/trust/ \
            -v --tb=short --timeout=60 \
            --junitxml=reports/dataflow-trust-results.xml \
            2>&1 | tee reports/dataflow-trust.log
        continue-on-error: false

      - name: Run Nexus Trust Tests
        run: |
          .venv/bin/python -m pytest packages/kailash-nexus/tests/unit/trust/ \
            -v --tb=short --timeout=60 \
            --junitxml=reports/nexus-trust-results.xml \
            2>&1 | tee reports/nexus-trust.log
        continue-on-error: false

      - name: Upload Test Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trust-test-reports
          path: reports/
          retention-days: 14

      - name: Trust Test Summary
        if: always()
        run: |
          echo "## Trust Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in reports/*-trust.log; do
            component=$(basename "$report" .log)
            passed=$(grep -oP '\d+ passed' "$report" 2>/dev/null || echo "0 passed")
            failed=$(grep -oP '\d+ failed' "$report" 2>/dev/null || echo "")
            echo "- **$component**: $passed $failed" >> $GITHUB_STEP_SUMMARY
          done
