name: Claude Code Maintenance

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: false
        type: string
  # Paused — re-enable when CC quota is restored
  # issue_comment:
  #   types: [created]
  # issues:
  #   types: [opened, assigned, labeled]
  # pull_request_review_comment:
  #   types: [created]
  # pull_request_review:
  #   types: [submitted]

jobs:
  # ─── Auto-triage: label new issues for Claude ─────────────────────
  triage:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Auto-label bug issues for Claude
        run: |
          TITLE="${{ github.event.issue.title }}"
          LABELS="${{ join(github.event.issue.labels.*.name, ',') }}"

          # Skip docs-only issues
          if echo "$TITLE" | grep -qi '^\[DOCS\]'; then
            echo "Documentation issue — skipping auto-label"
            exit 0
          fi

          # Skip issues already labeled (manual triage)
          if [ -n "$LABELS" ]; then
            echo "Issue already has labels ($LABELS) — skipping"
            exit 0
          fi

          # Label for auto-fix — triggers the fix job in a new workflow run
          echo "Auto-labeling issue #${{ github.event.issue.number }} with auto-fix"
          gh issue edit "${{ github.event.issue.number }}" --add-label "auto-fix"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Bug fix / general maintenance ─────────────────────────────────
  fix:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'auto-fix') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'needs-review') ||
      (github.event_name == 'pull_request_review_comment') ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          assignee_trigger: "claude"
          label_trigger: "auto-fix"
          settings: ".claude/settings.json"
          prompt: |
            You are the automated maintenance agent for the Kailash Python SDK.
            You MUST follow the full COC (Cognitive Orchestration for Codegen) lifecycle.
            CLAUDE.md and all .claude/rules/ are your absolute directives.
            Read .claude/guides/automated-maintenance.md for the full pipeline specification.

            ## Phase 1: Analyze (/analyze)
            - Read the issue body carefully. Identify the affected package(s).
            - Use the appropriate specialist agent (dataflow-specialist, nexus-specialist, etc.)
            - If the issue is unclear, comment on the issue asking for clarification and STOP.

            ## Phase 2: Reproduce & Fix (/implement)
            - Write a regression test in `tests/regression/` named `test_issue_<NUMBER>_<description>`.
            - It MUST fail before the fix.
            - Implement the fix following all .claude/rules/ (zero-tolerance, no-stubs, framework-first).
            - Update __init__.py __version__ if pyproject.toml version changes.
            - The regression test MUST now pass.

            ## Phase 3: Validate (/redteam)
            - `black --check .` — must pass
            - `ruff check` — must pass
            - `pytest` — all tests pass
            - Review: does the fix introduce any regressions, stubs, or naive fallbacks?

            ## Phase 4: Codify (/codify)
            - If the fix revealed missing or incorrect documentation, update the relevant:
              - Agent definitions (.claude/agents/) — if specialist behavior needs updating
              - Skills (.claude/skills/) — if patterns or knowledge changed
              - Rules (.claude/rules/) — if enforcement gaps were found
            - Skip codify if the fix is purely mechanical with no documentation impact.

            ## Phase 5: COC Sync
            - If Phase 4 updated any COC artifacts AND ~/repos/kailash/kailash-coc-claude-py exists:
              - Use the coc-sync agent to cascade changes to the USE repo
              - Follow .claude/skills/management/coc-sync-mapping.md for transformation rules
            - Skip sync if no COC artifacts were changed.

            ## Phase 6: Commit & PR
            - Commit with conventional format: `fix(scope): description`
            - Create a PR referencing the issue: `Fixes #N`
            - Label `auto-fix` if high-confidence; `needs-review` if uncertain

      - name: Notify Discord
        if: always()
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            STATUS="${{ job.status }}"
            ISSUE="${{ github.event.issue.number || github.event.pull_request.number }}"
            TITLE="${{ github.event.issue.title || github.event.pull_request.title }}"
            REPO="${{ github.repository }}"
            COLOR=$( [ "$STATUS" = "success" ] && echo 3066993 || echo 15158332 )
            curl -s -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"[$STATUS] #${ISSUE}: ${TITLE}\",\"url\":\"https://github.com/${REPO}/issues/${ISSUE}\",\"color\":${COLOR}}]}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  # ─── Release (admin-gated) ─────────────────────────────────────────
  release:
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'release') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude /release'))
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: ".claude/settings.json"
          prompt: |
            You are the release agent for the Kailash Python SDK.
            CLAUDE.md and all .claude/rules/ are your absolute directives.
            Follow the /release command instructions in .claude/commands/release.md EXACTLY.

            ## Release Process
            1. Read the issue body for release scope (which packages, version bump type).
            2. Run ALL pre-release checks:
               - `pytest` — all pass
               - `black --check .` and `ruff check` — clean
               - Version consistency: pyproject.toml matches __init__.py for ALL packages
            3. Bump versions in BOTH locations per package:
               - pyproject.toml: `version = "X.Y.Z"`
               - src/{package}/__init__.py: `__version__ = "X.Y.Z"`
            4. Update SDK dependency pins in framework packages if core version changed.
            5. Create a PR with title: `chore: release vX.Y.Z`
            6. Label the PR `release` — this ALWAYS requires admin approval.
            7. Comment on the issue with the PR link and pre-release checklist results.

            NEVER push tags or publish to PyPI without admin merging the PR first.
            NEVER skip TestPyPI validation for major/minor releases.
            The PR description MUST include the full pre-release checklist.

      - name: Notify Discord (Release)
        if: always()
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            STATUS="${{ job.status }}"
            ISSUE="${{ github.event.issue.number }}"
            REPO="${{ github.repository }}"
            curl -s -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"[RELEASE $STATUS] #${ISSUE}\",\"url\":\"https://github.com/${REPO}/issues/${ISSUE}\",\"color\":$( [ \"$STATUS\" = \"success\" ] && echo 3066993 || echo 15158332 )}]}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
