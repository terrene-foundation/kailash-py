version: '1.0'
metadata:
  name: customer_analysis_pipeline
  description: Analyze customer data and generate insights
  version: 1.0.0
  author: John Doe
  created_at: '2025-05-30T13:18:58.552927+00:00'
  tags:
  - customer
  - analytics
  - ml
nodes:
  reader:
    type: CSVReader
    config:
      config:
        file_path: ../data/customers.csv
    container:
      image: kailash/csv-reader:latest
      command:
      - python
      - -m
      - kailash.nodes.data.csv_reader
      args: []
      env: {}
    resources:
      cpu: 100m
      memory: 512Mi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 0.0
      y: 100.0
  transformer:
    type: PythonCodeNode
    config: {}
    container:
      image: custom/python-executor:latest
      command: &id001
      - python
      - -m
      - executor
      args: &id002
      - --config
      - /config/node.yaml
      env: &id003 {}
    resources:
      cpu: 500m
      memory: 1Gi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 150.0
      y: 100.0
  classifier:
    type: PythonCodeNode
    config: {}
    container:
      image: custom/python-executor:latest
      command: *id001
      args: *id002
      env: *id003
    resources:
      cpu: 500m
      memory: 1Gi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 300.0
      y: 100.0
  writer:
    type: CSVWriter
    config:
      config:
        file_path: ../data/customer_segments.csv
    container:
      image: kailash/csvwriter:latest
      command:
      - python
      - -m
      - kailash.nodes.csvwriter
      args: []
      env: {}
    resources:
      cpu: 100m
      memory: 128Mi
      cpu_limit: null
      memory_limit: null
      gpu: null
    position:
      x: 450.0
      y: 100.0
connections:
- from: reader
  to: transformer
  from_output: data
  to_input: data
- from: transformer
  to: classifier
  from_output: data
  to_input: data
- from: classifier
  to: writer
  from_output: data
  to_input: data
