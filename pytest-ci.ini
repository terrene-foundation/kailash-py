[pytest]
# CI-optimized pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests that might require external services
    io: marks tests that perform file I/O operations
    asyncio: marks async tests that require asyncio
    unit: marks unit tests (fast, isolated)
    smoke: marks smoke tests (critical path only)

# CI optimizations
addopts =
    # Fail fast on first error
    -x
    # Short traceback format
    --tb=short
    # Less verbose output in CI
    -q
    # Disable capturing for speed (can enable with -s if needed)
    --capture=no
    # Show 10 slowest tests
    --durations=10
    # Strict markers
    --strict-markers
    # Disable warnings in CI
    --disable-warnings
    # Maximum test duration (30 seconds per test)
    --timeout=30
    # Skip slow tests in CI by default
    -m "not slow"

# Async settings
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto

# Coverage settings for CI (when needed)
[coverage:run]
parallel = true
concurrency = multiprocessing
omit =
    */tests/*
    */conftest.py
    */__init__.py
    */setup.py

[coverage:report]
skip_covered = true
show_missing = false
precision = 0
